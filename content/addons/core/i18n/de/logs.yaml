ellie_tutorial_1: Willkommen in Draconia! Ich bin Ellie, deine Begleiterin am Boden.
ellie_tutorial_2: >-
  Hier unten sammelst du Ressourcen und baust eine neue Heimat auf, um eines
  Tages wieder aufsteigen zu können.
ellie_tutorial_3: >-
  Beginne damit, Zweige zu sammeln. Nutze den "Fokus", wenn du dich auf eine
  Sache spezialisieren willst!
ellie_tutorial_4: >-
  Achte auf deine Sättigung! Sie sinkt, wenn du Energie oder Magie verbrauchst.
  Wenn du hungrig bist, wird jede Arbeit viel anstrengender und teurer. Iss
  regelmäßig Beeren oder Mahlzeiten, um effizient zu bleiben.
intro_1: >-
  Über dir gleitet ein prächtiger Winddrache mühelos von Dach zu Dach. In seiner
  humanoiden Form wirken seine zusammengeklappten Schwingen wie ein edler
  Mantel.
intro_2: >-
  Du gehst den langen Weg zu Fuß. Du bist ebenfalls ein Drache - doch du kannst
  dich nicht verwandeln oder Flügel manifestieren.
intro_3: >-
  Ein Händler-Wyvern landet vor dem Dorftor. Er bemerkt dich nicht. Du hast dich
  daran gewöhnt, das andere mächtiger sind als du.
intro_4: >-
  Regen setzt ein. Die anderen schütteln ihre Schwingen – Leder, Federn,
  Schuppen – und fliegen nach Hause. Du bleibst am Boden.
intro_5: >-
  Du bleibst unten, wie immer. Du vermisst eine Verbindung, die du nie
  hattest...
intro_6: >-
  Doch hier, am Rande des Dorfes, möchtest du dir ein Leben aufbauen. Mit deinen
  eigenen Händen.
intro_7: >-
  Willkommen in deinem neuen Zuhause. Du Drachenwandler ohne Drachenform... ein
  Rätsel in Draconia.
