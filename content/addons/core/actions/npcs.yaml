- id: act-npc-teacher
  npcId: npc-teacher
  category: npc
  isStory: true
  chapter: chapter_village_life
  progKey: teacher
  maxProgress: 3
  journalIcon: 📖
  icon: 🎓
  journalColor: '#3b82f6'
  steps:
    - cost: 5
      costType: energy
      onSuccess:
        - type: unlockItem
          id: item-crystal_apple
        - type: log
          logKey: receive_apple
          color: var(--gold)
      dialogueKey: npc_teacher_1
    - cost: 10
      costType: energy
      requirements:
        flags.build-house: true
      # Logged when player tries this step without having built a house.
      # Moved out of village.logic.ts (was a hardcoded npc-teacher branch)
      # so addon NPCs can declare their own hints the same way.
      failLogKey: npc_teacher_2_no_house
      onSuccess:
        - type: unlockItem
          id: item-book_lore_1
        - type: unlockItem
          id: item-book_lore_2
        - type: unlockRecipe
          id: act-read-lore-1
        - type: unlockRecipe
          id: act-read-lore-2
        - type: setFlag
          flag: unlocked-library
          value: true
        - type: log
          logKey: receive_books
          color: var(--gold)
      dialogueKey: npc_teacher_3
    - cost: 15
      costType: energy
      requirements:
        flags.read_book_1_complete: true
        flags.read_book_2_complete: true
      # Logged when player tries this step without finishing both books.
      # Same data-driven approach as the previous step.
      failLogKey: npc_teacher_4_not_read
      onSuccess:
        - type: setFlag
          flag: school_graduate
          value: true
        - type: log
          logKey: school_graduate_log
          color: var(--gold)
      dialogueKey: npc_teacher_6
  customExecute: npc_execute
