# Actions — Magic System
# Auto-loaded by scripts/build-content.ts
# Note: act-dream-bloom has a custom execute handler in src/features/gameplay/custom-handlers.ts

- id: act-dream-bloom
  category: magic
  icon: "🌀"
  cost: 15
  costType: magic
  satiationCost: 1
  customExecute: dream_bloom
  onSuccess:
    - type: modifyResource
      resource: magic
      amount: 5
  logKey: dream_bloom_log

- id: act-meditate-sanctum
  category: magic
  icon: "🧘"
  duration: 10000
  costType: magic
  cost: 10
  yieldType: astral_shards
  requirements:
    "flags.build-arcane-sanctum": true
  sfx: magic
  particleText: particle_meditation
  particleType: shards
  rewards:
    astral_shards: 1
  logKey: meditation_log
  logColor: "var(--accent-purple)"

- id: act-spell-harvest
  category: magic
  icon: "🌿"
  costType: mixed
  costs:
    astral_shards: 1
    magic: 20
  requirements:
    "flags.build-arcane-sanctum": true
    "flags.school_graduate": true
  sfx: magic
  particleText: particle_blessing
  particleType: shards
  onSuccess:
    - type: addBuff
      buffId: buff-harvest
  logKey: spell_harvest_log
  logColor: "var(--accent-purple)"

- id: act-grind-dust
  category: magic
  icon: "🔮"
  costType: mixed
  costs:
    herbs: 5
    magic: 10
  requirements:
    "flags.school_graduate": true
  sfx: magic
  isLoopable: true
  rewards:
    arcane_dust: 1
  logKey: grind_dust_log
  logColor: "var(--accent-purple)"
