receive_luxana_summons: >-
  Olié has handed you a court summons. Luxana wants your shadow studied —
  Meister Elian awaits at the Hofmagier collegium.
luxana_elian_met: >-
  You've met Meister Elian. The imperial tutor who taught every element
  but shadow — as lost as he is delighted to have you.
luxana_caldwen_done: >-
  The signet rises dripping through the grate. Lord Caldwen, lost for
  words, lets it slip that the court is now watching. Two more nobles ask
  for you by evening.
luxana_mirelle_done: >-
  The charm lifts free; the cradle never so much as creaks, the child
  never stirs. Lady Mirelle weeps with relief and tells the gardens of you.
luxana_aurel_done: >-
  Shadows dance across the ballroom walls, brighter for the chandeliers.
  Vicomte Aurel's soirée is the talk of Luxana — and so are you.
luxana_sylvaine_done: >-
  A patch of steady shade travels with the moonbloom across the sunlit
  court; not a petal wilts. Dame Sylvaine simply nods, which from her is
  high praise.
luxana_elian_finale: >-
  Meister Elian sets down his glasses for once. "Four problems no drake
  could touch — solved, cleanly, under supervision. The court has its
  answer, and so do I." He smiles. "You can hold a second shadow now. Go
  on — I taught you nothing, and yet here we are."
