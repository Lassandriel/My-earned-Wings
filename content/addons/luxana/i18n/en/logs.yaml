receive_luxana_summons: >-
  Olié has handed you a court summons. Luxana wants your shadow studied —
  Meister Elian awaits at the Hofmagier collegium.
luxana_elian_met: >-
  You've met Meister Elian. The imperial tutor who taught every element
  but shadow — as lost as he is delighted to have you.
luxana_caldwen_done: >-
  The signet rises dripping through the grate. Lord Caldwen, lost for
  words, lets it slip that the court is now watching. Two more nobles ask
  for you by evening.
luxana_vault_relic: >-
  Something else came up with the signet — a scale-dark shard that fits no
  record Caldwen knows. It feels older than the vault. The court archivist
  might know what it is.
luxana_brannoc_met: >-
  Brannoc turns the shard over and over, muttering. "Older than the
  archive. Older than the court." He waves you off to fetch the deep rolls.
luxana_archive_revealed: >-
  Brannoc unrolls a depiction centuries old: a shadow-dragon, rendered in
  failing ink — and the likeness to you is impossible to unsee. Neither of
  you says it aloud. Word of the find does not stay in the archive.
luxana_veyl_confronted: >-
  Hauptmann Veyl blocks your path, unhurried. A thing that slips through
  bars and weighs nothing is, she says, a hole in every wall she guards.
  She means to put the shadow before the court.
luxana_mirelle_done: >-
  The charm lifts free; the cradle never so much as creaks, the child
  never stirs. Lady Mirelle weeps with relief and tells the gardens of you.
luxana_aurel_done: >-
  Shadows dance across the ballroom walls, brighter for the chandeliers.
  Vicomte Aurel's soirée is the talk of Luxana — and so are you.
luxana_sylvaine_done: >-
  A patch of steady shade travels with the moonbloom across the sunlit
  court; not a petal wilts. Dame Sylvaine simply nods, which from her is
  high praise.
luxana_elian_finale: >-
  The court hears Veyl out — and sides with Elian and the nobles you
  served. No leash, no cell; a truce. You leave Luxana free and of your own
  will, a second shadow at your call now, and an old painted face you can't
  stop seeing. Luxana had no answer for what you are. Somewhere must.
