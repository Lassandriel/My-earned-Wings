item_luxana_summons_title: Court Summons
item_luxana_summons_desc: >-
  A heavy document sealed in deep imperial red, requesting you by name and
  by element. The court at Luxana wishes the rare shadow gift studied
  properly — under Meister Elian of the Hofmagier collegium. Graduates are
  rarely called straight to the capital. Apparently you are not most
  graduates.
