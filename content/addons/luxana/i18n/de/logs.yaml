receive_luxana_summons: >-
  Olié hat dir eine Hof-Vorladung überreicht. Luxana will deinen Schatten
  studieren — Meister Elian wartet im Hofmagier-Kollegium.
luxana_elian_met: >-
  Du hast Meister Elian kennengelernt. Der kaiserliche Lehrer, der jedes
  Element außer Schatten unterrichtet hat — so ratlos wie entzückt, dich
  zu haben.
luxana_caldwen_done: >-
  Das Siegel steigt tropfend durch das Gitter. Lord Caldwen, um Worte
  verlegen, lässt durchblicken, dass der Hof nun zusieht. Bis zum Abend
  fragen zwei weitere Adelige nach dir.
luxana_mirelle_done: >-
  Der Talisman löst sich; die Wiege knarzt nicht einmal, das Kind regt
  sich nicht. Lady Mirelle weint vor Erleichterung und erzählt den Gärten
  von dir.
luxana_aurel_done: >-
  Schatten tanzen über die Wände des Ballsaals, heller noch durch die
  Kronleuchter. Vicomte Aurels Soirée ist das Gespräch von Luxana — und du
  auch.
luxana_sylvaine_done: >-
  Ein Fleck steten Schattens wandert mit der Mondblume über den
  sonnigen Hof; kein Blütenblatt welkt. Dame Sylvaine nickt nur, was bei
  ihr höchstes Lob ist.
luxana_elian_finale: >-
  Meister Elian legt seine Brille ausnahmsweise ab. "Vier Probleme, die
  kein Drache lösen konnte — sauber gelöst, unter Aufsicht. Der Hof hat
  seine Antwort, und ich auch." Er lächelt. "Du kannst nun einen zweiten
  Schatten halten. Nur zu — ich habe dir nichts beigebracht, und doch sind
  wir hier."
