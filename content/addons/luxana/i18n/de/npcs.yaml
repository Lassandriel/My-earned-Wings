# ─── Olié — Luxana-Vorladung (auf den Vandara-Sekretär gepatcht) ──
npc_olie_luxana_summons: >-
  Olié schiebt ein letztes versiegeltes Dokument über den Tisch. "Der Hof
  von Luxana hat nach Ihnen verlangt — namentlich, und nach Element. Eine
  Vorladung ans Hofmagier-Kollegium, unter Meister Elian persönlich." Eine
  seltene Pause. "Wir schicken selten eine frische Absolventin direkt an
  den Hof. Glückwunsch — gleich doppelt, wie es scheint."

# ─── Meister Elian — erste Begegnung ──────────────────────────────
npc_luxana_elian_1: >-
  Ein vollgestopftes Studierzimmer, Kristallstäbe treiben in der Luft, ein
  uralter Lehrer blinzelt über eine rutschende Brille. "Ah — Sie sind es.
  Meister Elian. Vierzig Jahre lehre ich an diesem Hof — jedes Element außer
  Schatten. Und nun drückt man mir den ersten Schattenwandler in die Hand."
  Er beugt sich vor. "Ehrlich gesagt habe ich keine Ahnung, wo ich anfangen
  soll. Wir finden es gemeinsam heraus. Der alte Lord Caldwen liegt mir seit
  einer Woche in den Ohren — gehen Sie, zeigen Sie, was ein Schatten kann,
  was ein Drache nicht vermag."

# ─── Meister Elian — Konvergenz-Finale (2. Schatten-Slot) ─────────
npc_luxana_elian_2: >-
  Der Saal ist voll. Hauptmann Veyl legt ihren Fall dar: Ein Ding, das
  durch Gitter schlüpft und nichts wiegt, dürfe man nicht unbeobachtet
  umherwandern lassen. Auf dem Tisch — Brannocs jahrhundertealtes Bild eines
  Schattendrachen mit deinem Gesicht. Elian erhebt sich. "Hauptmann, Sie
  wollen einsperren, was Sie sich nicht die Mühe gemacht haben zu
  verstehen." Einer nach dem anderen treten die Adeligen für Sie ein. Veyl
  neigt den Kopf — ein Waffenstillstand, keine Niederlage. Später, leise:
  "Sie können nun einen zweiten Schatten halten. Binden Sie ihn, wie Sariel
  es lehrte." Er zögert. "Dieses Bild... gehen Sie behutsam. Luxana hat
  keine Antwort darauf, was Sie sind. Vielleicht hat irgendwo eine."

# ─── Lord Caldwen — der geflutete Tresor ──────────────────────────
npc_luxana_caldwen_1: >-
  Caldwen erhebt sich nicht, als Sie eintreten. "Der Hof-Schatten zum
  Vorzeigen." Eine Schatzkammer unter seinem Anwesen ist vollgelaufen; das
  drei Jahrhunderte alte Familiensiegel liegt hinter einem Eisengitter, zu
  eng für jede Klaue, in Wasser, in das kein Diener taucht. "Man sagt, ein
  Schatten braucht weder Atem noch Breite. Greifen Sie durch. Holen Sie es
  herauf. Gelingt es, hört der Hof es von mir — mehr wert, als Sie ahnen."

# ─── Lady Mirelle — die zerbrechliche Wiege ───────────────────────
npc_luxana_mirelle_1: >-
  Lady Mirelle empfängt Sie mit dem Finger auf den Lippen. "Leise — bitte."
  Ein Kind schläft in einer Wiege aus gesponnenem Kernholz. "Ein
  Schutztalisman ist unter die Matratze gerutscht und summt nun, wo er
  schweigen sollte — doch das Holz trägt keine Hand, und Klauen würden sie
  wecken." Ihre Fassung bebt. "Man sagt, Ihr Schatten wiegt nichts. Heben
  Sie ihn heraus. Wecken Sie meine Tochter nicht."

# ─── Vicomte Aurel — das Schattentheater ──────────────────────────
npc_luxana_aurel_1: >-
  Vicomte Aurel ist schon mitten in einer Geste, als Sie eintreffen. "Meine
  Soirée braucht etwas, das sie nie gesehen haben und nicht kaufen können."
  Er stößt die Ballsaaltüren auf, hin zu einem Lodern von Kronleuchtern.
  "Man sagt, Schatten ist am stärksten, wo das Licht am hellsten brennt. Ein
  lebendiges Schattenspiel über diese Wände. Geben Sie ihnen das, und Aurels
  Gunst öffnet Türen, die selbst Caldwens Name nicht vermag."

# ─── Dame Sylvaine — die Mondblume beschatten ─────────────────────
npc_luxana_sylvaine_1: >-
  Dame Sylvaine sieht nicht von der blassen Blüte in ihren behandschuhten
  Händen auf. "Mondblume. Eine Berührung echten Tageslichts, und sie
  schwärzt für immer — doch sie muss am Mittag über den offenen Hof." Sie
  mustert Sie. "Ich brauche Schatten, der mit ihr wandert und nicht einen
  Strahl durchlässt. Schatten gehört zum Licht; Sie sollten das beherrschen.
  Gehen Sie neben mir. Halten Sie es dunkel."

# ─── Brannoc der Archivar — das Hof-Archiv ────────────────────────
npc_luxana_brannoc_1: >-
  Das Archiv ist eine Schlucht aus Regalen, erhellt von einer störrischen
  Lampe. Brannoc taucht auf, bis zu den Ellenbogen voll Tinte — dann sieht
  er die schuppendunkle Scherbe, die du trägst, und erstarrt. "Älter als der
  Hof, der diesen Raum gebaut hat." Schon schlurft er zu den tiefen Stapeln.
  "Kommen Sie wieder, wenn ich Zeit mit den alten Rollen hatte. Und erwähnen
  Sie es nicht bei den Vergoldeten oben."

npc_luxana_brannoc_2: >-
  Brannoc hat nicht geschlafen. Er rollt etwas so Altes aus, dass das
  Pergament seufzt — ein Schattendrache in verblassender Tinte, Schwingen
  wie verschüttete Nacht. Er deutet nicht auf das Gesicht. Er muss es nicht.
  "Ich sage nur, was ich beweisen kann: Das ist alt, das ist Schatten, und
  das bist *du*." Seine Hände sind nicht ganz ruhig. "So etwas bleibt nicht
  geheim. Jemand mit einem Schwert wird davon hören."

# ─── Hauptmann Veyl — eine Frage der Sicherheit ───────────────────
npc_luxana_veyl_1: >-
  Veyl wartet, wo der Korridor sich verengt. "Ich höre, das Archiv hat ein
  Bildnis zutage gefördert. Jahrhundertealt, und es trägt Ihr Gesicht." Ihr
  Ton ist beinahe freundlich, was schlimmer ist. "Ich habe nichts gegen Sie.
  Aber Sie schlüpfen durch Gitter und stehen ungesehen in hellen Sälen — und
  ich bewache diesen Hof." Sie tritt beiseite, gerade so. "Ich bringe es vor
  den Hof. Seien Sie da. Lieber hören Sie es von mir als aus einer Zelle."

# ─── Pell, die Hofpage (dey/dem) ──────────────────────────────────
npc_luxana_pell_1: >-
  Eine Page, kaum größer als dein Ellenbogen, fällt neben dir in Schritt.
  "Du bist der Schatten. Ich bin Pell — ich trage Sachen, meistens
  Geheimnisse." Dey grinst. "Caldwens Tresor ist nicht das Einzige von ihm,
  das unter Wasser steht. Der Vicomte schuldet seinem Schneider mehr, als
  sein Gut wert ist. Eine Page bemerkt niemand, also bemerke ich alles. Sei
  nett zu mir, und ich bin dir nützlich."

npc_luxana_pell_2: >-
  Pell wartet in einem Türrahmen, die Stimme leise. "Das Bild, das der alte
  Archivar ausgegraben hat? Die Hauptmann war zweimal da und hat gefragt,
  was ein Schatten kann." Dey zupft am Ärmel. "Veyl ist nicht grausam — das
  ist das Problem. Sie kommt dir gerade ins Gesicht, nach den Regeln. Also
  gib ihr keinen Grund. Du hast jetzt Freunde hier. Nutz uns."

# ─── Ondra Voss, die Aufsteigerin (sie/ihr) ───────────────────────
npc_luxana_voss_1: >-
  Ondra Voss erscheint in einer Wolke aus teurem Duft. "Der Schatten, nach
  dem alle schnappen. Ich habe das Haus, den Wein, die richtigen Gäste — was
  mir fehlt, ist der *Anlass*. Sie sind ein Gesprächsthema." Ein helles,
  brüchiges Lächeln. "Einen Abend in meinem Salon. Tun Sie etwas Wunderbares.
  Nennen Sie Ihren Preis — Preise verstehe ich."

npc_luxana_voss_2: >-
  Sie sagen Voss, dass Sie niemandes Schaustück sein werden. Sie erstarrt —
  dann lacht sie, hässlich und warm. "Das erste ehrliche 'Nein', seit ich
  mich durch jene Tür gekauft habe." Sie betrachtet Sie aufs Neue. "Behalten
  Sie Ihren Schatten für sich. Doch das Wohlwollen einer emporgekommenen
  Händlerin — die einzige wahre Währung an diesem Hof — haben Sie. Ohne
  Vorstellung."
