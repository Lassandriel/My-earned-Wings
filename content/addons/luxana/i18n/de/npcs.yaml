# Alle Dialoge hier sind reines Gesprochenes — die NPC-Karte zeigt, wer
# spricht, und der Spieler leitet die Szene aus dem Gesagten ab. Der Ausgang
# (Resultate, Folgen) steht im Log, nicht hier.

# ─── Olié — Luxana-Vorladung (auf den Vandara-Sekretär gepatcht) ──
npc_olie_luxana_summons: >-
  Ein letzter Eintrag für Ihre Akte. Der Hof von Luxana hat nach Ihnen
  verlangt — namentlich, und nach Element. Eine Vorladung ans
  Hofmagier-Kollegium, unter Meister Elian persönlich. Wir schicken selten
  eine frische Absolventin direkt an den Hof. Glückwunsch — gleich doppelt,
  wie es scheint.

# ─── Meister Elian — erste Begegnung ──────────────────────────────
npc_luxana_elian_1: >-
  Ah — Sie sind es. Kommen Sie rein, Vorsicht beim dritten Stab, der beißt.
  Meister Elian. Vierzig Jahre lehre ich an diesem Hof — jedes Element außer
  Schatten. Und nun drückt man mir den ersten Schattenwandler in die Hand.
  Ehrlich gesagt habe ich keine Ahnung, wo ich anfangen soll; wir finden es
  gemeinsam heraus. Der alte Lord Caldwen liegt mir seit einer Woche in den
  Ohren — gehen Sie, zeigen Sie, was ein Schatten kann, was ein Drache nicht
  vermag.

# ─── Meister Elian — Konvergenz-Finale (2. Schatten-Slot) ─────────
npc_luxana_elian_2: >-
  Hauptmann. Sie bewachen Mauern — aller Ehren wert. Doch Sie wollen
  einsperren, was Sie sich nicht die Mühe gemacht haben zu verstehen. Diese
  vier werden für das sprechen, was dieser Schatten getan hat; lassen Sie
  sie... Ein Waffenstillstand also, Hauptmann. Gut. Und Sie — Sie können nun
  einen zweiten Schatten halten. Binden Sie ihn, wie Sariel es lehrte. Und
  dieses Bild im Archiv... gehen Sie behutsam. Luxana hat keine Antwort
  darauf, was Sie sind. Vielleicht hat irgendwo eine.

# ─── Lord Caldwen — der geflutete Tresor ──────────────────────────
npc_luxana_caldwen_1: >-
  So. Der Hof-Schatten zum Vorzeigen. Eine Schatzkammer unter meinem Anwesen
  ist vollgelaufen — das Familiensiegel, drei Jahrhunderte alt, liegt hinter
  einem Eisengitter, zu eng für jede Klaue, in Wasser, in das kein Diener
  taucht. Man sagt, ein Schatten braucht weder Atem noch Breite. Greifen Sie
  durch. Holen Sie es herauf. Gelingt es, hört der Hof es von mir.

# ─── Lady Mirelle — die zerbrechliche Wiege ───────────────────────
npc_luxana_mirelle_1: >-
  Leise — bitte, sie ist gerade erst eingeschlafen. Ein Schutztalisman ist
  unter die Matratze der Wiege gerutscht und summt nun, wo er schweigen
  sollte — doch das Holz trägt keine Hand, und Klauen würden sie wecken. Man
  sagt, Ihr Schatten wiegt nichts. Heben Sie ihn heraus. Wecken Sie meine
  Tochter nicht, und ich vergesse es nicht.

# ─── Vicomte Aurel — das Schattentheater ──────────────────────────
npc_luxana_aurel_1: >-
  Wunderbar, Sie sind da. Meine Soirée braucht etwas, das sie nie gesehen
  haben und nicht kaufen können. Man sagt, Schatten ist am stärksten, wo das
  Licht am hellsten brennt — also: ein lebendiges Schattenspiel über diese
  Wände, während der Saal in Gold steht. Geben Sie ihnen das, und Aurels
  Gunst öffnet Türen, die selbst Caldwens Name nicht vermag.

# ─── Dame Sylvaine — die Mondblume beschatten ─────────────────────
npc_luxana_sylvaine_1: >-
  Mondblume. Eine Berührung echten Tageslichts, und sie schwärzt für immer —
  doch sie muss am Mittag über den offenen Hof. Ich brauche Schatten, der mit
  ihr wandert und nicht einen Strahl durchlässt. Schatten gehört zum Licht;
  Sie sollten das beherrschen. Gehen Sie neben mir. Halten Sie es dunkel.

# ─── Brannoc der Archivar — das Hof-Archiv ────────────────────────
npc_luxana_brannoc_1: >-
  Das dritte Regal nicht anfassen, es ist tragend — und ich bin es auch.
  ...Wo haben Sie das her? Nein — sagen Sie es noch nicht. Vierzig Jahre hüte
  ich diese Rollen, und das passt in keine. Älter als der Hof, der diesen
  Raum gebaut hat. Kommen Sie wieder, wenn ich Zeit mit den alten Rollen
  hatte. Und erwähnen Sie es nicht bei den Vergoldeten oben.

npc_luxana_brannoc_2: >-
  Bei Morgengrauen gefunden, unter nichts abgelegt — hinter eine drei
  Jahrhunderte tote Volkszählung geklemmt, als hätte es jemand versteckt. Ich
  sage nur, was ich beweisen kann: Das ist alt, das ist Schatten, und das
  bist du. So etwas bleibt nicht geheim. Jemand mit einem Schwert wird davon
  hören, ehe die Tinte trocknet.

# ─── Hauptmann Veyl — eine Frage der Sicherheit ───────────────────
npc_luxana_veyl_1: >-
  Ich höre, das Archiv hat ein Bildnis zutage gefördert. Jahrhundertealt, und
  es trägt Ihr Gesicht. Ich habe nichts gegen Sie — verstehen Sie das. Aber
  Sie schlüpfen durch Gitter, heben, was nicht zu heben ist, stehen ungesehen
  in hellen Sälen, und ich bewache diesen Hof. Ich bringe es vor den Hof,
  unverblümt. Seien Sie da. Lieber hören Sie es von mir als aus einer Zelle.

# ─── Pell, die Hofpage (dey/dem) ──────────────────────────────────
npc_luxana_pell_1: >-
  Du bist der Schatten — alle reden. Ich bin Pell. Ich trage Sachen, meistens
  Geheimnisse. Willst du die echte Karte von hier? Caldwens Tresor ist nicht
  das Einzige von ihm, das unter Wasser steht. Der Vicomte schuldet seinem
  Schneider mehr, als sein Gut wert ist. Eine Page bemerkt niemand, also
  bemerke ich alles. Sei nett zu mir, und ich bin dir nützlich.

npc_luxana_pell_2: >-
  Das Bild, das der alte Archivar ausgegraben hat? Es bleibt nicht im Keller.
  Die Hauptmann war zweimal da und hat gefragt, was ein Schatten kann und was
  nicht. Veyl ist nicht grausam — das ist das Problem. Sie kommt dir gerade
  ins Gesicht, nach den Regeln. Also gib ihr keinen Grund. Du hast jetzt
  Freunde hier, auch kleine. Nutz uns.

# ─── Ondra Voss, die Aufsteigerin (sie/ihr) ───────────────────────
npc_luxana_voss_1: >-
  Da sind Sie ja — der Schatten, nach dem alle schnappen. Ich habe das Haus,
  den Wein, auf dem Papier die richtigen Gäste. Was mir fehlt, ist der Anlass,
  und Sie, meine Liebe, sind ein Gesprächsthema. Einen Abend in meinem Salon.
  Tun Sie etwas Wunderbares, lassen Sie sie tuscheln. Nennen Sie Ihren Preis —
  Preise verstehe ich.

npc_luxana_voss_2: >-
  Sie wollen nicht? ...Wissen Sie, das ist das erste ehrliche 'Nein', seit
  ich mich durch jene Tür gekauft habe. Alle wollen etwas — Sie einfach
  nicht. Behalten Sie Ihren Schatten für sich. Doch das Wohlwollen einer
  emporgekommenen Händlerin ist die einzige wahre Währung an diesem Hof, und
  Sie haben meines. Ohne Vorstellung.
