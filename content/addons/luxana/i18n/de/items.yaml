item_luxana_summons_title: Hof-Vorladung
item_luxana_summons_desc: >-
  Ein schweres Dokument, versiegelt in tiefem Kaiserrot, das dich namentlich
  und nach Element anfordert. Der Hof von Luxana wünscht, dass die seltene
  Schatten-Gabe ordentlich studiert wird — unter Meister Elian vom
  Hofmagier-Kollegium. Absolventen werden selten direkt in die Hauptstadt
  gerufen. Du bist offenbar nicht die meisten Absolventen.
