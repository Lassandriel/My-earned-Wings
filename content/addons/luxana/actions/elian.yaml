# Meister Elian — mentor + bookends of the Luxana chapter.
#   Step 1: first meeting (gated on luxana-summoned). Opens the chapter and
#           introduces the first task-giving noble (Lord Caldwen).
#   Step 2: graduation finale (gated on all four noble experiments done).
#           Elian, who's been observing, confirms the player has mastered
#           supervised shadow work and grants the SECOND shadow slot
#           (grantShadowSlot) — Luxana's structural reward, mirroring how
#           Sariel granted the first in Vandara.
# The four experiments themselves live in actions/nobles.yaml.

- id: act-npc-luxana-elian
  npcId: npc-luxana-elian
  category: npc
  isStory: true
  chapter: chapter_luxana
  progKey: luxanaElian
  maxProgress: 2
  journalIcon: 🔮
  icon: 🔮
  journalColor: '#8b5cf6'
  steps:
    # 1 — First meeting. Overwhelmed veteran imperial tutor, handed the
    # first shadow-shifter. Sets luxana-elian-met as the anchor flag for
    # the chapter's next beats, and surfaces the first noble who has a
    # problem only a shadow can solve.
    - cost: 5
      costType: energy
      requirements:
        flags.luxana-summoned: true
      onSuccess:
        - type: setFlag
          flag: luxana-elian-met
          value: true
        - type: unlockNPC
          id: npc-luxana-caldwen
        # Pell, the court page, is around from the start — gossip + texture.
        - type: unlockNPC
          id: npc-luxana-pell
        - type: log
          logKey: luxana_elian_met
          color: var(--gold)
      dialogueKey: npc_luxana_elian_1
    # 2 — Convergence finale. Gated on BOTH the work (all four noble
    # experiments) AND the story coming to a head (Brannoc's archive
    # revelation + Hauptmann Veyl's challenge). This beat IS the court
    # hearing: Veyl moves to leash the shadow, but the nobles' favour,
    # Elian's certification and the archive truth tip the balance. The
    # player leaves Luxana of their own will, carrying the unanswered
    # question — and the second shadow as Elian's parting gift.
    - cost: 25
      costType: magic
      requirements:
        flags.luxana-exp-vault: true
        flags.luxana-exp-cradle: true
        flags.luxana-exp-stage: true
        flags.luxana-exp-bloom: true
        flags.luxana-archive-revealed: true
        flags.luxana-captain-confronted: true
      onSuccess:
        - type: setFlag
          flag: luxana-complete
          value: true
        - type: grantShadowSlot
          by: 1
        - type: log
          logKey: luxana_elian_finale
          color: var(--gold)
      dialogueKey: npc_luxana_elian_2
  customExecute: npc_execute
