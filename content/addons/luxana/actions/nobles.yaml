  journalIcon: 🍼
  icon: 🍼
  journalColor: '#c98ab0'
  steps:
    - cost: 15
      costType: magic
      rewards:
        shards: 25
      requirements:
        flags.luxana-elian-met: true
      onSuccess:
        - type: setFlag
          flag: luxana-exp-cradle
