# The four noble experiments. Each is a single supervised shadow task that
# sets its completion flag and branches the unlock graph (see npcs/nobles.yaml).
# One step each for now — dialogue, multi-step build-up and any crafting come
# in later iterations. All are gated on luxana-elian-met so they can't fire
# before the chapter properly opens.

# ── Lord Caldwen — the flooded vault ──────────────────────────────────
# A strongroom under his estate has flooded; his signet sank behind a
# narrow iron grate. No drake fits, and water-callers only flood it worse.
# A shadow slips between the bars and lifts it out.
- id: act-npc-luxana-caldwen
  npcId: npc-luxana-caldwen
  category: npc
  isStory: true
  chapter: chapter_luxana
  progKey: luxanaCaldwen
  maxProgress: 1
  journalIcon: 🗝️
  icon: 🗝️
  journalColor: '#b8860b'
  steps:
    - cost: 15
      costType: magic
      rewards:
        shards: 25
      requirements:
        flags.luxana-elian-met: true
      onSuccess:
        - type: setFlag
          flag: luxana-exp-vault
          value: true
        # Word spreads at court: two more nobles step forward.
        - type: unlockNPC
          id: npc-luxana-mirelle
        - type: unlockNPC
          id: npc-luxana-aurel
        # The vault held more than the signet — something far older came up
        # with it. That oddity starts the chapter's plot thread: it leads to
        # the court archivist, Brannoc.
        - type: setFlag
          flag: luxana-vault-relic
          value: true
        - type: unlockNPC
          id: npc-luxana-brannoc
        - type: log
          logKey: luxana_caldwen_done
          color: var(--gold)
        - type: log
          logKey: luxana_vault_relic
          color: var(--accent-purple)
      dialogueKey: npc_luxana_caldwen_1
  customExecute: npc_execute

# ── Lady Mirelle — the fragile cradle ─────────────────────────────────
# Her child sleeps in an heirloom cradle too delicate for claws; a charm
# slipped beneath it must be retrieved without waking the babe or cracking
# the wood. A shadow's touch has no weight.
- id: act-npc-luxana-mirelle
  npcId: npc-luxana-mirelle
  category: npc
  isStory: true
  chapter: chapter_luxana
  progKey: luxanaMirelle
