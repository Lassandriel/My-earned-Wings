# Vandara's alchemy section — appears in Main's Herstellen sub-tab
# once the player has built the Alchemy Laboratory as a housing
# addon. Pure data: no HTML, no base-game touch. The Main view
# iterates the section registry and renders this automatically.
#
# Each individual recipe carries its own
# `requirements: { flags.build-vandara-alchemy-laboratory: true }`
# so it stays locked until the lab is built. The section-level
# requiresFlag here is the same — hides the section header until
# the player actually has the laboratory, no greyed-out empty pane.
- id: section-vandara-alchemy
  subTab: herstellen
  headerLabel: ui_tab_vandara_alchemy
  actionCategory: vandara_workshop
  requiresFlag: build-vandara-alchemy-laboratory
