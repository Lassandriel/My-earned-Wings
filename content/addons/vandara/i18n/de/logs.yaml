receive_vandara_letter: >-
  Aria überreicht dir einen Brief mit roségoldenem Siegel. Eine
  Einladung zur Akademie in Vandara.
vandara_admitted: >-
  Du wurdest in Vandara aufgenommen. Die Akademie liegt vor dir.
vandara_enrolled: >-
  Olié reicht dir den Studentenausweis. Du bist offiziell
  Studentin/Student der Roségold-Akademie.
vandara_alchemy_laboratory_built: >-
  Dein Alchemielabor steht. Jetzt fehlt nur noch jemand, der dir
  zeigt, was du damit anfangen kannst.
vandara_dorm_built: >-
  Du hast ein Studentenzimmer in Vandara gemietet. Klein, aber deins.
vandara_loft_built: >-
  Du bist in ein sonniges Gelehrten-Loft gezogen. Überall Licht —
  Schatten fallen hier leicht.
vandara_catacomb_built: >-
  Du hast dir eine verborgene Kammer in den Katakomben gesichert.
  Still, dunkel, und völlig abseits der Akten.
vandara_katakomben_unlocked: >-
  Fafa zeigt dir den verborgenen Zugang zu den Katakomben unter
  Vandara. Eine andere Stadt liegt unten.
vandara_veyra_intro_done: >-
  Du hast Veyras Element-Diagnostik-Sprechstunde abgeschlossen.
vandara_ormias_intro_done: >-
  Du hast Ormias' Grundkurs Drachenkunde abgeschlossen.
vandara_quinell_intro_done: >-
  Du hast Quinells Grundkurs Arkane Grundlagen abgeschlossen.
vandara_trial_fire: Feuerprobe — keine Resonanz.
vandara_trial_earth: Erdprobe — keine Resonanz.
vandara_trial_wind: Windprobe — keine Resonanz.
vandara_trial_tide: Gezeitenprobe — keine Resonanz.
vandara_trial_light: >-
  Lichtprobe — etwas zuckt. Aber kein klares Licht. Veyra ist
  beunruhigt-fasziniert.
vandara_shadow_revealed: >-
  Veyra hat es bestätigt: du bist ein Schattenwandler. Eine
  Sub-Variante des Lichts, extrem selten. Sie gibt dir einen
  Namen mit — Sariel, eine alte Kollegin, die vor vierzig Jahren
  die Akademie verließ.
vandara_shadow_trained: >-
  Sariel hat dich durch die Grundlagen geführt. Du bist
  aufgewacht — der Rest kommt mit der Übung.
vandara_shadow_bind_learned: >-
  Sariel hat dir beigebracht, einen Schatten an eine Aufgabe zu
  binden. Magie läuft die ganze Zeit ab; vorerst nur ein
  Schatten gleichzeitig.

# Reveal-Reaktions-Beats. Die Nachricht hat sich durch die
# Akademie verbreitet und jeder dieser NPCs hatte etwas dazu
# zu sagen.
vandara_ormias_reveal_reaction: >-
  Ormias frisst graziös seine "Spätzünder-Großdrache"-Prognose
  und lädt dich zum Wiederkommen ein.
vandara_quinell_reveal_reaction: >-
  Quinell bestätigt leise, dass Sariel von Anfang an Recht hatte.
vandara_olie_reveal_reaction: >-
  Olié aktualisiert deine Studierenden-Akte. Element: Schatten,
  Sub-Variante Licht, Vermerk: selten.
vandara_pamle_reveal_reaction: >-
  Pamle hat es gehört. Sagt, sie überlegt sich passende
  Schatten-Reagenzien.

# Abschluss-Arc — Olié setzt die Prüfung an, der Spieler läuft
# die drei Stationen, kehrt fürs Diplom zurück.
vandara_exam_scheduled: >-
  Olié hat deine Abschluss-Prüfung angesetzt. Drei Stationen:
  Veyra für die Praxis, Ormias für die Mündliche, Quinell für
  die Schriftliche.
vandara_exam_veyra_done: >-
  Praxis-Prüfung bestanden. Veyras Notiz: "beispielhafte
  Kontrolle für eine:n Erstjährige:n Schattenwandler:in."
vandara_exam_ormias_done: >-
  Mündliche Prüfung bestanden. Ormias' Notiz: "kannte alle sieben
  und benannte die achte unaufgefordert."
vandara_exam_quinell_done: >-
  Schriftliche Prüfung bestanden. Quinells Notiz:
  "zufriedenstellend" — sein höchstes Lob in vierzig Jahren.
vandara_graduated: >-
  Du hast die Roségold-Akademie von Vandara abgeschlossen.

vandara_pamle_intro_done: >-
  Pamle hat dir die beiden Basis-Rezepte gezeigt — Energietrank
  und Magietrank.
vandara_pamle_tier2_done: >-
  Pamle nimmt deine drei Energietränke und lehrt dich Tier-2 —
  Wachpollen-Tee und Funkenlicht-Phiole.
vandara_pamle_tier3_done: >-
  Pamle nimmt drei Funkenlicht-Phiolen und unterrichtet dich in
  Arkanwasser und Aschebrand-Tinktur.
vandara_alchemy_mastered: >-
  Du beherrschst Pamles komplettes Grundkurs-Repertoire.
  Komplexere Rezepte kommen später.

# Katakomben-Studenten-Arc — drei Schleifen, dann Festnahme.
vandara_korren_1_done: >-
  Korren hat ein schwaches Echo aus einem Schmiede-Ring geweckt.
  Er ist zufrieden.
vandara_korren_2_done: >-
  Korren hat ein deutlicheres Echo aus einer alten Militärmünze
  gezogen. Er läuft auf und ab.
vandara_korren_arc_done: >-
  Korren hat eine kaiserliche Archiv-Scherbe aufgebrochen. Die
  Kerze ist eine Sekunde lang erloschen. Er sieht nicht gut aus.
vandara_iska_1_done: >-
  Iskas Löffel ist zehn Sekunden lang von alleine gestanden. Sie
  ist begeistert und leicht blutend.
vandara_iska_2_done: >-
  Iskas Uhrwerksfigur ist drei Schritte gelaufen. Der Hof wird
  davon erfahren.
vandara_iska_arc_done: >-
  Iskas Knochen-Puppe ist im Kreis gelaufen und hat sich zu dir
  umgedreht. Iska lacht. Du nicht.
vandara_daven_tip_1: >-
  Marschall Daven ist eingetroffen und bittet dich um einen
  allgemeinen Bericht.
vandara_daven_tip_2: >-
  Du hast beide Experimente im Detail beschrieben. Daven macht
  Notizen.
vandara_catacomb_students_busted: >-
  Du hast Marschall Daven zu beiden Werkbänken geführt. Korren
  und Iska sind verhaftet. Deine Rolle: kooperierende Zeug:in.
