act-vandara-brew-energy-potion-small:
  title: "Kleinen Energietrank brauen"
  desc: >-
    Pamles erstes Rezept. Kräuter im Mörser zerstampft, mit lauwarmem
    Wasser aufgegossen, einmal kräftig umgerührt. Schmeckt nach
    Wiese und schlechtem Tee — wirkt aber sofort.

act-vandara-brew-magic-potion-small:
  title: "Kleinen Magietrank brauen"
  desc: >-
    Blüten in Wasser destilliert. Färbt sich blass-lila wenn er
    fertig ist. Hilft beim Konzentrieren, schmeckt wie der erste
    Schluck von etwas Verbotenem.

act-vandara-brew-pollen-tea:
  title: "Wachpollen-Tee brauen"
  desc: >-
    Leuchtpollen über Blüten gepudert, eine Minute ziehen lassen.
    Heller Aufguss, der dich für eine Weile durchgehend regeneriert
    statt einmal kurz aufzuwecken.

act-vandara-brew-spark-vial:
  title: "Funkenlicht-Phiole brauen"
  desc: >-
    Glitzerstaub in einer Ascheblume gebunden. Die Phiole leuchtet
    von selbst — ein tragbares Licht, das du an deinen Gürtel
    hängen kannst. Senkt die Magiekosten eines gebundenen Schattens.

act-vandara-brew-arcane-water:
  title: "Arkanwasser brauen"
  desc: >-
    Studentenstandard: Arkanstaub in Wasser gelöst, mit einer
    Prise Glitzerstaub stabilisiert. Knackiger Magieschub jetzt,
    sanfte Nachwirkung danach.

act-vandara-brew-ash-tincture:
  title: "Aschebrand-Tinktur brauen"
  desc: >-
    Pamles eigene Erfindung. Ascheblumen-Pollen mit Harz
    konzentriert. Macht für zwei Minuten zu einer
    Holzfäll-Maschine — mehr Ausbeute aus jedem Schlag.
