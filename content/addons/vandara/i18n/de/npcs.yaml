npc_teacher_vandara_letter: >-
  "Bevor du gehst, {player}... das hier ist heute Morgen für dich
  angekommen." Aria zieht einen gefalteten Brief aus ihrer Tasche.
  Das Siegel schimmert in einem warmen Roségold. "Aus Vandara. Die
  Roségold-Akademie. Ich habe ihnen geschrieben, nachdem ich gesehen
  habe, wie ernsthaft du gelernt hast. Es ist nur eine Einladung —
  keine Verpflichtung. Aber wenn du wissen willst, was du wirklich
  bist, ist das vielleicht der richtige Weg."

# ─── Gate guard at the Vandara city walls ──────────────────
# (his name lives in ui.yaml — base game convention puts NPC name
# keys there, npcs.yaml is just for dialogue strings.)
# Olié — Sekretariat / Einschreibung
npc_vandara_olie_1: >-
  Sekretär Olié sieht von seinem Stapel Akten auf — eine elegant
  gefiederte Schlange mit irisierenden Schuppen, die wie nasse
  Kieselsteine glänzen. "Ah. Eine Neueinschreibung." Er lächelt
  höflich, aber distanziert. "Bitte nehmen Sie Platz. Wir gehen das
  Notwendige der Reihe nach durch. Name, Herkunft, Element wenn
  bekannt." Sein Federkamm zuckt leicht, als du beim letzten Punkt
  zögerst. "Unbekannt ist auch eine Antwort, keine Sorge."

npc_vandara_olie_2: >-
  "So, die Einschreibegebühr." Olié schiebt dir ein winziges
  Bronzeschälchen über den Tisch. "Fünfundzwanzig Splitter, einmalig.
  Die Akademie selbst ist kostenfrei — wir sind nicht das
  Kristallreich. Die Gebühr deckt nur den Verwaltungsaufwand und
  einen Schluck Tee, falls Sie länger warten müssen."

npc_vandara_olie_3: >-
  "Hier ist Ihr Ausweis." Olié reicht dir ein dünnes, schweres
  Plättchen aus poliertem Roségold. "Damit kommen Sie überall hin,
  wo Sie hindürfen — und ein paar Orte, wo Sie eigentlich nicht
  hindürften, aber die niemand kontrolliert." Er tippt auf eine
  Liste auf seinem Schreibtisch. "Ihre Mentoren. Lektor Ormias hält
  Drachenkunde. Doktor Quinell betreut die Arkanen Grundlagen. Und
  Praktikerin Pamle gibt Alchemie, allerdings ergibt ihr Unterricht
  erst Sinn, wenn Sie sich ein Alchemielabor eingerichtet haben."
  Eine höfliche Pause. "Da Sie Ihr Element nicht angeben konnten,
  schicke ich Sie zusätzlich zu Magistra Veyra. Sie führt die
  Diagnostik durch — keine Vorlesung, eine Sprechstunde. Die Beste
  der Stadt. Die Akademie hat Glück, sie zu halten." Ein höfliches
  Nicken. "Willkommen in Vandara, Studentin."

# Kal're — Händlerin auf den Straßen Vandaras
npc_vandara_kalre_1: >-
  Eine junge Drachenwandlerin mit silberblauen Haaren und einem Stand
  voller Glasgefäße ruft dir zu. "Du bist neu, ja? Sieht man." Sie
  grinst breit. "Kal're, aus dem Kristallreich. Windlinie. Habe ich
  schon gesagt, dass ich aus dem Kristallreich bin? Das tu ich gern,
  dann fragt niemand, warum ich Schuppen wie Glas habe." Sie schiebt
  dir ein Schälchen Ascheblumen zu. "Schnupper mal. Riecht nach
  Vulkanstaub und nach einer Sache, die du nicht benennen kannst.
  Wenn du jemals in ein Alchemielabor kommst, wirst du sie brauchen."

npc_vandara_kalre_2: >-
  "Du bist wieder da! Gut, gut." Kal're sortiert Glitzerstaub in
  winzige Tütchen. "Wirst sehen, in Vandara redet jeder mit jedem
  und alle wissen alles. Außer das, was sie nicht wissen sollen —
  da sind sie erstaunlich diszipliniert."

npc_vandara_kalre_3: >-
  "Du fragst dich, ob ich dir traue, ja?" Sie lacht. "Genug. Hör mal
  — du kaufst andauernd meine Reagenzien, aber du hast nichts, wo
  du sie verarbeiten könntest. Die meisten Akademie-Studenten
  stellen sich ein kleines Alchemielabor ins Haus. Zwei Regale,
  ein Kupferbecken, ein Abzug." Sie skizziert es auf die
  Rückseite einer Tüte. "Hier. Bring Holz und Stein mit, jetzt
  weißt du, wie's zusammengeht."

npc_vandara_kalre_4: >-
  Kal're winkt dich näher. "Weißt du, was das Lustige an Vandara
  ist? Die Akademie tut so, als wäre sie das Herz der Stadt. Aber
  die echten Sachen passieren in den Hinterzimmern. Auf den Straßen.
  In den Katakomben unten." Sie blinzelt. "Sag's nicht weiter."

npc_vandara_kalre_5: >-
  "Du bist jetzt einer von meinen Stammkunden." Kal're tippt sich
  gegen die Stirn. "Wenn du je was Seltenes brauchst — was wirklich
  Seltenes — komm zu mir, bevor du irgendwen anders fragst. Ich
  finde es. Oder kenne jemanden, der's findet."

# Fafa — Bettlerin am Brunnen
npc_vandara_fafa_1: >-
  Eine alte Drachenwandlerin sitzt zusammengesunken am Rand des
  Brunnens, in einen verstaubten grauen Umhang gehüllt. Schuppen wie
  geborstener Granit lugen unter dem Stoff hervor. Sie hebt nicht
  den Kopf, aber eine knochige Hand streckt sich dir entgegen. "Ein
  paar Splitter für eine alte Erddrachin?" Als du gibst, blickt sie
  endlich auf — graue Augen, scharf wie frisch geschliffene Klingen.
  "Danke, Kind. Du bist neu. Diese Stadt hat Namen, weißt du? Nicht
  nur den, der oben am Tor steht. Komm wieder — ich erzähle dir
  einen."

npc_vandara_fafa_2: >-
  Fafa nimmt die Splitter, ohne hinzusehen. "Vandara heißt 'Wandel'.
  Aber sie sagen dir nie, wer den Wandel will und wer ihn fürchtet."
  Sie deutet auf die Akademie hinter dir. "König Archivaris, der
  alte Knochenhalter, will alles so behalten wie's war. König-
  Rektorin Novia will alles neu. Die beiden streiten sich seit
  Jahren vor dem Kaiserhof. Solange sie streiten, regiert in
  Wahrheit niemand. Das macht Vandara... interessant. Komm wieder."

npc_vandara_fafa_3: >-
  "Du kommst immer wieder. Das ist selten." Fafa lächelt, und für
  einen Moment sieht sie nicht alt aus, sondern müde. "Hör zu, Kind.
  Die Studenten in den oberen Hörsälen lernen, was die Mentoren
  beibringen dürfen. Was sie wirklich wissen wollen, lernen sie
  woanders. Unter der Stadt. Komm noch einmal wieder, und ich zeige
  dir, wo."

npc_vandara_fafa_4: >-
  Diesmal nimmt Fafa keine Splitter. Sie steht auf — und ist auf
  einmal größer, als du gedacht hast. "Komm." Sie führt dich zu
  einem unscheinbaren Gully hinter dem Brunnen, schiebt das Eisen
  beiseite, als wäre es ein Vorhang. "Die Katakomben. Die alten
  Tunnel aus der Zeit vor dem Unaussprechlichen. Hier unten findest
  du die, die dir wirklich helfen können — wenn du den Mut hast
  herunterzukommen." Sie blickt dich lange an. "Geh nicht alleine
  hin, bis du jemanden kennst, dem du dort vertraust. Aber geh."

# ─── Veyra — Element-Diagnostik (Sprechstunde, kein Kurs) ───────
npc_vandara_veyra_1: >-
  Magistra Veyra empfängt dich in einem sonnenhellen
  Sprechzimmer — hohe Fenster, eine samtene Untersuchungsliege,
  Instrumente säuberlich auf einem Beistelltisch, daneben eine
  kleine Karaffe gekühltes Wasser. Sie ist eine Sonnen-Amphithere,
  Gold und sanftes Orange, ihre Federn werfen das Tageslicht über
  jede Fläche. "Willkommen, {player}. Olié hat Sie geschickt, ja?
  Gut. Das hier ist kein Unterricht — das ist eine Sprechstunde.
  Sie konnten ihm kein Element nennen. Völlig in Ordnung." Sie
  weist auf die Liege. "Wir finden es gemeinsam heraus. Die
  meisten Studenten wissen es schon von zuhause. Die paar, die
  nicht — sind oft die interessantesten."

npc_vandara_veyra_2: >-
  "Zuerst die Anamnese." Veyra macht Notizen auf eine kleine
  Schiefertafel, ihr gefiederter Kamm aufmerksam geneigt.
  "Erzählen Sie mir, was Sie zuhause gespürt haben. Irgendetwas,
  das an Ihnen gezogen hat — Wärme in den Händen, Schwere in der
  Brust, Trockenheit im Hals wenn Sie wütend waren, ein Geräusch,
  das sonst niemand gehört hat. Auch nichts ist eine Antwort."
  Sie hört geduldig zu. "Magie ist an Ihr Element gebunden. Sie
  können nicht wechseln, nur finden. Manche erkennen es in einem
  einzigen Moment. Andere brauchen Übungen. Wir machen beides.
  Beim nächsten Mal beginnen wir mit den Resonanztests."

npc_vandara_veyra_3: >-
  "Schließ die Augen." Veyra dimmt die Lichter mit einem
  Flügelschlag. "Atme. Nicht versuchen, was zu tun. Nur spüren, was
  da ist. Hände leicht offen, Magie soll dich finden, nicht
  umgekehrt." Sie wartet. Lange. Dann ihre Stimme, ruhig: "Mhm. Da
  ist was. Aber ich krieg's noch nicht zu fassen. Komm wieder. Wir
  testen genauer."

npc_vandara_veyra_4: >-
  "Heute brauche ich mehr von dir." Veyra hat verschiedene kleine
  Objekte vor sich ausgebreitet: ein Stein, eine Schale Wasser, eine
  Kerze, eine Feder, ein Spiegel. "Wir probieren der Reihe nach. Du
  legst die Hand drauf, ich beobachte. Kein Druck — wenn nichts
  passiert, passiert nichts." Sie macht eine Pause. "Aber sei
  vorbereitet: Resonanz fühlt sich nie an wie erwartet."

npc_vandara_veyra_5: >-
  "Du bist wieder da. Gut." Veyra wirkt heute angespannt. "Das
  Lichtzucken bei der Probe — das war nicht nichts. Das war auch
  nicht normal. Setz dich, ich will einen tieferen Test machen."
  Sie löscht jedes einzelne Licht im Hörsaal bis auf eine kleine
  Kerze hinter dir. "Streck deine Hand zur Kerze. Nicht reinfassen.
  Nur... fühlen, was zwischen dir und der Flamme passiert."
  Lange Stille. Dann ihre Stimme, plötzlich anders: "Oh. Oh,
  {player}. Du machst keinen Schatten. Du... ZIEHST den Schatten
  an. Aus der Wand, aus der Decke, aus mir." Sie lacht atemlos. "Du
  bist kein Lichtwandler. Du bist ein Schattenwandler. Das ist...
  ich hab noch nie einen gesehen."

npc_vandara_veyra_6: >-
  Veyra ist deutlich nachdenklicher heute. "Schatten ist eine
  Sub-Variante von Licht. So wie Traum eine Variante von Gezeiten
  ist. Aber sie ist selten. Sehr selten. In meinen vierzig Jahren
  als Lehrkraft habe ich noch nie einen gehabt." Sie schaut dich
  ernst an. "Ich kann dir die Theorie geben. Aber die Praxis —
  da bin ich raus. Du brauchst jemanden, der das wirklich gelebt
  hat. Es gibt..." Sie zögert. "Es gibt jemanden. Aber die Person
  ist nicht mehr an der Akademie. Frag Fafa am Brunnen. Sie weiß
  wo. Und sei vorsichtig — Schatten klingt cool, aber nicht alle
  in dieser Stadt sehen das so."

# Element-Übungen — knappe Reaktionsbeschreibungen, die jede Trial
# als Tooltip-Text mitliefert (dialogueKey im step).
vandara_trial_fire_dialog: >-
  Du legst die Hand über die kleine Flamme. Wärme, klar — aber
  keine Resonanz. Veyra schüttelt den Kopf. "Kein Feuer."

vandara_trial_earth_dialog: >-
  Der Stein liegt schwer in deiner Hand. Du wartest. Nichts. Veyra
  notiert sich etwas. "Kein Erde."

vandara_trial_wind_dialog: >-
  Du hältst die Feder hoch. Sie schwebt einen Moment, fällt dann.
  Normal — kein magisches Heben. Veyra: "Kein Wind."

vandara_trial_tide_dialog: >-
  Die Hand über der Wasserschale. Die Oberfläche kräuselt sich
  leicht — von deinem Atem, nicht von dir. Veyra: "Kein Gezeiten."

vandara_trial_light_dialog: >-
  Du blickst in den kleinen Spiegel. Etwas zuckt. Nicht im Spiegel —
  IM Raum hinter dir. Veyra hebt scharf den Kopf. "Da. Da war was.
  Aber kein klares Licht. Komm zurück, sobald du kannst — ich will
  das genauer untersuchen."

# ─── Fafa Stufe 5 — Patch, führt zu Sariel ────────────
npc_vandara_fafa_5: >-
  Fafa hat schon gewartet, als du herankommst. Sie steht heute,
  nicht hocken. "Du warst bei Veyra. Sie hat es dir gesagt." Es
  ist keine Frage. "Ich wusste, an dem Tag wo du das erste Mal
  Splitter in meine Hand gelegt hast — du hast die Wand hinter
  mir kürzer gemacht. Ein bisschen. Sieht keiner außer mir." Sie
  greift nach deiner Hand und führt dich die Stufen in den Gully
  hinunter. "Komm. Es gibt jemanden, der wartet seit fünfzig
  Jahren auf jemanden wie dich. Sei nicht unhöflich, sei nicht
  vorsichtig, sei einfach da."

# ─── Sariel — Schatten-Mentor:in in den Katakomben ────────
npc_vandara_sariel_1: >-
  Der Tunnel öffnet sich zu einer kleinen Kammer. Eine einzige
  Kerze brennt auf einem niedrigen Tisch. Die Person dahinter
  dreht sich nicht um — sie sortiert weiter Notizen auf dem Tisch
  mit den Fingerspitzen. "Du bist viel zu groß für deine Schritte,
  {player}. Lauf leiser, wenn du in einem Tunnel bist. Sonst hörst
  du nicht, wenn jemand vor dir steht." Ihre Schuppen — wenn man
  sie überhaupt so nennen kann, scharfe schwarze Kristalle entlang
  des Halses — klirren leise. Sariel hebt den Kopf, sieht in deine
  Richtung, aber nicht in deine Augen. "Ah. Setz dich. Ich bin
  Sariel. Mach es dir bequem — die Kerze reicht für uns beide,
  ich brauche kein Licht."

npc_vandara_sariel_2: >-
  "Du willst wissen, was Schatten ist." Sariel schiebt ein altes
  Buch in deine Richtung, ohne hinzusehen. "Hier. Arkane Grundlagen
  Kapitel sechs. Quinell hat es dir empfohlen, oder? Er hat es vor
  vierzig Jahren in meiner Klasse abgeschrieben. Lies." Sie
  pausiert. "Oder lass es. Ich kenne es auswendig. Schatten ist
  Licht, das genug Tiefe hat, dass es einen Eigenwillen entwickelt.
  Wenn ein Licht in einen Raum fällt, machst du als Lichtwandler
  Helligkeit. Du machst Hohlräume. Die Hohlräume HÖREN dir zu.
  Verstanden? Nein? Gut. Das war eine Lüge, weil ich es kurz
  machen wollte. Lies das Kapitel."

npc_vandara_sariel_3: >-
  "Steh in das Licht." Sariel deutet auf die Kerze. "Jetzt streck
  die Hand aus. Nicht zur Kerze. Zum Schatten den du wirfst." Du
  zögerst. Sariel grinst, das erste Mal heute. "Ja, das geht. Fühl,
  nicht denk. Schatten sind dichter als normales Licht — spürbar,
  wenn man weiß wo." Lange Stille. Dann: "Ah. Da. Du hast ihn
  gegriffen. Spürst du das Gewicht? Sehr gut. So habe ich das auch
  gelernt, mit zwölf, von einer Wandlerin im Smaragd-Wald. Auch
  blind, wie ich jetzt. Sie hat damals gemeint, Augen seien nur
  ein Weg von vielen. Ich hab's erst geglaubt als ich es musste."

# ─── Pamle — Alchemie-Mentorin (Magma-Drachenwandlerin) ───
npc_vandara_pamle_1: >-
  Pamle ist ein kompakter Magma-Drachenwandler, in humanoider
  Form gerade so groß wie deine Schulter, mit Schuppen wie
  verkrusteter Lava über den Unterarmen. Sie steht vor einem
  improvisierten Tisch voller leerer Phiolen und zerstoßener
  Pflanzenreste. "{player}, oder? Setz dich. Ich mach das schnell:
  ich bin Pamle, ich unterrichte Alchemie. Wir fangen mit zwei
  ganz simplen Rezepten an — Energietrank und Magietrank. Mehr
  als Kräuter, Wasser und ein bisschen Hitze brauchen die nicht."
  Sie tippt sich gegen die Schläfe. "Geh nach Hause, bau dir die
  Werkstatt von Kal'res Bauplan, stell den Alchemietisch in dein
  Zimmer. Dann kannst du das brauen. Komm wieder wenn du drei
  Energietränke gemacht hast — DREI, nicht zwei, nicht 'fast
  drei'. Dann zeige ich dir was Besseres."

npc_vandara_pamle_2: >-
  Pamle wartet schon mit ausgestreckter Hand. "Drei Energietränke,
  ja? Gut." Sie nimmt sie kommentarlos entgegen und stellt sie in
  ein Regal hinter sich. "Ich verkaufe die übrigens an die
  Erstsemester für gutes Geld, falls du dich gefragt hast. Bildung
  ist nicht umsonst." Ein scharfes Grinsen. "Jetzt zu Tier zwei:
  Wachpollen-Tee — Regeneration über Zeit. Und Funkenlicht-Phiole
  — die wirst du noch zu schätzen wissen, glaub mir. Sariel
  unten in den Katakomben hat sie früher kistenweise bestellt." Sie
  hustet, als hätte sie zu viel gesagt. "Üb. Bring mir drei
  Funkenlicht-Phiolen wenn du soweit bist."

npc_vandara_pamle_3: >-
  "Funkenlicht-Phiolen. Drei. Schön." Pamle wiegt sie in der Hand,
  prüft die Helligkeit. "Sauber gearbeitet. Du verstehst die
  Dosierung." Sie räumt sie ins Regal. "Letzte Runde. Arkanwasser
  ist Standard für jeden Studenten, der Magie betreibt. Und
  Aschebrand-Tinktur — die ist meine eigene Erfindung. Aus den
  Pollen einer Asche-Weide. Macht dich für zwei Minuten zur
  Holzfäll-Maschine. Du wirst nicht glauben, wie viele Aufträge
  die Akademie dafür von den Bauunternehmen bekommt." Sie nickt
  zur Tür. "Komm einmal noch wieder. Dann hab ich dir alles
  beigebracht was ich grad anbieten kann."

npc_vandara_pamle_4: >-
  "So." Pamle wischt sich die Hände an einer Schürze ab, die
  schon viel zu viel gesehen hat. "Das war's mit den Grundlagen.
  Du beherrscht jetzt die sechs Basis-Rezepte. Was kommt, wird
  schwerer — Sternenfrüchte sind selten, Glut-Lotos noch
  seltener, und einige Rezepte verlangen Reagenzien die nur
  Gewitter-Seraphe einsammeln können. Aber bis dahin hast du noch
  was zu tun." Sie reicht dir die Hand. "Geh und braue. Wenn ich
  je was Neues unterrichte, weißt du wo du mich findest. Ach —
  und Pamle ist nicht mein voller Name, ich hab nie einen
  bekommen. Spar dir die Frage."

npc_vandara_sariel_4: >-
  "Du bist jetzt nicht ausgebildet. Du bist aufgewacht — das ist
  was anderes." Sariel sortiert wieder ihre Notizen. "Was du
  brauchst, lernst du jetzt von selbst. Komm wieder, wenn du
  etwas Komplizierteres versuchen willst. Beim nächsten Mal
  bring mir eine Schale Wasser mit — zeig ich dir, wie du einen
  Schatten holen lässt, der sie hält, während du andere Sachen
  machst. Das ist eigentlich der praktische Teil." Sie lacht
  trocken. "Vierzig Jahre Lehrerin und ich verspreche immer noch
  das Spannende für die nächste Stunde."

# ─── Ormias — Drachenkunde ────────────────────────────
# Eine Lehrstunde pro Hauptart: Intro, Großdrachen, Wyvern,
# Lindwürmer, Amphithere, Leviathane, Seraphe, Fae, und zum
# Schluss Lung-Drachen als Dramatic-Irony-Knipser.
npc_vandara_ormias_1: >-
  Lektor Ormias ist alt. Sehr alt. Sein Drachenform-Schädel
  schimmert beim Reden in der Sonne — Magma-Lindwurm-Linie,
  Schuppen wie erstarrte Lava. Er trägt zerknitterte Roben und
  eine Brille, die ihm wirklich nicht passt. "Setz dich,
  Studierende. Drachenkunde, Grundkurs. Sieben Hauptarten kennen
  wir: Großdrachen, Wyvern, Lindwürmer, Amphithere, Leviathane,
  Seraphe, Fae. Dazu noch die kaiserlichen Lung-Drachen — eine
  Ausnahme, die nehmen wir uns zuletzt vor." Er hustet. "Eine
  pro Sitzung. Keine Abkürzungen. Und merk dir das absolut
  Wichtigste über sie alle: sie haben alle Flügel." Eine Pause.
  "Ja. Alle."

npc_vandara_ormias_2: >-
  "Großdrachen. Die Hüter der Reiche. Das Brot-und-Butter-Volk
  aus dem Kristallreich im Westen." Ormias skizziert eine
  vierbeinige Silhouette an die Tafel — die Kreide bricht.
  "Kräftiger Körperbau, vier Beine, ein Paar breite
  Lederschwingen, oft eine gepanzerte Schwanzspitze und große
  Hörner. Die häufigste Art mit Abstand. Viele Spätzünder —
  Flügel kommen manchmal erst mit zwanzig oder dreißig." Er
  schaut dich über seine Brille an. "Statistisch bist du
  höchstwahrscheinlich einer von diesen. Geduld. Sie kommen."

npc_vandara_ormias_3: >-
  "Wyvern. Die Jäger der Lüfte." Wieder eine Skizze — die
  Kreide bricht erneut. "Nur zwei Hinterbeine. Die Vorderbeine
  sind in der Evolution mit den Flügeln verschmolzen. Schnelle,
  muskulöse Flieger, meist mit einem Giftstachel oder einer
  schweren Keule am Schwanzende. Die Sturm-Wyvern haben
  Flügelkanten so scharf, dass sie den Wind wie Klingen
  schneiden." Er schiebt seine Brille hoch. Sie rutscht sofort
  wieder runter. "Häufig im westlichen Tiefland. Du wüsstest,
  wenn du einer wärst — die fliegen jung."

npc_vandara_ormias_4: >-
  "Lindwürmer. Die Erdgebundenen." Zum ersten Mal heute lächelt
  Ormias kurz. "Meinesgleichen. Massiver Körper, nur zwei
  Vorderbeine, die hintere Hälfte ist eine lange Schlange, die
  wir hinter uns herziehen. Flügel haben wir auch, aber
  schwerfällig — in der Luft sind wir nicht graziös. Wir graben,
  wir klettern, wir sind langsam und stur. Zwei Hauptlinien:
  Magma-Lindwürmer, Schuppen wie glühende Lava, leben nahe dem
  Lavameer. Und Sumpf-Lindwürmer, Schuppen wie Algen und Rinde,
  getarnt im Urwald von Smaragd." Er hustet. "Von Fremden manchmal
  zu westlichen Drachen geworfen. Wir sind östlich. Bring das
  nicht durcheinander."

npc_vandara_ormias_5: >-
  "Amphithere. Die gefiederten Schlangen." Ormias gestikuliert
  breit mit beiden Armen. "Keine Gliedmaßen. Nur ein langer
  Schlangenkörper und ein einziges Paar gewaltiger, prächtiger
  Federschwingen — die übrigens magische Energie speichern
  können. Selten. Schön — das gebe sogar ich zu. Zwei bekannte
  Sub-Arten: Traum-Amphithere, deren Flügelschläge Illusionsnebel
  erzeugen. Und Sonnen-Amphithere, goldene Federn, die bei
  Bedrohung in eine blendende Licht-Explosion entladen können."
  Er hebt eine Augenbraue. "Magistra Veyra ist eine. Sag ihr
  nicht, dass ich gesagt habe, sie sei schön."

npc_vandara_ormias_6: >-
  "Leviathane. Die Herrscher der Extreme." Ormias' Stimme wird
  tiefer — Respekt, kein Stolz. "Sie leben dort, wo sonst niemand
  kann. Gezeiten-Leviathane beherrschen die schwebenden
  Wasserinseln und Wasserwege; sehnige Schwingen, die unter
  Wasser als Flossen dienen, feine Kiemenschlitze, absolute
  Herrscher der Strömungen. Magma-Leviathane auf den untersten,
  heißesten Inseln über dem Lavameer; massive gepanzerte Flügel,
  obsidianbeschichtete Schuppen, Lungen die superheiße Gase
  filtern. Einmal im Jahr treffen sie sich an den Lavafällen
  und handeln." Eine kurze Pause. "Die angesehensten Handwerker
  im Reich."

npc_vandara_ormias_7: >-
  "Seraph-Drachen. Die Himmelsstürmer." Ormias' Tonfall wird
  trocken. "Schlank, aerodynamisch, vier bis sechs schmale
  Flügel übereinander gestapelt. Sie leben dort, wo die Luft so
  dünn ist, dass ein Großdrache das Bewusstsein verlieren würde,
  und lachen über unsere Stürme, weil das, was wir Hurrikan
  nennen, ihre Morgenbrise ist." Er winkt ab. "Erwarte nicht,
  einen zu sehen — sie kommen fast nie runter. Wenn doch, sei
  höflich."

npc_vandara_ormias_8: >-
  "Fae-Drachen. Die Smaragd-Weber." Ormias' Mund zuckt — fast
  Zuneigung. "Die Kleinsten. Libellenflügel, Chamäleon-Tarnung,
  ursprünglich aus dem tiefen Urwald von Smaragd. Heute zwei
  Kulturen: die wilden Wald-Fae, die noch immer in der Rinde
  verschwinden, und die Stadt-Fae, die sich an das urbane Leben
  angepasst haben und prächtige, knallbunte Schuppen tragen,
  weil sie in der Stadt nichts mehr fürchten müssen." Er
  lächelt fast. "Wenn du jemals einen in einer Taverne triffst,
  gib ihm einen Drink aus. Bester Klatsch in Draconia."

npc_vandara_ormias_9: >-
  "Und zum Schluss — die Lung-Drachen. Die Himmelsläufer."
  Ormias klopft demonstrativ auf seinen Schreibtisch.
  "Schlangenartig, flügellos, vier Beine mit scharfen Klauen,
  charakteristische Bartfäden am Kopf. Sie fliegen rein durch
  Magie — keine Flügel. Die einzige Ausnahme zu meiner
  Eröffnungsregel." Seine Brille rutscht und er fängt sie
  diesmal nicht auf. "Und bevor du fragst: ja, ich habe gesehen,
  dass du keine Flügel hast. Komm nicht auf Ideen. Lung-Drachen
  sind ein absoluter genetischer Sonderfall — sie kommen
  ausschließlich in der kaiserlichen Blutlinie vor, und selbst
  dort existieren aktuell nur zwei. Kaiser Ignis Aurum und Prinz
  Ryuga. Das ist die Liste." Er räuspert sich. "Du bist
  höchstwahrscheinlich ein Spätzünder-Großdrache. In achtzig
  Prozent der Fälle. Geduld."

# ─── Quinell — Arkane Grundlagen ───────────────────────────
npc_vandara_quinell_1: >-
  Doktor Quinell ist Kristalldrachenwandler — Schuppen wie
  geschliffener Bergkristall, die das Hörsaallicht in alle
  Spektrum-Farben brechen. Er steht hinter einem Stehpult, ohne
  jede Bewegung. "Willkommen. Arkane Grundlagen ist die langweiligste
  Vorlesung, die Sie an dieser Akademie hören werden. Und die
  wichtigste. Wenn Sie nicht verstehen, was Magie IST, werden Sie
  sie niemals präzise anwenden. Sie werden zaubern wie ein Hund
  schwimmt — funktional, hässlich, ineffizient. Wir beginnen mit
  Definitionen."

npc_vandara_quinell_2: >-
  "Magie ist die Manipulation des Äthers durch einen drachischen
  Geist. Drei Komponenten: Element, Wille, Substrat." Quinell
  zeichnet drei Kreise an die Tafel, perfekt symmetrisch. "Element
  ist angeboren. Wille ist Übungssache. Substrat ist das physische
  Material durch das die Magie wirkt — manchmal die eigene
  Drachenform, manchmal ein Werkzeug, manchmal die Luft. Wer diese
  drei nicht im Kopf trennen kann, wird in jedem höheren Kurs
  scheitern."

npc_vandara_quinell_3: >-
  "Heute Wirkungstheorie." Quinell hat einen schweren Quarzstab vor
  sich liegen. "Magie wirkt nicht 'einfach so'. Sie folgt
  Erhaltungsregeln. Was du in die Welt schickst, kommt aus dir.
  Erschöpfung ist kein Versagen, sie ist das Maß deiner Wirkung.
  Wer ohne Erschöpfung zaubert, hat nichts getan." Er pausiert. "Es
  gibt Ausnahmen. Sehr wenige. Wenn Sie eine entdecken, schreiben
  Sie eine Doktorarbeit darüber."

npc_vandara_quinell_4: >-
  Quinell legt dir ein dünnes Heft hin. "Skript zum Grundkurs.
  Kapitel sechs interessiert Sie vielleicht — Schatten als
  theoretische Sub-Variante des Lichts. Reine Theorie, niemand hat
  je einen Schatten-Wandler kennengelernt der bereit war, sich
  untersuchen zu lassen. Vielleicht weil es sie nicht gibt.
  Vielleicht weil sie sich gut verstecken. Beides interessant."
  Sein Ausdruck verändert sich nicht. "Studieren Sie es."

npc_vandara_gate_guard_admit: >-
  Der Torwächter, ein massiver Erddrachenwandler mit Schuppen wie
  geschliffenem Stein, betrachtet dich gemessen, als du den Brief
  hervorholst. Sein Blick gleitet über das roségoldene Siegel, dann
  nickt er knapp. "Erstes Mal in Vandara, ja? Akademie-Einladungen
  sehen wir alle paar Wochen. Du wirst dich noch wundern, wie groß
  diese Stadt unter der Oberfläche ist." Mit einer Handbewegung
  öffnet sich das große Tor hinter ihm. "Willkommen, {player}. Geh
  ruhig — die Mentoren werden dir den Rest erklären."

# Wieder-Begegnung nach dem Schatten-Reveal. Spieler hat zu dem
# Zeitpunkt Akademie eingeschrieben, Element-Tests durch, Mentoren
# kennengelernt — und jetzt herausgefunden dass Schatten ihr/sein
# Element ist. Der Wächter erkennt das auf seine eigene knappe Art.
npc_vandara_gate_guard_respect: >-
  Der Wächter erkennt dich, noch bevor du das Tor erreichst. Er
  richtet sich auf, die Hand kurz an der Brust — keine förmliche
  Geste, sondern eine, die Erddrachenwandler nutzen, wenn sie
  jemanden meinen. "Du hast die Stadt unter der Stadt gesehen. Das
  ändert einen." Er lächelt knapp. "Die meisten kommen mit dem
  Brief, gehen mit dem Brief, sehen nur die Hälfte. Du gehörst jetzt
  zu denen, die beide Hälften kennen. Pass auf dich auf, {player}."
