npc_teacher_vandara_letter: >-
  Bevor du gehst, {player}... das hier ist heute Morgen für dich
  angekommen. Aus Vandara — die Roségold-Akademie. Ich habe ihnen
  geschrieben, nachdem ich gesehen habe, wie ernsthaft du gelernt hast.
  Es ist nur eine Einladung, keine Verpflichtung. Aber wenn du wissen
  willst, was du wirklich bist, ist das vielleicht der richtige Weg.

# ─── Gate guard at the Vandara city walls ──────────────────
# (his name lives in ui.yaml — base game convention puts NPC name
# keys there, npcs.yaml is just for dialogue strings.)
# Olié — Sekretariat / Einschreibung
npc_vandara_olie_1: >-
  Ah. Eine Neueinschreibung. Bitte nehmen Sie Platz — wir gehen das
  Notwendige der Reihe nach durch. Name, Herkunft, Element wenn bekannt...
  Unbekannt ist auch eine Antwort, keine Sorge.

npc_vandara_olie_2: >-
  So, die Einschreibegebühr. Fünfundzwanzig Splitter, einmalig. Die
  Akademie selbst ist kostenfrei — wir sind nicht das Kristallreich. Die
  Gebühr deckt nur den Verwaltungsaufwand und einen Schluck Tee, falls
  Sie länger warten müssen.

npc_vandara_olie_3: >-
  Hier ist Ihr Ausweis, ein dünnes, schweres Plättchen aus poliertem
  Roségold. Damit kommen Sie überall hin, wo Sie hindürfen — und ein paar
  Orte, wo Sie eigentlich nicht hindürften, aber die niemand
  kontrolliert. Ihre Mentoren: Lektor Ormias hält Drachenkunde, Doktor
  Quinell betreut die Arkanen Grundlagen, und Praktikerin Pamle gibt
  Alchemie — allerdings ergibt ihr Unterricht erst Sinn, wenn Sie sich
  ein Alchemielabor eingerichtet haben. Und da Sie Ihr Element nicht
  angeben konnten, schicke ich Sie zu Magistra Veyra. Sie führt die
  Diagnostik durch — keine Vorlesung, eine Sprechstunde. Die Beste der
  Stadt. Willkommen in Vandara, Studentin.

# Step 4 — Reveal-Reaktion. Olié aktualisiert die Akte des
# Spielers, jetzt da das Element offiziell bekannt ist.
npc_vandara_olie_4: >-
  Ah. Das Element-Feld auf Ihrer Studierenden-Akte — ich habe es
  offengelassen, wie besprochen. Ich trage es jetzt nach. ...Schatten.
  Sub-Variante Licht. Vermerk: selten. So — ordnungsgemäß eingetragen.
  Die Archive schätzen Genauigkeit mehr als Neuheit; in diesem Fall
  bekommen sie beides. Machen Sie weiter, Studierende.

# Step 5 — Olié setzt die Abschluss-Prüfung an. Erscheint nach
# Sariels Shadow-Bind-Finale (Praxis-Teil braucht's) und wenn
# alle drei Pflicht-Grundkurse durch sind.
npc_vandara_olie_5: >-
  Ihre Akte ist vollständig. Drei Grundkurse, eine Element-Diagnostik,
  eine eigenständig organisierte Schatten-Praxis. Der Rat hat Sie zur
  Abschluss-Prüfung zugelassen. Hier ist Ihr Prüfungs-Pass — zeigen Sie
  ihn an jeder Station. Magistra Veyra führt die Praxis durch; sie
  erwartet Shadow Bind unter kontrollierten Bedingungen. Lektor Ormias
  prüft Sie mündlich in Drachenkunde, Doktor Quinell schriftlich in den
  Arkanen Grundlagen. Wählen Sie die Reihenfolge, dann kehren Sie zu mir
  zurück. Ich werde hier sein. Ich bin immer hier.

# Step 6 — Diplom-Zeremonie. Braucht alle drei Prüfungs-Flags.
# Sichtbar nach Step 5 (via extendNPCArc auf Olié), aber gegated
# damit der Spieler sieht, dass es wartet und weiß was zu tun ist.
npc_vandara_olie_6: >-
  Alle drei Teile bestanden. Magistra Veyra notierte, ich zitiere:
  'beispielhafte Kontrolle für eine:n Erstjähre:r:n Schattenwandler:in —
  zumindest die:der erste, die:der mir je begegnet ist.' Lektor Ormias:
  'kannte alle sieben und benannte die achte unaufgefordert.' Doktor
  Quinell notierte nur 'zufriedenstellend' — das höchste Lob, das er je
  auf ein Abschluss-Formular geschrieben hat, in meinen vierzig Jahren.
  Hier ist Ihr Diplom: Die Roségold-Akademie von Vandara bestätigt, dass
  Sie den Grundkurs abgeschlossen haben. Glückwunsch, Absolvent:in. Die
  Akademie steht in Ihrer Schuld für eine:n Schattenwandler:in. Wohin Sie
  als Nächstes gehen, steht nicht in unserer Akte. Viel Glück, {player}.

# Kal're — Händlerin auf den Straßen Vandaras
npc_vandara_kalre_1: >-
  Du bist neu, ja? Sieht man. Kal're, aus dem Kristallreich. Windlinie.
  Habe ich schon gesagt, dass ich aus dem Kristallreich bin? Das tu ich
  gern, dann fragt niemand, warum ich Schuppen wie Glas habe. Hier,
  schnupper an den Ascheblumen. Vulkanstaub, und noch eine Sache, die du
  nicht benennen kannst. Wenn du jemals in ein Alchemielabor kommst,
  wirst du sie brauchen.

npc_vandara_kalre_2: >-
  Du bist wieder da! Gut, gut. Wirst sehen, in Vandara redet jeder mit
  jedem und alle wissen alles. Außer das, was sie nicht wissen sollen —
  da sind sie erstaunlich diszipliniert.

npc_vandara_kalre_3: >-
  Du fragst dich, ob ich dir traue? Genug. Hör mal — du kaufst andauernd
  meine Reagenzien, aber du hast nichts, wo du sie verarbeiten könntest.
  Die meisten Akademie-Studenten stellen sich ein kleines Alchemielabor
  ins Haus: zwei Regale, ein Kupferbecken, ein Abzug. Hier, die Skizze
  auf der Rückseite einer Tüte. Bring Holz und Stein mit — jetzt weißt
  du, wie's zusammengeht.

npc_vandara_kalre_4: >-
  Weißt du, was das Lustige an Vandara ist? Die Akademie tut so, als wäre
  sie das Herz der Stadt. Aber die echten Sachen passieren in den
  Hinterzimmern. Auf den Straßen. In den Katakomben unten. ...Sag's nicht
  weiter.

npc_vandara_kalre_5: >-
  Du bist jetzt einer von meinen Stammkunden. Wenn du je was Seltenes
  brauchst — was wirklich Seltenes — komm zu mir, bevor du irgendwen
  anders fragst. Ich finde es. Oder kenne jemanden, der's findet.

# Fafa — Bettlerin am Brunnen
npc_vandara_fafa_1: >-
  Ein paar Splitter für eine alte Erddrachin? ...Danke, Kind. Du bist
  neu. Diese Stadt hat Namen, weißt du — nicht nur den, der oben am Tor
  steht. Komm wieder, ich erzähle dir einen.

npc_vandara_fafa_2: >-
  Vandara heißt 'Wandel'. Aber sie sagen dir nie, wer den Wandel will und
  wer ihn fürchtet. König Archivaris, der alte Knochenhalter, will alles
  so behalten wie's war. König-Rektorin Novia will alles neu. Die beiden
  streiten sich seit Jahren vor dem Kaiserhof — und solange sie streiten,
  regiert in Wahrheit niemand. Das macht Vandara... interessant. Komm
  wieder.

npc_vandara_fafa_3: >-
  Du kommst immer wieder. Das ist selten. Hör zu, Kind — die Studenten in
  den oberen Hörsälen lernen, was die Mentoren beibringen dürfen. Was sie
  wirklich wissen wollen, lernen sie woanders. Unter der Stadt. Komm noch
  einmal wieder, und ich zeige dir, wo.

npc_vandara_fafa_4: >-
  Diesmal keine Splitter. Komm — hinter dem Brunnen, dieser Gully. Schieb
  das Eisen beiseite; es bewegt sich wie ein Vorhang. Die Katakomben. Die
  alten Tunnel aus der Zeit vor dem Unaussprechlichen. Hier unten findest
  du die, die dir wirklich helfen können — wenn du den Mut hast
  herunterzukommen. Geh nicht alleine hin, bis du jemanden kennst, dem du
  dort vertraust. Aber geh.

# ─── Veyra — Element-Diagnostik (Sprechstunde, kein Kurs) ───────
npc_vandara_veyra_1: >-
  Willkommen, {player}. Olié hat Sie geschickt, ja? Gut. Das hier ist
  kein Unterricht — das ist eine Sprechstunde. Sie konnten ihm kein
  Element nennen; völlig in Ordnung. Wir finden es gemeinsam heraus. Die
  meisten Studenten wissen es schon von zuhause. Die paar, die nicht,
  sind oft die interessantesten.

npc_vandara_veyra_2: >-
  Zuerst die Anamnese. Erzählen Sie mir, was Sie zuhause gespürt haben —
  irgendetwas, das an Ihnen gezogen hat: Wärme in den Händen, Schwere in
  der Brust, Trockenheit im Hals wenn Sie wütend waren, ein Geräusch, das
  sonst niemand gehört hat. Auch nichts ist eine Antwort. Magie ist an
  Ihr Element gebunden; Sie können nicht wechseln, nur finden. Manche
  erkennen es in einem einzigen Moment, andere brauchen Übungen. Wir
  machen beides. Beim nächsten Mal beginnen wir mit den Resonanztests.

npc_vandara_veyra_3: >-
  Erster Resonanztest. Hände entspannt im Schoß, Handflächen nach oben.
  Nicht drücken, nicht greifen — lassen Sie Ihren Äther von selbst zur
  Ruhe kommen. ...Hm. Da ist etwas. Aber es liegt nicht sauber unter
  einer der Standard-Signaturen. Ich würde gerne nächste Sitzung eine
  ordentliche Batterie laufen lassen. Kommen Sie ausgeschlafen — auf
  einem ruhigen Körper läuft das glatter.

npc_vandara_veyra_4: >-
  Heute die Standard-Batterie. Fünf Gegenstände, ein Material pro Element
  — ein Stein, Wasser, eine Kerze, eine Feder, ein Spiegel. Berühren Sie
  jedes der Reihe nach; ich beobachte, was Ihr Äther tut. Es gibt keine
  richtige Antwort und keine falsche — auch 'nichts passiert' ist ein
  sauberes Ergebnis. Eins nur: nicht drücken. Der Äther lügt nicht, wenn
  man ihn ehrlich lässt. Lassen Sie sich Zeit. Wann immer Sie bereit sind.

npc_vandara_veyra_5: >-
  Sie sind wiedergekommen. Gut. Bitte setzen Sie sich. Die Lichtreaktion
  in Ihrer Batterie — das war kein Nullergebnis, aber auch keine saubere
  Licht-Signatur. Ich würde gerne einen kontrollierten Isolations-Test
  laufen lassen. Hände offen, nicht drücken, strecken Sie sich zur Kerze
  hin. ...Oh. Oh, {player}. Sie machen keinen Schatten — Sie ZIEHEN den
  Schatten an. Von der Wand. Von der Decke. Von mir. Sie sind kein
  Lichtwandler. Sie sind ein Schattenwandler. In vierzig Jahren
  Diagnostik habe ich noch nie einen gesehen.

npc_vandara_veyra_6: >-
  Schatten ist eine Sub-Variante von Licht, so wie Traum eine
  Sub-Variante von Gezeiten ist. Aber sie ist selten. Sehr selten — in
  vierzig Jahren habe ich noch nie eine gesehen. Ich kann Ihnen die
  Theorie geben, aber die Praxis... da bin ich nicht zuhause; ich kann
  Ihnen nicht beibringen, was ich selbst nie gefühlt habe. Es gab vor
  langer Zeit eine Kollegin hier. Sariel. Brillant. Auf dem Papier
  element-agnostisch, bis dey das selbst widerlegt hat. Wir haben uns aus
  den Augen verloren, als dey die Akademie verließ — vor vierzig Jahren,
  ungefähr. Ich weiß nicht, ob dey noch lehrt. Aber wenn Ihnen jemand die
  Praxis des Schattens beibringen kann, dann Sariel. Seien Sie vorsichtig,
  {player}. 'Schatten' klingt romantisch. Nicht jeder in dieser Stadt
  sieht es so.

# Step 7 — Praxis-Abschlussprüfung. Die Diagnostikerin wird zur
# Prüferin; bleibt warm, aber sehr aufmerksam.
npc_vandara_veyra_7: >-
  Sie sind mit dem Pass gekommen. Gut. Die Praxis ist kurz. Binden Sie
  einen Schatten an diese Kerze. Halten Sie ihn. Reden Sie mit mir über
  etwas Unrelatedes, dreißig Sekunden lang. Lassen Sie den Schatten nicht
  fallen, lassen Sie das Gespräch nicht versanden. Die Prüfung geht nicht
  um Stärke — sie geht darum, zwei Dinge gleichzeitig zu tun, ohne dass
  eines das andere verschluckt. ...Ja. Sauber gearbeitet. Vierzig Jahre
  und ein Erstes. Sie bestehen. Sagen Sie es Olié.

# Element-Übungen — knappe Reaktionsbeschreibungen, die jede Trial
# als Tooltip-Text mitliefert (dialogueKey im step).
vandara_trial_fire_dialog: >-
  Wärme, ja — aber nichts antwortet darauf. Kein Feuer.

vandara_trial_earth_dialog: >-
  Schwer in der Hand, und... nichts regt sich. Keine Erde.

vandara_trial_wind_dialog: >-
  Fällt wie jede Feder — kein Heben, kein Zug. Kein Wind.

vandara_trial_tide_dialog: >-
  Nur dein Atem kräuselt das Wasser, mehr nicht. Keine Gezeiten.

vandara_trial_light_dialog: >-
  Da — Moment. Etwas hat sich bewegt, aber nicht im Spiegel... im Raum
  hinter dir. Das ist kein klares Licht. Komm zurück, sobald du kannst —
  ich will das genauer ansehen.

# ─── Sariel — Schatten-Lehrkraft in den Katakomben ────────
# Sariel nutzt they/them im EN, im DE entsprechend dey/dem/deren
# (eingedeutschtes they-Set). Verben passen sich an wie bei "er/sie".
npc_vandara_sariel_1: >-
  Du bist viel zu laut für deine Größe, {player}. Lauf leiser in einem
  Tunnel — sonst hörst du nicht, wenn jemand direkt vor dir steht. Setz
  dich. Ich bin Sariel. Mach es dir bequem; die Kerze reicht für uns
  beide — ich brauche kein Licht.

npc_vandara_sariel_2: >-
  Du willst wissen, was Schatten ist. Ich habe die Bindung gehört, als
  du runtergekommen bist — billige Heftung, dünnes Papier, riecht nach
  der Archiv-Tinte der Akademie. Quinell benutzt immer noch denselben
  Drucker wie vor vierzig Jahren. Er hat dich hergeschickt, oder? Er hat
  dir sein Kapitel mitgegeben — Kapitel sechs, nehme ich an. Er saß zwei
  Jahre in meiner Klasse und schrieb alles mit, was ich sagte; das
  Kapitel ist seins. Ich habe in meinem ganzen Leben kein Wort
  geschrieben — ich bin blind, schon länger, als ich je hinter einem
  Pult stand. Es gab nichts abzuschreiben. Die Kurzfassung ist kurz:
  Schatten ist Licht, das genug Tiefe hat, einen Eigenwillen zu
  entwickeln. Ein Lichtwandler macht Helligkeit. Du machst Hohlräume —
  und die Hohlräume HÖREN dir zu. Verstanden? Nein? Gut — das war eine
  Lüge, um's kurz zu machen. Lies sein Kapitel trotzdem."

npc_vandara_sariel_3: >-
  Steh in das Licht. Jetzt streck die Hand aus — nicht zur Kerze, zum
  Schatten, den du wirfst. Ja, das geht. Fühl, nicht denk; Schatten sind
  dichter als normales Licht, spürbar, wenn man weiß wo... Ah. Da. Du
  hast ihn gegriffen — spürst du das Gewicht? Sehr gut. So habe ich das
  auch gelernt, mit zwölf, von einer Wandlerin im Smaragd-Wald. Auch
  blind, wie ich jetzt. Augen seien nur ein Weg von vielen, hat sie
  gesagt. Ich hab's erst geglaubt, als ich es musste.

# ─── Pamle — Alchemie-Mentorin (Magma-Drachenwandlerin) ───
npc_vandara_pamle_1: >-
  {player}, oder? Setz dich. Ich mach das schnell: ich bin Pamle, ich
  unterrichte Alchemie. Wir fangen mit zwei ganz simplen Rezepten an —
  Energietrank und Magietrank. Mehr als Kräuter, Wasser und ein bisschen
  Hitze brauchen die nicht. Geh nach Hause, bau dir die Werkstatt von
  Kal'res Bauplan, stell den Alchemietisch in dein Zimmer. Dann kannst du
  das brauen. Komm wieder, wenn du drei Energietränke gemacht hast —
  DREI, nicht zwei, nicht 'fast drei'. Dann zeige ich dir was Besseres.

npc_vandara_pamle_2: >-
  Drei Energietränke, ja? Gut. Ich verkaufe die übrigens an die
  Erstsemester für gutes Geld, falls du dich gefragt hast — Bildung ist
  nicht umsonst. Jetzt zu Tier zwei: Wachpollen-Tee, Regeneration über
  Zeit. Und Funkenlicht-Phiole — die wirst du noch zu schätzen wissen,
  glaub mir; Sariel unten in den Katakomben hat sie früher kistenweise
  bestellt. ...Üb. Bring mir drei Funkenlicht-Phiolen, wenn du soweit
  bist.

npc_vandara_pamle_3: >-
  Funkenlicht-Phiolen. Drei. Schön — sauber gearbeitet; du verstehst die
  Dosierung. Letzte Runde. Arkanwasser ist Standard für jeden Studenten,
  der Magie betreibt. Und Aschebrand-Tinktur — die ist meine eigene
  Erfindung, aus den Pollen einer Asche-Weide. Macht dich für zwei
  Minuten zur Holzfäll-Maschine; du wirst nicht glauben, wie viele
  Aufträge die Akademie dafür von den Bauunternehmen bekommt. Komm einmal
  noch wieder, dann hab ich dir alles beigebracht, was ich grad anbieten
  kann.

npc_vandara_pamle_4: >-
  So. Das war's mit den Grundlagen — du beherrschst jetzt die sechs
  Basis-Rezepte. Was kommt, wird schwerer: Sternenfrüchte sind selten,
  Glut-Lotos noch seltener, und einige Rezepte verlangen Reagenzien, die
  nur Gewitter-Seraphe einsammeln können. Aber bis dahin hast du noch was
  zu tun. Geh und braue. Wenn ich je was Neues unterrichte, weißt du, wo
  du mich findest. Ach — und Pamle ist nicht mein voller Name, ich hab
  nie einen bekommen. Spar dir die Frage.

# Step 5 — Reveal-Reaktion. Pamle hat die Geschichte gehört und
# überlegt praktisch, welche Reagenzien für einen Schatten-Wandler
# Sinn ergeben.
npc_vandara_pamle_5: >-
  Aha. Das hat sich rumgesprochen — du bist die Schatten-Person. Heißt,
  ich sollte vielleicht überlegen, welche Reagenzien für deine Sorte Sinn
  machen. Asche von erloschenen Kerzen, Spiegelscherben-Staub, sowas. Ich
  sag Bescheid, wenn mir was einfällt. Und erwarte keinen Rabatt —
  seltenes Element heißt nicht pleite. Jetzt verzieh dich, ich muss der
  nächsten Gruppe Tier-drei beibringen.

npc_vandara_sariel_4: >-
  Du bist jetzt nicht ausgebildet. Du bist aufgewacht — das ist was
  anderes. Was du brauchst, lernst du jetzt von selbst. Komm wieder,
  wenn du etwas Komplizierteres versuchen willst; bring mir eine Schale
  Wasser mit, dann zeige ich dir, wie du einen Schatten holen lässt, der
  sie hält, während du andere Sachen machst. Das ist der praktische
  Teil. Vierzig Jahre Lehrkraft, und ich verspreche immer noch das
  Spannende für die nächste Stunde.

# ─── Step 5: das Finale — Sariel lehrt Schatten-Bindung ─────
# Dey löst das Versprechen aus Step 4 ein: ein an eine Aufgabe
# gebundener Schatten erledigt sie für dich, während du etwas
# anderes machst. Setzt das Base-Game-Ability-Flag.
npc_vandara_sariel_5: >-
  Du hast die Schale mitgebracht. Gut — stell sie ab, dort, auf den
  Boden zwischen uns. So. Der Trick, den ich dir versprochen habe.
  Schatten sind nicht umsonst; sie sind du, ein Teil von dir, den du in
  die Welt schiebst, und einen zu binden kostet deine eigene Magie,
  fortlaufend, solange du ihn draußen hältst. Wähl eine Aufgabe —
  irgendetwas, das du mit den Händen machst: Hacken, Brauen, Wasser
  schöpfen. Schau auf deinen Schatten, dann bitte ihn, die Aufgabe statt
  deiner zu machen. Nicht laut — mit dem gleichen wortlosen Druck, mit
  dem du letztens den Schatten von der Wand gegriffen hast... Ja. Genau
  das. Jetzt kannst du etwas anderes tun, während der Schatten
  weitermacht. Magie läuft die ganze Zeit ab, vergiss das nicht — geht
  sie zur Neige, lässt der Schatten los. Einen Schatten, eine Aufgabe;
  mehr kann ich dir nicht beibringen. Aufmerksamkeit weiter zu spalten
  ist die Arbeit der nächsten vierzig Jahre, nicht der nächsten Stunde.
  Geh. Mach zwei Dinge gleichzeitig — das ist das Nächste, was die
  meisten von uns je dem Freisein kommen.

# ─── Ormias — Drachenkunde ────────────────────────────
# Eine Lehrstunde pro Hauptart: Intro, Großdrachen, Wyvern,
# Lindwürmer, Amphithere, Leviathane, Seraphe, Fae, und zum
# Schluss Lung-Drachen als Dramatic-Irony-Knipser.
npc_vandara_ormias_1: >-
  Setz dich, Studierende. Drachenkunde, Grundkurs. Sieben Hauptarten
  kennen wir: Großdrachen, Wyvern, Lindwürmer, Amphithere, Leviathane,
  Seraphe, Fae. Dazu noch die kaiserlichen Lung-Drachen — eine Ausnahme,
  die nehmen wir uns zuletzt vor. Eine pro Sitzung. Keine Abkürzungen.
  Und merk dir das absolut Wichtigste über sie alle: sie haben alle
  Flügel. ...Ja. Alle.

npc_vandara_ormias_2: >-
  Großdrachen. Die Hüter der Reiche. Das Brot-und-Butter-Volk aus dem
  Kristallreich im Westen. Kräftiger Körperbau, vier Beine, ein Paar
  breite Lederschwingen, oft eine gepanzerte Schwanzspitze und große
  Hörner. Die häufigste Art mit Abstand — viele Spätzünder; Flügel kommen
  manchmal erst mit zwanzig oder dreißig. Statistisch bist du
  höchstwahrscheinlich einer von diesen. Geduld. Sie kommen.

npc_vandara_ormias_3: >-
  Wyvern. Die Jäger der Lüfte. Nur zwei Hinterbeine — die Vorderbeine
  sind in der Evolution mit den Flügeln verschmolzen. Schnelle, muskulöse
  Flieger, meist mit einem Giftstachel oder einer schweren Keule am
  Schwanzende. Die Sturm-Wyvern haben Flügelkanten so scharf, dass sie
  den Wind wie Klingen schneiden. Häufig im westlichen Tiefland. Du
  wüsstest, wenn du einer wärst — die fliegen jung.

npc_vandara_ormias_4: >-
  Lindwürmer. Die Erdgebundenen. Meinesgleichen. Massiver Körper, nur
  zwei Vorderbeine, die hintere Hälfte ist eine lange Schlange, die wir
  hinter uns herziehen. Flügel haben wir auch, aber schwerfällig — in der
  Luft sind wir nicht graziös. Wir graben, wir klettern, wir sind langsam
  und stur. Zwei Hauptlinien: Magma-Lindwürmer, Schuppen wie glühende
  Lava, leben nahe dem Lavameer; und Sumpf-Lindwürmer, Schuppen wie Algen
  und Rinde, getarnt im Urwald von Smaragd. Von Fremden manchmal zu
  westlichen Drachen geworfen. Wir sind östlich. Bring das nicht
  durcheinander.

npc_vandara_ormias_5: >-
  Amphithere. Die gefiederten Schlangen. Keine Gliedmaßen — nur ein
  langer Schlangenkörper und ein einziges Paar gewaltiger, prächtiger
  Federschwingen, die übrigens magische Energie speichern können. Selten.
  Schön — das gebe sogar ich zu. Zwei bekannte Sub-Arten:
  Traum-Amphithere, deren Flügelschläge Illusionsnebel erzeugen; und
  Sonnen-Amphithere, goldene Federn, die bei Bedrohung in eine blendende
  Licht-Explosion entladen können. Magistra Veyra ist eine. Sag ihr
  nicht, dass ich gesagt habe, sie sei schön.

npc_vandara_ormias_6: >-
  Leviathane. Die Herrscher der Extreme. Sie leben dort, wo sonst niemand
  kann. Gezeiten-Leviathane beherrschen die schwebenden Wasserinseln und
  Wasserwege — sehnige Schwingen, die unter Wasser als Flossen dienen,
  feine Kiemenschlitze, absolute Herrscher der Strömungen.
  Magma-Leviathane auf den untersten, heißesten Inseln über dem Lavameer
  — massive gepanzerte Flügel, obsidianbeschichtete Schuppen, Lungen die
  superheiße Gase filtern. Einmal im Jahr treffen sie sich an den
  Lavafällen und handeln. Die angesehensten Handwerker im Reich.

npc_vandara_ormias_7: >-
  Seraph-Drachen. Die Himmelsstürmer. Schlank, aerodynamisch, vier bis
  sechs schmale Flügel übereinander gestapelt. Sie leben dort, wo die
  Luft so dünn ist, dass ein Großdrache das Bewusstsein verlieren würde,
  und lachen über unsere Stürme — was wir Hurrikan nennen, ist ihre
  Morgenbrise. Erwarte nicht, einen zu sehen; sie kommen fast nie runter.
  Wenn doch, sei höflich.

npc_vandara_ormias_8: >-
  Fae-Drachen. Die Smaragd-Weber. Die Kleinsten. Libellenflügel,
  Chamäleon-Tarnung, ursprünglich aus dem tiefen Urwald von Smaragd.
  Heute zwei Kulturen: die wilden Wald-Fae, die noch immer in der Rinde
  verschwinden, und die Stadt-Fae, die sich an das urbane Leben angepasst
  haben und prächtige, knallbunte Schuppen tragen, weil sie in der Stadt
  nichts mehr fürchten müssen. Wenn du jemals einen in einer Taverne
  triffst, gib ihm einen Drink aus. Bester Klatsch in Draconia.

npc_vandara_ormias_9: >-
  Und zum Schluss — die Lung-Drachen. Die Himmelsläufer. Schlangenartig,
  flügellos, vier Beine mit scharfen Klauen, charakteristische Bartfäden
  am Kopf. Sie fliegen rein durch Magie — keine Flügel. Die einzige
  Ausnahme zu meiner Eröffnungsregel. Und bevor du fragst: ja, ich habe
  gesehen, dass du keine Flügel hast. Komm nicht auf Ideen. Lung-Drachen
  sind ein absoluter genetischer Sonderfall — sie kommen ausschließlich
  in der kaiserlichen Blutlinie vor, und selbst dort existieren aktuell
  nur zwei. Kaiser Ignis Aurum und Prinz Ryuga. Das ist die Liste. Du
  bist höchstwahrscheinlich ein Spätzünder-Großdrache. In achtzig Prozent
  der Fälle. Geduld.

# Step 10 — Reveal-Reaktion. Ormias frisst graziös seine
# Spätzünder-Großdrachen-Prognose, lädt zum Wiederkommen ein.
npc_vandara_ormias_10: >-
  Aha. Ich hab's gehört. Gerüchte laufen schnell durch die
  Akademie-Korridore, vor allem wenn's um das Unmögliche geht. Erlaub mir
  einen Moment professionelle Verlegenheit: Ich hab dir mit einiger
  Sicherheit gesagt, du seist höchstwahrscheinlich ein
  Spätzünder-Großdrache. Anscheinend lag ich daneben — wobei, in aller
  Fairness, auch nicht ganz daneben. Schatten ist eine Sub-Variante des
  Lichts. Lichtwandler sind Großdrachen. Also technisch, statistisch,
  halten die achtzig Prozent immer noch. Knapp. Ich würde Kapitel Zwei
  meines Buches sehr gerne aktualisieren. Komm gelegentlich wieder vorbei
  — ich werde neue Fragen haben, und die Fragen sind meistens
  interessanter als die Antworten.

# Step 11 — mündliche Abschlussprüfung in Drachenkunde.
npc_vandara_ormias_11: >-
  Also gut. Mündliche Prüfung — ich sage die Frage, du sprichst die
  Antwort. Keine Notizen. Versuch, mich nicht anzuhusten. ...Nenne die
  sieben Hauptarten der Drachenwandler, in beliebiger Reihenfolge, mit je
  einem unterscheidenden Merkmal. ...Gut, gut, gut. Und die achte. Ja,
  die achte — wir beide wissen, dass es eine gibt. Nenn sie, und das eine
  Merkmal, das sie von allen anderen unterscheidet. ...Lung-Drachen.
  Flügellos. Genau. Du bestehst. Sag's Olié. Und komm später wieder für
  ein längeres Gespräch. Ich habe einige Fragen aktualisiert.

# ─── Quinell — Arkane Grundlagen ───────────────────────────
npc_vandara_quinell_1: >-
  Willkommen. Arkane Grundlagen ist die langweiligste Vorlesung, die Sie
  an dieser Akademie hören werden. Und die wichtigste. Wenn Sie nicht
  verstehen, was Magie IST, werden Sie sie niemals präzise anwenden. Sie
  werden zaubern wie ein Hund schwimmt — funktional, hässlich,
  ineffizient. Sieben Sitzungen: die Definition, vier Gesetze, und die
  Ausnahmen, die sie rahmen. Keine Abkürzungen. Wir beginnen mit der
  Definition.

npc_vandara_quinell_2: >-
  Definition. Magie ist die Manipulation des Äthers durch einen
  drachischen Geist. Beachten Sie: der Äther — nicht 'Energie', nicht
  'Kraft'. Beachten Sie: drachischer Geist — nicht drachischer Körper.
  Der Körper ist ein Werkzeug, der Geist ist der Zauberer. Wenn Sie aus
  diesem gesamten Kurs nur zwei Wörter behalten, dann diese: Äther.
  Geist. Alles andere folgt daraus.

npc_vandara_quinell_3: >-
  Erstes Gesetz. Das Drei-Komponenten-Gesetz. Jede Handlung von Magie
  braucht drei Elemente gleichzeitig. Element — Ihre angeborene
  Ausrichtung, das eine Element, das Ihre Blutlinie Ihnen gibt. Wille —
  der geübte Fokus Ihres drachischen Geistes. Substrat — das physische
  Material, durch das die Wirkung manifestiert: die eigene Form, ein
  Werkzeug, die Luft selbst. Drei. Immer drei. Wer sie nicht im Kopf
  trennen kann, scheitert an jedem höheren Kurs dieser Akademie.

npc_vandara_quinell_4: >-
  Zweites Gesetz. Das Gesetz der Element-Bindung. Sie können Ihr Element
  nicht 'wählen'. Sie können nicht 'wechseln'. Was Ihnen Ihre Blutlinie
  bei der Geburt gegeben hat, ist, was Sie für den Rest Ihres Lebens
  zaubern werden. Ein Feuerwandler, der versucht Wasser zu bändigen,
  produziert nichts — kein schwaches Wasser, gar kein Wasser.
  Gelegentlich kommen Studierende mit der Überzeugung an, sie könnten
  sich ein zweites Element antrainieren. Können sie nicht. Geben Sie sich
  diese Illusion jetzt auf.

npc_vandara_quinell_5: >-
  Drittes Gesetz. Das Erhaltungsgesetz. Magie kommt nicht aus dem Nichts.
  Was Sie in die Welt schicken, kommt aus Ihnen. Persönliche Energie
  raus, magischer Effekt rein — eins zu eins, keine Ausnahmen in der
  Buchhaltung. Der Äther ist ein Medium, keine Quelle. Wer Ihnen 'freie
  Magie' verspricht, verkauft Ihnen Betrug oder einen Salon-Trick.
  Wahrscheinlich beides.

npc_vandara_quinell_6: >-
  Viertes Gesetz. Das Erschöpfungs-Gesetz. Das ist das Gesetz, das
  Studierende am häufigsten missverstehen. Erschöpfung ist kein Versagen.
  Erschöpfung ist das Maß Ihrer Wirkung. Müde heißt: die Magie ist
  geschehen. Nicht müde heißt: sie ist nicht geschehen. Wer ohne
  Erschöpfung zaubert, hat nichts getan. Wer sich beim Zaubern einer
  Teetasse erschöpft, hat eine echte Teetasse gezaubert. Wenden Sie beide
  Hälften dieses Gesetzes an, und Sie zaubern bereits besser als drei
  Viertel der Studierenden in diesem Saal.

npc_vandara_quinell_7: >-
  Letzte Sitzung. Ausnahmen. Vier Gesetze. Sie sind korrekt. Sie sind
  auch nur einen Ausnahmefall davon entfernt, falsch zu sein — sehr
  wenige, sehr selten; in achtzig Prozent der Fälle gelten die Gesetze
  restlos. Die restlichen zwanzig Prozent sind das, woraus Doktorarbeiten
  gemacht werden. Es gab hier einmal eine Lehrkraft. Sariel.
  Element-agnostisch laut Akten, bis dey das selbst widerlegt hat. Kapitel
  sechs dieses Skripts ist meines — ich habe es aus deren Vorlesungen
  mitgeschrieben. Dey ist blind, schon länger, als ich dey kenne; das
  Schreiben war immer mein Teil der Abmachung. Dey las vor, ich notierte.
  Das Kapitel ist die einzige Abhandlung, die ich über Schatten als
  Sub-Variante des Lichts kenne. Niemand hat je einen dokumentierten
  Schatten-Wandler kennengelernt, der bereit war, sich untersuchen zu
  lassen. Dey verließ die Akademie vor vierzig Jahren. Ob dey noch lebt,
  weiß ich nicht. Lesen Sie das Kapitel. Wenn Sie je Belege für einen
  aktuellen Schatten-Wandler finden, schreiben Sie die Arbeit. Widmen Sie
  sie angemessen.

# Step 8 — Reveal-Reaktion. Quinell, der über Sariel mit der
# resignierten Stimme einer trauernden Kollegin gesprochen hat,
# bekommt eine stille Vindikation. Er zeigt es nicht laut.
npc_vandara_quinell_8: >-
  Ich habe gehört. ...Sariel hatte also Recht. Die Akten waren falsch;
  das Vorlesungs-Kapitel war richtig. Ich werde es im Archiv vermerken.
  Wenn Sie jemals — wenn Sie wieder zu dey hinunter gehen — sagen Sie
  Sariel, dass das Kapitel immer noch funktioniert. Vierzig Jahre später
  bestehen die Studierenden es immer noch. Dey erinnert sich vielleicht
  nicht an mich, aber ich habe mich an dey erinnert. Das ist alles. Gehen
  Sie. Studieren Sie. Wenden Sie die Gesetze an. Sie werden jedes
  einzelne brauchen.

# Step 9 — schriftliche Abschlussprüfung über die vier Gesetze.
npc_vandara_quinell_9: >-
  Setzen Sie sich. Schreiben Sie. Nennen Sie jedes der vier Gesetze beim
  Namen plus einen Satz mit Substanz. Sie können sich angemessen Zeit
  lassen. Benutzen Sie den Stift, nicht den Finger. ...Zufriedenstellend.
  Kehren Sie zu Olié zurück. Wenden Sie sie ehrlich an. Die Gesetze
  interessieren sich nicht, ob Sie sich an sie erinnern. Nur, ob Sie sie
  respektieren.

npc_vandara_gate_guard_admit: >-
  Erstes Mal in Vandara, ja? Akademie-Einladungen sehen wir alle paar
  Wochen. Du wirst dich noch wundern, wie groß diese Stadt unter der
  Oberfläche ist. ...Willkommen, {player}. Geh ruhig — die Mentoren
  werden dir den Rest erklären.

# Wieder-Begegnung nach dem Schatten-Reveal. Spieler hat zu dem
# Zeitpunkt Akademie eingeschrieben, Element-Tests durch, Mentoren
# kennengelernt — und jetzt herausgefunden dass Schatten ihr/sein
# Element ist. Der Wächter erkennt das auf seine eigene knappe Art.
npc_vandara_gate_guard_respect: >-
  Du hast die Stadt unter der Stadt gesehen. Das ändert einen. Die
  meisten kommen mit dem Brief, gehen mit dem Brief, sehen nur die
  Hälfte. Du gehörst jetzt zu denen, die beide Hälften kennen. Pass auf
  dich auf, {player}.


# ─── Katakomben-Studenten-Arc (Korren + Iska + Daven) ────────
# Zwei Studierende im Dienst der gegnerischen Vandara-Vassalen
# treiben sich gegenseitig in immer größere Regel-Verstöße;
# Marschall Daven kommt am Ende runter und verhaftet beide mit
# der Hilfe des Spielers.

npc_vandara_korren_1: >-
  Du bist runtergekommen. Gut — Nachrichten reisen, sogar bis hier. Ich
  bin Korren. Ich — naja. Ich arbeite für König Archivaris. Nicht
  offiziell, verstehst du. Offiziell bin ich Studierender im dritten
  Jahr, der 'mit Drachenkunde zurückgefallen' ist. Inoffiziell bin ich
  hier unten, um etwas zu beweisen. Echo-Beschwörung: alte Gegenstände
  erinnern sich, und ich wecke sie gerade genug, um zu flüstern. Die
  Akademie hält das für Nekromantie. Ist es nicht — keine Seele, nur
  Resonanz. Aber die Akademie kümmert sich nicht um Feinheiten, wenn sie
  die Mathematik nicht sieht. Hilf mir — ich brauche einen Faden deiner
  Magie, um das Echo zu verankern. Fünf Fäden, mehr nicht. Der Ring wird
  mir verraten, wie der Schmied gestorben ist, der ihn gemacht hat.
  Kleine Sache. Ein Beweis.

npc_vandara_korren_2: >-
  Ich hab gehört, Iska hat es geschafft. Die Wyvern mit dem Puppentrick —
  hat einen Teelöffel zehn Sekunden lang stehen lassen. Niedlich.
  Animation ist das Einfache; jeder kann Materie anstupsen, damit sie
  zuckt. Was ich mache, ist schwerer — ich reiche durch die Zeit. Aber
  der Korridor hat über Iska geredet, nicht über mich, und das heißt,
  mein König verliert das heutige Argument. Wir gehen größer. Ich habe
  eine Münze, Militär-Ausgabe, aus dem Krieg vor vierzig Jahren. Sie hat
  einen Mann sterben sehen. Wenn ich sie dazu bringe, mir zu sagen WIE,
  kann die Akademie den Echo-Trick nicht mehr Salon-Magie nennen. Zehn
  Fäden. Jetzt.

npc_vandara_korren_3: >-
  Iska animiert eine Leichen-Puppe. Eine KLEINE, aber trotzdem. Die ganze
  Stadt wird das bis Ende der Woche wissen, und wenn Archivaris bis dahin
  keine Antwort hat, gewinnt Novias Fraktion diese Runde am Hof. Also
  wecken wir jetzt eine echte Erinnerung. Eine Scherbe aus dem
  kaiserlichen Archiv — frag nicht, wie ich sie bekommen habe. Sie hat —
  egal was sie gesehen hat. Zwanzig Fäden Magie, und wir werden wissen,
  ob die offiziellen Akten die tatsächlichen Akten sind. ...Es hat
  funktioniert. Oh, es hat funktioniert. Wart ab, bis ich das
  aufschreibe. Wart ab, bis—

npc_vandara_iska_1: >-
  Hi, hi, setz dich, mach den Kreis nicht kaputt. Iska. Wind-Linie. Ich
  sollte eigentlich nicht hier sein, ich sollte bei Pamles
  Tier-drei-Vorlesung sein, aber Pamle unterrichtet BRAUEN und ich will
  Sachen BEWEGEN. Pass auf den Löffel. Fünf Fäden Magie von dir, mehr
  brauch ich nicht. Der Löffel steht auf. Vielleicht. Beim letzten Mal
  ist er aufgestanden und hat mich gestochen, also — geh in Deckung.
  König Novia würde das lieben. Die Alten sagen, Materie ist träge.
  Materie ist nicht träge. Materie ist nur schüchtern.

npc_vandara_iska_2: >-
  Korren hat das Ring-Ding gemacht — hat ihn flüstern lassen. Flüstern.
  Jeder kann flüstern. Ich will BEWEGEN. Ich verdrahte Runen ins Uhrwerk
  — nicht nur zucken, laufen. Drei Schritte. Der Hof wird Korren aus dem
  Raum lachen, wenn sie das sehen. Zehn Fäden, bitte, schnell — ich hab
  die Geometrie im Kopf und verliere sie, wenn du mich warten lässt.

npc_vandara_iska_3: >-
  Korren geht ins kaiserliche Archiv. Wusstest du das? Ich weiß es — die
  Wände hier unten hören mit. Das Ding hier? Frag nicht. Geliehen, aus
  einem alten Grab, seit hundert Jahren niemandem mehr wichtig. Zwanzig
  Fäden, und ich lasse sie einen Kreis laufen. Wenn ich das schaffe,
  gehören die Hörsäle für ein Jahrzehnt Novias Fraktion. ...JA. Das. Hast
  du das gesehen? Sie hat geschaut. Sie hat GESCHAUT—

npc_vandara_daven_1: >-
  Sie. Studierende. Mir wurde berichtet, dass Sie hier unten zu Besuch
  waren. Ich bin Marschall Daven, Vollstreckung des Rats von Vandara. Ich
  verhafte Sie nicht — noch nicht. Ich frage, weil Sie die beiden gesehen
  haben: Korren der Echo-Beschwörer und Iska die Animatorin. Was haben
  die vor? Sprechen Sie offen. Der Rat hat Beschwerden von den Agenten
  beider Könige bekommen, was selten genug ist, um eigene Beweisqualität
  zu haben. Sagen Sie mir, was Sie wissen. Über Ihre eigene Rolle reden
  wir danach.

npc_vandara_daven_2: >-
  Ein Echo aus einer kaiserlichen Archiv-Scherbe. Eine animierte Figur
  aus grabgeraubtem Knochen. Beide an Ihrer eigenen Magie verankert. Das
  ist das Muster, das ich alle fünfzehn, zwanzig Jahre sehe: zwei
  Studierende, jeder für einen König. Sie fangen klein an, sie überbieten
  sich gegenseitig, und irgendwann geht jemand ans kaiserliche Archiv
  oder an ein Grab. Sie haben das nicht angefangen. Sie haben allerdings
  den magischen Faden geliefert, der beide über die Linie geschoben hat.
  Ich schätze Ihre Kooperation. Eine letzte Frage — zeigen Sie mir, wo
  die zwei arbeiten. Genau wo. Der Rat bevorzugt eine saubere Festnahme.

npc_vandara_daven_3: >-
  Zwei weitere Wachen treten hinter Sie, ruhig und professionell; beide
  Studierende scheinen auf ihre eigene Art gewartet zu haben. Iska grinst
  Sie im Abgehen an: "Danke für den Boost, Kind! Sag Pamle, mir tut die
  Brau-Stunde leid!" Erledigt. Der Rat wird sie in einem Monat anhören —
  wahrscheinlich für zwei Jahre suspendiert, danach wieder an der
  Akademie, mit je einem anderen Mentor. Kein Gefängnis. Sie sind Kinder.
  Ihre Rolle wird in der Akte als 'kooperierende Zeug:in' vermerkt —
  großzügiger als 'Mittäter:in', was es ebenso gut sein könnte. Gehen Sie
  vorsichtig, Studierende. Glauben Sie nicht alles, was Ihnen die Agenten
  eines Vassals erzählen. Und wenn das nächste Mal jemand in den
  Katakomben Sie nach Magie fragt — sagen Sie nein. Einmal. Sagen Sie
  nein.
