item_vandara_letter_title: Einladung der Roségold-Akademie
item_vandara_letter_desc: >-
  Ein gefalteter, dicker Brief auf cremefarbenem Papier, versiegelt
  mit roségoldenem Wachs. Innen, in eleganter Handschrift, lädt dich
  die Akademie nach Vandara ein. "Wir laden Drachenwandler aller
  Herkünfte ein, ihren eigenen Weg zu finden." Eine Karte zur Stadt
  liegt bei.

item_vandara_student_id_title: Studentenausweis der Roségold-Akademie
item_vandara_student_id_desc: >-
  Ein kleines, gewichtiges Plättchen aus poliertem Roségold mit
  deinem Namen, einer Seriennummer und dem Akademie-Wappen. Vom
  Sekretariat ausgestellt — Sekretär Olié hat dich extra zweimal
  buchstabieren lassen, "um nichts zu verschmutzen."

