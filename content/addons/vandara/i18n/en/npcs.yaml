npc_teacher_vandara_letter: >-
  "Before you go, {player}... this came for you this morning." Aria
  pulls a folded letter from her bag. The seal shimmers in warm rose
  gold. "From Vandara. The Rose Gold Academy. I wrote to them after
  seeing how seriously you studied. It's just an invitation — not an
  obligation. But if you want to find out what you really are, this
  might be the way."

# ─── Gate guard at the Vandara city walls ──────────────────
# (his name lives in ui.yaml — base game convention.)
# Olié — secretariat / enrollment
npc_vandara_olie_1: >-
  Secretary Olié looks up from his stack of files — an elegantly
  feathered serpent with iridescent scales like wet pebbles. "Ah.
  A new enrolment." He smiles, polite but distant. "Please have a
  seat. We'll go through the necessary in order. Name, origin,
  element if known." His feathered crest twitches when you hesitate
  on the last. "Unknown is also an answer, don't worry."

npc_vandara_olie_2: >-
  "Now, the enrolment fee." Olié slides a tiny bronze dish across
  the desk. "Twenty-five shards, one-off. The academy itself is
  free — we are not the Crystal Realm. The fee just covers
  paperwork and a sip of tea should you have to wait."

npc_vandara_olie_3: >-
  "Here is your ID." Olié hands you a thin, weighty plaque of
  polished rose gold. "It gets you anywhere you're allowed — and a
  few places you're not, but nobody checks." He taps a list on his
  desk. "Your mentors. Lector Ormias holds Dragon Studies. Doctor
  Quinell handles Arcane Foundations. And Practitioner Pamle gives
  Alchemy, though her class only makes sense once you've arranged
  a workshop yourself." A polite pause. "Since you couldn't state
  your element, I'll also send you to Magistra Veyra. She handles
  the diagnostics — not a class, a consultation. The best in the
  city. The academy is fortunate to keep her." A polite nod.
  "Welcome to Vandara, student."

# Kal're — trader in the streets of Vandara
npc_vandara_kalre_1: >-
  A young dragon-shifter with silver-blue hair and a stall full of
  glass jars calls out to you. "You're new, yeah? Easy to tell."
  She grins wide. "Kal're, from the Crystal Realm. Wind line. Did
  I already mention I'm from the Crystal Realm? I like saying it
  — then nobody asks why my scales are like glass." She nudges a
  small dish of ash flowers towards you. "Sniff. Smells like
  volcanic dust and one other thing you can't quite name. If you
  ever set foot in an alchemy lab, you'll need these."

npc_vandara_kalre_2: >-
  "You're back! Good, good." Kal're sorts glitter dust into tiny
  pouches. "You'll see — in Vandara everyone talks to everyone and
  everyone knows everything. Except the things they shouldn't, on
  those they're surprisingly disciplined."

npc_vandara_kalre_3: >-
  "Wondering if I trust you yet, eh?" She laughs. "Enough. Listen —
  you keep buying my reagents, but you've nowhere to use them. Most
  academy students put a small alchemy laboratory in their home.
  Two shelves, a copper basin, a flue." She sketches it on the
  back of a wrapper. "Here. Bring the wood and stone, you'll know
  how to put it together now."

npc_vandara_kalre_4: >-
  Kal're waves you closer. "Know what's funny about Vandara? The
  academy acts like it's the heart of the city. But the real
  things happen in the back rooms. The streets. The catacombs
  below." She winks. "Don't repeat that."

npc_vandara_kalre_5: >-
  "You're a regular now." Kal're taps her forehead. "If you ever
  need anything rare — really rare — come to me before you ask
  anyone else. I'll find it. Or I'll know someone who'll find it."

# Fafa — beggar at the fountain
npc_vandara_fafa_1: >-
  An old dragon-shifter sits hunched at the edge of the fountain,
  wrapped in a dusty grey cloak. Scales like cracked granite peek
  from under the cloth. She doesn't raise her head, but a bony
  hand stretches towards you. "A few shards for an old earth-
  dragon?" When you give, she finally looks up — grey eyes,
  sharp as freshly honed blades. "Thank you, child. You're new.
  This city has names, you know. Not just the one above the gate.
  Come back — I'll tell you one."

npc_vandara_fafa_2: >-
  Fafa pockets the shards without looking. "Vandara means 'change'.
  But they never tell you who wants the change and who fears it."
  She gestures at the academy behind you. "King Archivaris, the
  old keeper of bones, wants everything kept as it was. King-
  Rectoress Novia wants everything made new. They've been arguing
  before the imperial court for years. While they argue, no one
  truly rules. That makes Vandara... interesting. Come back."

npc_vandara_fafa_3: >-
  "You keep coming back. That's rare." Fafa smiles, and for a
  moment she doesn't look old, just tired. "Listen, child. The
  students in the upper halls learn what the mentors are allowed
  to teach. What they really want to know they learn elsewhere.
  Beneath the city. Come back one more time, and I'll show you
  where."

npc_vandara_fafa_4: >-
  This time Fafa takes no shards. She stands — and is suddenly
  taller than you thought. "Come." She leads you to an
  unremarkable storm drain behind the fountain, slides the iron
  aside as if it were a curtain. "The catacombs. The old tunnels
  from before the Unspeakable. Down here you'll find the ones who
  can really help you — if you have the courage to descend." She
  looks at you for a long moment. "Don't go alone until you know
  someone there you can trust. But go."

# ─── Veyra — Elemental Resonance ──────────────────────
npc_vandara_veyra_1: >-
  Magistra Veyra welcomes you into a sun-bright consultation room —
  tall windows, a velvet examination couch, instruments arranged on
  a side table beside a small carafe of cooled water. She is a Sun
  Amphithere, gold and soft orange, her feathers scattering the
  daylight across every surface. "Welcome, {player}. Olié sent you,
  yes? Good. This isn't a class — it's a consultation. You
  couldn't give him an element. That's quite alright." She gestures
  at the couch. "We'll find out together. Most students already
  know from home. The few who don't — often the most interesting
  ones."

npc_vandara_veyra_2: >-
  "First, the anamnesis." Veyra makes notes on a small slate, her
  feathered crest tilted with attention. "Tell me what you've felt
  at home. Anything that pulled at you — warmth in your hands,
  weight in your chest, dryness in your throat when angry, a sound
  no one else heard. Even nothing is an answer." She listens
  patiently. "Magic is bound to your element. You can't switch,
  you can only find. Some recognise it from a single moment.
  Others need exercises. We'll do both. Next time we begin the
  resonance tests."

npc_vandara_veyra_3: >-
  "Close your eyes." Veyra dims the lights with a wing-stroke.
  "Breathe. Don't try to do anything. Just feel what's there.
  Hands lightly open, let magic find you, not the other way."
  She waits. Long. Then her voice, quiet: "Mhm. There's
  something. But I can't quite grasp it. Come back. We'll test
  more carefully."

npc_vandara_veyra_4: >-
  "Today I need more from you." Veyra has small objects laid
  out: a stone, a bowl of water, a candle, a feather, a mirror.
  "We try them in turn. You touch each, I observe. No pressure
  — if nothing happens, nothing happens." She pauses. "But be
  prepared: resonance never feels like you expect."

npc_vandara_veyra_5: >-
  "You're back. Good." Veyra seems tense today. "The light flicker
  during the trial — that wasn't nothing. And it wasn't normal
  either. Sit down, I want to run a deeper test." She extinguishes
  every light in the hall except a small candle behind you.
  "Reach towards the candle. Don't touch. Just... feel what
  happens between you and the flame." Long silence. Then her
  voice, suddenly different: "Oh. Oh, {player}. You're not
  casting a shadow. You're PULLING the shadow towards you. From
  the wall, from the ceiling, from me." She laughs breathlessly.
  "You're not a light-shifter. You're a shadow-shifter. I've...
  I've never seen one."

npc_vandara_veyra_6: >-
  Veyra is markedly more thoughtful today. "Shadow is a sub-
  variant of Light. Like Dream is a variant of Tide. But it's
  rare. Very rare. In my forty years of teaching I've never had
  one." She looks at you seriously. "I can give you the theory.
  But the practice — I'm out of my depth. You need someone who's
  actually lived it. There's..." She hesitates. "There's someone.
  But they're not at the academy any more. Ask Fafa at the
  fountain. She knows where. And be careful — shadow sounds
  cool, but not everyone in this city sees it that way."

# Element trials — short reaction blurbs (used as each trial's
# dialogueKey in the step).
vandara_trial_fire_dialog: >-
  You hold your hand over the small flame. Warmth, of course —
  but no resonance. Veyra shakes her head. "No fire."

vandara_trial_earth_dialog: >-
  The stone sits heavy in your hand. You wait. Nothing. Veyra
  notes something down. "No earth."

vandara_trial_wind_dialog: >-
  You hold the feather up. It floats a moment, then falls.
  Normal — no magical lift. Veyra: "No wind."

vandara_trial_tide_dialog: >-
  Hand over the water bowl. The surface ripples faintly — from
  your breath, not from you. Veyra: "No tide."

vandara_trial_light_dialog: >-
  You look into the small mirror. Something flickers. Not in the
  mirror — IN the room behind you. Veyra snaps her head up.
  "There. That was something. But not clean light. Come back
  as soon as you can — I want to look at this more closely."

# ─── Fafa stage 5 — patch, leads to Sariel ───────────
npc_vandara_fafa_5: >-
  Fafa has been waiting for you. Today she stands, doesn't
  crouch. "You went to Veyra. She told you." Not a question.
  "I knew the day you first put shards in my hand — you made
  the wall behind me shorter. A little. Nobody else can see
  it." She takes your hand and leads you down the steps into
  the drain. "Come. There's someone who's waited fifty years
  for somebody like you. Don't be polite. Don't be careful.
  Just be there."

# ─── Sariel — shadow mentor in the catacombs ──────────
npc_vandara_sariel_1: >-
  The tunnel opens into a small chamber. A single candle burns
  on a low table. The person behind it doesn't turn around —
  they keep sorting notes on the table with their fingertips.
  "You're far too loud for your size, {player}. Walk softer when
  you're in a tunnel. Otherwise you don't hear when someone's
  standing in front of you." Their scales — if you can even
  call them that, sharp black crystals along the neck — clink
  faintly. Sariel raises their head, looks in your direction
  but not into your eyes. "Ah. Sit down. I'm Sariel. Make
  yourself comfortable — the candle is plenty for both of us,
  I don't need any light."

npc_vandara_sariel_2: >-
  "You want to know what shadow is." Sariel pushes an old book
  in your direction without looking. "Here. Arcane Foundations chapter
  six. Quinell recommended it to you, didn't he? He copied it
  out of my class forty years ago. Read." A pause. "Or don't. I
  know it by heart. Shadow is light that has enough depth to
  develop a will of its own. When light falls into a room, a
  light-shifter makes brightness. You make hollows. The hollows
  LISTEN. Got it? No? Good. That was a lie because I wanted to
  keep it short. Read the chapter."

npc_vandara_sariel_3: >-
  "Stand in the light." Sariel gestures at the candle. "Now
  reach out. Not toward the candle. Toward the shadow you cast."
  You hesitate. Sariel grins, the first time today. "Yes, that
  works. Feel, don't think. Shadows are denser than ordinary
  light — palpable, when you know where." Long silence. Then:
  "Ah. There. You grabbed it. Feel the weight? Very good. Same
  way I learned it, at twelve, from a shifter in the Emerald
  Forest. Blind too, like me now. She said back then, eyes are
  just one way of many. Took me until I had to before I
  believed it."

# ─── Pamle — alchemy mentor (magma-dragon-shifter) ────────
npc_vandara_pamle_1: >-
  Pamle is a compact magma-dragon-shifter, in humanoid form just
  shoulder-height to you, with scales like crusted lava across
  her forearms. She stands at an improvised table piled with
  empty vials and crushed plant remains. "{player}, right? Sit.
  I'll make this quick: I'm Pamle, I teach alchemy. We start
  with two very simple recipes — energy potion and magic potion.
  They need nothing more than herbs, water, and a bit of heat."
  She taps her temple. "Go home, build the workshop from Kal're's
  blueprint, place the alchemy table in your room. Then you can
  brew them. Come back when you've made three energy potions —
  THREE, not two, not 'almost three'. Then I'll show you
  something better."

npc_vandara_pamle_2: >-
  Pamle waits with her hand already out. "Three energy potions,
  yes? Good." She takes them without comment and stores them on
  a shelf behind her. "I sell them to the first-years for decent
  money, by the way, in case you were wondering. Education isn't
  free." A sharp grin. "Now tier two: Wakeful Pollen Tea —
  regen over time. And Spark Light Vial — you'll learn to
  appreciate that one, trust me. Sariel down in the catacombs
  used to order them by the crate." She coughs as if she'd said
  too much. "Practice. Bring me three Spark Light Vials when
  you're ready."

npc_vandara_pamle_3: >-
  "Spark Light Vials. Three. Nice." Pamle weighs them in her
  hand, checks the brightness. "Cleanly done. You understand
  the dosing." She racks them. "Last round. Arcane Water is
  standard for any student who casts magic. And Ash Burn
  Tincture — that's my own invention. Made from Ash Willow
  pollen. Turns you into a logging machine for two minutes.
  You wouldn't believe how many orders the academy gets from
  construction firms for it." She nods to the door. "Come back
  once more. Then I'll have taught you everything I currently
  offer."

npc_vandara_pamle_4: >-
  "So." Pamle wipes her hands on an apron that's seen far too
  much. "That's the basics. You handle the six base recipes.
  What's next gets harder — Star Berries are rare, Ember Lotus
  rarer still, and some recipes demand reagents only Storm
  Seraphs can gather. But until then you've got plenty to do."
  She offers her hand. "Go and brew. If I ever teach anything
  new, you know where to find me. Oh — and Pamle isn't my full
  name, I never had one. Save the question."

npc_vandara_sariel_4: >-
  "You're not trained now. You're awake — that's something
  else." Sariel goes back to sorting notes. "What you need from
  here, you'll learn yourself. Come back if you want to try
  something more complicated. Next time bring me a bowl of
  water — I'll show you how to fetch a shadow that holds it
  while you do other things. That's actually the practical
  part." They laugh drily. "Forty years teaching and I still
  promise the interesting stuff for next session."

# ─── Ormias — Dragon Studies ──────────────────────────
# One session per main type, in order: intro, Great Dragons,
# Wyverns, Lindwurms, Amphitheres, Leviathans, Seraphs, Fae,
# and Lungs as the dramatic-irony closer.
npc_vandara_ormias_1: >-
  Lector Ormias is old. Very old. His dragon-form skull
  shimmers when he speaks — Magma Lindwurm line, scales like
  hardened lava. He wears rumpled robes and a pair of glasses
  that really don't fit. "Sit, student. Dragon Studies, basic
  course. We know seven main types: Great Dragons, Wyverns,
  Lindwurms, Amphitheres, Leviathans, Seraphs, Fae. Plus the
  imperial Lungs — an exception we'll get to last." He coughs.
  "One per session. No shortcuts. And remember the single most
  important thing about every one of them: they all have wings."
  A pause. "Yes. All of them."

npc_vandara_ormias_2: >-
  "Great Dragons. Guardians of the Realms. The bread-and-butter
  people from the Crystal Realm in the west." Ormias sketches a
  four-legged silhouette on the board — chalk breaks. "Strong
  build, four legs, a pair of broad leather wings, often an
  armoured tail-tip and large horns. The most common type by
  far. Many late bloomers — wings don't always come in until
  twenty or thirty." He glances at you over his glasses.
  "Statistically you are most likely one of these. Patience.
  They'll come."

npc_vandara_ormias_3: >-
  "Wyverns. Hunters of the skies." Another sketch — the chalk
  breaks again. "Two hindlegs only. Their front limbs fused
  with the wings during evolution. Fast, muscular flyers,
  usually with a venom-stinger or a heavy club at the tail.
  The Storm-Wyverns have wing-edges so sharp they cut wind
  like blades." He pushes his glasses up. They slide down
  immediately. "Common in the western lowlands. You'd remember
  if you were one — they fly young."

npc_vandara_ormias_4: >-
  "Lindwurms. The Earth-Bound." For the first time today,
  Ormias smiles, briefly. "My kind. Massive body, only two
  forelegs, the rear half a long serpent we drag behind us.
  Wings we have, but heavy — we are not graceful in the air.
  We dig, we climb, we are slow, and we are stubborn. Two main
  lines: Magma Lindwurms, scales like glowing lava, living
  near the magma sea. And Swamp Lindwurms, scales like algae
  and bark, blending into the Emerald jungle." He coughs.
  "Foreigners sometimes lump us in with western dragons. We
  are eastern. Don't confuse us."

npc_vandara_ormias_5: >-
  "Amphitheres. The Feathered Serpents." Ormias gestures broadly
  with both arms. "No limbs at all. Just a long serpentine
  body and a single pair of enormous, magnificent feathered
  wings — which, by the way, can store magical energy. Rare.
  Beautiful — even I admit it. Two sub-types we know of:
  Dream-Amphitheres, whose wing-strokes spin illusion-mist.
  And Sun-Amphitheres, golden feathers that can detonate into
  a blinding flash when threatened." He raises an eyebrow.
  "Magistra Veyra is one. Don't tell her I said she's beautiful."

npc_vandara_ormias_6: >-
  "Leviathans. Rulers of the Extremes." Ormias's voice drops —
  respect, not pride. "They live where no one else can. Tide-
  Leviathans command the floating water islands and the sea
  routes; sinewy wings doubling as fins underwater, fine gill-
  slits, absolute lords of the currents. Magma-Leviathans on
  the lowest, hottest islands above the lava sea; massive
  armoured wings, obsidian-plated scales, lungs that filter
  superheated gas. Once a year they meet at the lava-falls and
  trade." A short pause. "The most prestigious craft-folk in
  the empire."

npc_vandara_ormias_7: >-
  "Seraph Dragons. The Sky-Stormers." Ormias's tone goes dry.
  "Slender, aerodynamic, four to six narrow wings stacked one
  above the other. They live where the air is thin enough that
  a Great Dragon would lose consciousness, and they laugh at
  our storms because what we call a hurricane is their morning
  breeze." He waves a hand. "Don't expect to see one — they
  almost never come down. If you do, be polite."

npc_vandara_ormias_8: >-
  "Fae Dragons. The Emerald Weavers." Ormias's mouth twitches
  — something like fondness. "The smallest. Dragonfly wings,
  chameleon camouflage, originally from the deep Emerald
  jungle. Two cultures now: the wild Forest-Fae who still
  vanish into bark, and the City-Fae who've adapted to urban
  life and grow brilliant, gaudy scales because nothing in
  town wants to eat them anymore." He almost smiles. "If you
  ever meet one in a tavern, buy them a drink. Best gossip in
  Draconia."

npc_vandara_ormias_9: >-
  "And finally — the Lung Dragons. The Sky-Walkers." Ormias
  taps his desk pointedly. "Serpentine, wingless, four legs
  with sharp claws, characteristic beard-whiskers at the head.
  They fly by pure magic — no wings at all. The single
  exception to my opening rule." His glasses slip and he
  doesn't catch them this time. "And before you ask: yes, I
  noticed you have no wings. Don't get excited. Lung Dragons
  are an absolute genetic outlier — they only appear in the
  imperial bloodline, and even there currently only two exist.
  Emperor Ignis Aurum and Prince Ryuga. That is the list." He
  clears his throat. "You are most likely a late-blooming
  Great Dragon. In eighty percent of cases. Patience."

# ─── Quinell — Arcane Foundations ───────────────────────────
npc_vandara_quinell_1: >-
  Doctor Quinell is a crystal-dragon-shifter — scales like cut
  rock crystal that refract the hall's light into every colour
  of the spectrum. He stands behind a lectern, motionless.
  "Welcome. Arcane Foundations is the most boring lecture you
  will hear at this academy. And the most important. If you don't
  understand what magic IS, you will never apply it precisely.
  You will cast like a dog swims — functional, ugly, inefficient.
  We start with definitions."

npc_vandara_quinell_2: >-
  "Magic is the manipulation of the aether through a draconic
  mind. Three components: Element, Will, Substrate." Quinell
  draws three circles on the board, perfectly symmetrical.
  "Element is innate. Will is practice. Substrate is the
  physical material through which magic acts — sometimes one's
  own dragon form, sometimes a tool, sometimes the air itself.
  Whoever cannot separate these three in their mind will fail
  every advanced course."

npc_vandara_quinell_3: >-
  "Today, effect theory." Quinell has a heavy quartz staff
  before him. "Magic does not work 'just so'. It follows
  conservation laws. What you send into the world comes from
  you. Exhaustion is not failure, it is the measure of your
  effect. Whoever casts without exhaustion has done nothing."
  He pauses. "There are exceptions. Very few. If you discover
  one, write a doctoral thesis on it."

npc_vandara_quinell_4: >-
  Quinell sets a thin booklet before you. "Notes for the basic
  course. Chapter six may interest you — Shadow as a theoretical
  sub-variant of Light. Pure theory; no one has ever met a
  shadow-shifter willing to be examined. Maybe because they
  don't exist. Maybe because they hide well. Both interesting."
  His expression doesn't change. "Study it."

npc_vandara_gate_guard_admit: >-
  The gate warden — a massive earth-dragon shifter with scales like
  polished stone — looks you over slowly as you produce the letter.
  His gaze drifts across the rose-gold seal, then he gives a short
  nod. "First time in Vandara, eh? We see academy invitations every
  few weeks. You'll be surprised how big this city is below the
  surface." A wave of his hand and the great gate swings open behind
  him. "Welcome, {player}. Go on through — the mentors will explain
  the rest."

# Return after the shadow reveal. By this point the player has
# enrolled at the academy, taken the element tests, met the mentors —
# and discovered that shadow is their element. The warden notices
# in his own terse way.
npc_vandara_gate_guard_respect: >-
  The warden recognizes you before you've even reached the gate. He
  straightens up and brings a hand briefly to his chest — not a
  formal salute, more the gesture earth-dragon shifters use when
  they mean someone. "You've seen the city beneath the city. That
  changes a person." A small smile. "Most come with the letter,
  leave with the letter, see only half. You belong to those who
  know both halves now. Take care of yourself, {player}."
