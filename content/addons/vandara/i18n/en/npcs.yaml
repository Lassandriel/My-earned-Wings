npc_teacher_vandara_letter: >-
  "Before you go, {player}... this came for you this morning." Aria
  pulls a folded letter from her bag. The seal shimmers in warm rose
  gold. "From Vandara. The Rose Gold Academy. I wrote to them after
  seeing how seriously you studied. It's just an invitation — not an
  obligation. But if you want to find out what you really are, this
  might be the way."

# ─── Gate guard at the Vandara city walls ──────────────────
# (his name lives in ui.yaml — base game convention.)
# Olié — secretariat / enrollment
npc_vandara_olie_1: >-
  Secretary Olié looks up from his stack of files — an elegantly
  feathered serpent with iridescent scales like wet pebbles. "Ah.
  A new enrolment." He smiles, polite but distant. "Please have a
  seat. We'll go through the necessary in order. Name, origin,
  element if known." His feathered crest twitches when you hesitate
  on the last. "Unknown is also an answer, don't worry."

npc_vandara_olie_2: >-
  "Now, the enrolment fee." Olié slides a tiny bronze dish across
  the desk. "Twenty-five shards, one-off. The academy itself is
  free — we are not the Crystal Realm. The fee just covers
  paperwork and a sip of tea should you have to wait."

npc_vandara_olie_3: >-
  "Here is your ID." Olié hands you a thin, weighty plaque of
  polished rose gold. "It gets you anywhere you're allowed — and a
  few places you're not, but nobody checks." He taps a list on his
  desk. "Your mentors. Lector Ormias holds Dragon Studies. Doctor
  Quinell handles Arcane Foundations. And Practitioner Pamle gives
  Alchemy, though her class only makes sense once you've arranged
  a workshop yourself." A polite pause. "Since you couldn't state
  your element, I'll also send you to Magistra Veyra. She handles
  the diagnostics — not a class, a consultation. The best in the
  city. The academy is fortunate to keep her." A polite nod.
  "Welcome to Vandara, student."

# Step 4 — post-reveal reaction. Olié updates the bureaucratic
# record now that the player has a confirmed element.
npc_vandara_olie_4: >-
  Olié looks up from his stack, polite as ever. "Ah. The
  element field on your student record. I left it blank, as we
  discussed." He pulls out a thin pen. "I will fill it in now."
  A pause as he writes. "Shadow. Sub-variant Light. Note:
  rare." He blows on the ink. "There. Properly recorded. The
  academy archives appreciate accuracy more than novelty, but
  in this case they get both." A polite nod. "Carry on,
  student."

# Step 5 — Olié schedules the player's graduation exam. Unlocked
# once Sariel has finished teaching Shadow Bind (the practical
# component requires it) AND the three mandatory mentor courses
# are complete.
npc_vandara_olie_5: >-
  Olié sets down his pen the moment you arrive — clearly he has
  been waiting. "Your file is complete. Three basic courses,
  one element diagnostic, one independently arranged shadow-
  practice. The Council has authorised you to sit your
  graduation examination." He slides a thin rose-gold token
  across the desk. "Your exam permit. Show it at each station.
  Magistra Veyra will run the practical — she expects to see
  Shadow Bind under controlled conditions. Lector Ormias will
  examine you orally on Dragon Studies. Doctor Quinell will
  examine you in writing on Arcane Foundations." A small, formal
  pause. "Take them in any order. Return to me afterwards. I
  will be here. I am always here."

# Step 6 — Diploma ceremony. Requires all three exam flags.
# Visible after step 5 (via extendNPCArc on Olié) but gated so
# the player sees it waiting and knows what to do next.
npc_vandara_olie_6: >-
  Olié rises. He does not rise often. "All three sections
  passed. Magistra Veyra noted, and I quote, 'exemplary control
  for a first-year shadow-shifter — at least, the first I have
  ever met.' Lector Ormias noted, 'remembered all seven and
  named the eighth without prompting.' Doctor Quinell noted only
  'satisfactory'. That is the highest praise he has ever written
  on a graduation form, in my forty years." He produces a
  folded document of heavy cream paper with the rose-gold seal.
  "Your diploma. The Rose Gold Academy of Vandara hereby
  confirms that you have completed the basic curriculum." He
  hands it across with both hands. "Congratulations, graduate.
  The academy is in your debt for one shadow-shifter. Where you
  go next is not in our file." A small, almost warm smile.
  "Good luck, {player}."

# Kal're — trader in the streets of Vandara
npc_vandara_kalre_1: >-
  A young dragon-shifter with silver-blue hair and a stall full of
  glass jars calls out to you. "You're new, yeah? Easy to tell."
  She grins wide. "Kal're, from the Crystal Realm. Wind line. Did
  I already mention I'm from the Crystal Realm? I like saying it
  — then nobody asks why my scales are like glass." She nudges a
  small dish of ash flowers towards you. "Sniff. Smells like
  volcanic dust and one other thing you can't quite name. If you
  ever set foot in an alchemy lab, you'll need these."

npc_vandara_kalre_2: >-
  "You're back! Good, good." Kal're sorts glitter dust into tiny
  pouches. "You'll see — in Vandara everyone talks to everyone and
  everyone knows everything. Except the things they shouldn't, on
  those they're surprisingly disciplined."

npc_vandara_kalre_3: >-
  "Wondering if I trust you yet, eh?" She laughs. "Enough. Listen —
  you keep buying my reagents, but you've nowhere to use them. Most
  academy students put a small alchemy laboratory in their home.
  Two shelves, a copper basin, a flue." She sketches it on the
  back of a wrapper. "Here. Bring the wood and stone, you'll know
  how to put it together now."

npc_vandara_kalre_4: >-
  Kal're waves you closer. "Know what's funny about Vandara? The
  academy acts like it's the heart of the city. But the real
  things happen in the back rooms. The streets. The catacombs
  below." She winks. "Don't repeat that."

npc_vandara_kalre_5: >-
  "You're a regular now." Kal're taps her forehead. "If you ever
  need anything rare — really rare — come to me before you ask
  anyone else. I'll find it. Or I'll know someone who'll find it."

# Fafa — beggar at the fountain
npc_vandara_fafa_1: >-
  An old dragon-shifter sits hunched at the edge of the fountain,
  wrapped in a dusty grey cloak. Scales like cracked granite peek
  from under the cloth. She doesn't raise her head, but a bony
  hand stretches towards you. "A few shards for an old earth-
  dragon?" When you give, she finally looks up — grey eyes,
  sharp as freshly honed blades. "Thank you, child. You're new.
  This city has names, you know. Not just the one above the gate.
  Come back — I'll tell you one."

npc_vandara_fafa_2: >-
  Fafa pockets the shards without looking. "Vandara means 'change'.
  But they never tell you who wants the change and who fears it."
  She gestures at the academy behind you. "King Archivaris, the
  old keeper of bones, wants everything kept as it was. King-
  Rectoress Novia wants everything made new. They've been arguing
  before the imperial court for years. While they argue, no one
  truly rules. That makes Vandara... interesting. Come back."

npc_vandara_fafa_3: >-
  "You keep coming back. That's rare." Fafa smiles, and for a
  moment she doesn't look old, just tired. "Listen, child. The
  students in the upper halls learn what the mentors are allowed
  to teach. What they really want to know they learn elsewhere.
  Beneath the city. Come back one more time, and I'll show you
  where."

npc_vandara_fafa_4: >-
  This time Fafa takes no shards. She stands — and is suddenly
  taller than you thought. "Come." She leads you to an
  unremarkable storm drain behind the fountain, slides the iron
  aside as if it were a curtain. "The catacombs. The old tunnels
  from before the Unspeakable. Down here you'll find the ones who
  can really help you — if you have the courage to descend." She
  looks at you for a long moment. "Don't go alone until you know
  someone there you can trust. But go."

# ─── Veyra — Elemental Resonance ──────────────────────
npc_vandara_veyra_1: >-
  Magistra Veyra welcomes you into a sun-bright consultation room —
  tall windows, a velvet examination couch, instruments arranged on
  a side table beside a small carafe of cooled water. She is a Sun
  Amphithere, gold and soft orange, her feathers scattering the
  daylight across every surface. "Welcome, {player}. Olié sent you,
  yes? Good. This isn't a class — it's a consultation. You
  couldn't give him an element. That's quite alright." She gestures
  at the couch. "We'll find out together. Most students already
  know from home. The few who don't — often the most interesting
  ones."

npc_vandara_veyra_2: >-
  "First, the anamnesis." Veyra makes notes on a small slate, her
  feathered crest tilted with attention. "Tell me what you've felt
  at home. Anything that pulled at you — warmth in your hands,
  weight in your chest, dryness in your throat when angry, a sound
  no one else heard. Even nothing is an answer." She listens
  patiently. "Magic is bound to your element. You can't switch,
  you can only find. Some recognise it from a single moment.
  Others need exercises. We'll do both. Next time we begin the
  resonance tests."

npc_vandara_veyra_3: >-
  "First resonance test." Veyra draws the curtains halfway,
  pulls a low stool over and sits beside the couch. "Hands
  relaxed in your lap, palms up. Don't push. Don't reach. Let
  your aether settle on its own." Her quill hovers above her
  slate. She waits — long, longer than is comfortable. Then,
  quietly: "Hm. There is something. But it doesn't sit cleanly
  under any of the standard signatures. I'd like to run a
  proper battery next session. Come back rested — it goes
  smoother on a calm body."

npc_vandara_veyra_4: >-
  "Today the standard battery." Veyra has laid five objects on
  a small tray beside the couch — a stone, a bowl of water, a
  candle, a feather, a mirror. "One material per element. You
  touch each in turn. I watch what your aether does. There is
  no right answer and no wrong one — even 'nothing happens' is
  a clean result." She raises a finger. "One thing only: don't
  push. The aether doesn't lie when you let it be honest. Take
  your time. Ready when you are."

npc_vandara_veyra_5: >-
  "You came back. Good. Please sit." Veyra has already drawn
  the curtains entirely; only a single small candle burns on
  the side table. "The light reaction during your battery —
  that was not a null result. It was also not a clean light
  signature. I'd like to run a controlled isolation test.
  Hands open, no pushing, reach toward the candle." Long
  silence. Then her voice, suddenly different — no longer the
  clinician's measured tone: "Oh. Oh, {player}. You are not
  casting a shadow. You are PULLING the shadow toward you.
  From the wall. From the ceiling. From me." A breathless
  half-laugh. "You are not a light-shifter. You are a
  shadow-shifter. In forty years of diagnostics I have never
  seen one."

npc_vandara_veyra_6: >-
  Veyra is markedly more thoughtful today. "Shadow is a sub-
  variant of Light. Like Dream is a sub-variant of Tide. But it
  is rare. Very rare. In forty years of diagnostics I have
  never seen one." She looks at you seriously. "I can give you
  the theory. But the practice — I am out of my depth. I cannot
  teach you what I have never felt." She sets down her quill,
  hesitates, then continues quieter. "There was a colleague
  here, a long time ago. Sariel. Brilliant. Element-agnostic on
  paper until they disproved it themselves. We lost touch when
  they left the academy — forty years ago, give or take. I
  haven't heard their name in a long time, and I don't know
  whether they still lecture. But if anyone can teach you the
  practice of shadow, it is Sariel." She meets your eyes.
  "Be careful, {player}. 'Shadow' sounds romantic. Not everyone
  in this city sees it that way."

# Step 7 — practical graduation exam. The diagnostician becomes
# the examiner; she stays warm but is paying close attention.
npc_vandara_veyra_7: >-
  Veyra has cleared the consultation room of every personal
  object — only the velvet couch, the small candle, and her
  slate remain. "You came with the permit. Good. The practical
  is short." She gestures at the candle. "Bind a shadow to it.
  Hold it. Talk to me about something unrelated for a count of
  thirty. Do not let the shadow drop, do not let the
  conversation falter. The exam is not about strength — it is
  about doing two things at once without one swallowing the
  other." She watches. Notes. Watches some more. Then a small
  smile that is entirely the diagnostician and not at all the
  proctor. "Yes. Cleanly done. Forty years and a first. You
  pass. Tell Olié."

# Element trials — short reaction blurbs (used as each trial's
# dialogueKey in the step).
vandara_trial_fire_dialog: >-
  You hold your hand over the small flame. Warmth, of course —
  but no resonance. Veyra shakes her head. "No fire."

vandara_trial_earth_dialog: >-
  The stone sits heavy in your hand. You wait. Nothing. Veyra
  notes something down. "No earth."

vandara_trial_wind_dialog: >-
  You hold the feather up. It floats a moment, then falls.
  Normal — no magical lift. Veyra: "No wind."

vandara_trial_tide_dialog: >-
  Hand over the water bowl. The surface ripples faintly — from
  your breath, not from you. Veyra: "No tide."

vandara_trial_light_dialog: >-
  You look into the small mirror. Something flickers. Not in the
  mirror — IN the room behind you. Veyra snaps her head up.
  "There. That was something. But not clean light. Come back
  as soon as you can — I want to look at this more closely."

# ─── Sariel — shadow mentor in the catacombs ──────────
npc_vandara_sariel_1: >-
  The tunnel opens into a small chamber. A single candle burns
  on a low table. The person behind it doesn't turn around —
  they keep sorting notes on the table with their fingertips.
  "You're far too loud for your size, {player}. Walk softer when
  you're in a tunnel. Otherwise you don't hear when someone's
  standing in front of you." Their scales — if you can even
  call them that, sharp black crystals along the neck — clink
  faintly. Sariel raises their head, looks in your direction
  but not into your eyes. "Ah. Sit down. I'm Sariel. Make
  yourself comfortable — the candle is plenty for both of us,
  I don't need any light."

npc_vandara_sariel_2: >-
  "You want to know what shadow is." Sariel tilts their head a
  fraction. "I heard the binding when you came down. Cheap
  stitch, thin paper, smells like the academy's archive ink.
  Quinell still uses the same printer he did forty years ago.
  He sent you, didn't he. Or made you send yourself." A small
  dry sound that isn't quite a laugh. "He gave you that
  chapter of his — chapter six, I'd assume." "He sat in my class for two years
  scratching down everything I said. The chapter is his. I have
  never written a single word in my life — I have been blind
  since before I ever stood at a lectern. So when he handed you
  that book, what you held was Quinell's transcription of me,
  not a copy of anything mine. There was nothing to copy.
  Whether he got it right is between him and his own honesty."
  A pause. "The gist is short. Shadow is light that has enough
  depth to develop a will of its own. A light-shifter makes
  brightness. You make hollows. The hollows LISTEN. Got it? No?
  Good — that was a lie because I wanted to keep it short. Read
  his chapter anyway. He wrote it cleaner than I'd speak it
  twice."

npc_vandara_sariel_3: >-
  "Stand in the light." Sariel gestures at the candle. "Now
  reach out. Not toward the candle. Toward the shadow you cast."
  You hesitate. Sariel grins, the first time today. "Yes, that
  works. Feel, don't think. Shadows are denser than ordinary
  light — palpable, when you know where." Long silence. Then:
  "Ah. There. You grabbed it. Feel the weight? Very good. Same
  way I learned it, at twelve, from a shifter in the Emerald
  Forest. Blind too, like me now. She said back then, eyes are
  just one way of many. Took me until I had to before I
  believed it."

# ─── Pamle — alchemy mentor (magma-dragon-shifter) ────────
npc_vandara_pamle_1: >-
  Pamle is a compact magma-dragon-shifter, in humanoid form just
  shoulder-height to you, with scales like crusted lava across
  her forearms. She stands at an improvised table piled with
  empty vials and crushed plant remains. "{player}, right? Sit.
  I'll make this quick: I'm Pamle, I teach alchemy. We start
  with two very simple recipes — energy potion and magic potion.
  They need nothing more than herbs, water, and a bit of heat."
  She taps her temple. "Go home, build the workshop from Kal're's
  blueprint, place the alchemy table in your room. Then you can
  brew them. Come back when you've made three energy potions —
  THREE, not two, not 'almost three'. Then I'll show you
  something better."

npc_vandara_pamle_2: >-
  Pamle waits with her hand already out. "Three energy potions,
  yes? Good." She takes them without comment and stores them on
  a shelf behind her. "I sell them to the first-years for decent
  money, by the way, in case you were wondering. Education isn't
  free." A sharp grin. "Now tier two: Wakeful Pollen Tea —
  regen over time. And Spark Light Vial — you'll learn to
  appreciate that one, trust me. Sariel down in the catacombs
  used to order them by the crate." She coughs as if she'd said
  too much. "Practice. Bring me three Spark Light Vials when
  you're ready."

npc_vandara_pamle_3: >-
  "Spark Light Vials. Three. Nice." Pamle weighs them in her
  hand, checks the brightness. "Cleanly done. You understand
  the dosing." She racks them. "Last round. Arcane Water is
  standard for any student who casts magic. And Ash Burn
  Tincture — that's my own invention. Made from Ash Willow
  pollen. Turns you into a logging machine for two minutes.
  You wouldn't believe how many orders the academy gets from
  construction firms for it." She nods to the door. "Come back
  once more. Then I'll have taught you everything I currently
  offer."

npc_vandara_pamle_4: >-
  "So." Pamle wipes her hands on an apron that's seen far too
  much. "That's the basics. You handle the six base recipes.
  What's next gets harder — Star Berries are rare, Ember Lotus
  rarer still, and some recipes demand reagents only Storm
  Seraphs can gather. But until then you've got plenty to do."
  She offers her hand. "Go and brew. If I ever teach anything
  new, you know where to find me. Oh — and Pamle isn't my full
  name, I never had one. Save the question."

# Step 5 — post-reveal reaction. Pamle has heard the rumour
# and starts thinking practically about shadow-flavoured reagents.
npc_vandara_pamle_5: >-
  Pamle eyes you from the workbench. "So. Word's around.
  You're the shadow one." She doesn't seem surprised. "Means
  I should probably think about what reagents make sense for
  your sort. Ash from extinguished candles, mirror-shard dust,
  that kind of thing. I'll let you know if I come up with
  something." A sharp grin. "And don't expect a discount. Rare
  element doesn't mean broke. Now scoot, I've got tier-three
  brewing to teach the next batch."

npc_vandara_sariel_4: >-
  "You're not trained now. You're awake — that's something
  else." Sariel goes back to sorting notes. "What you need from
  here, you'll learn yourself. Come back if you want to try
  something more complicated. Next time bring me a bowl of
  water — I'll show you how to fetch a shadow that holds it
  while you do other things. That's actually the practical
  part." They laugh drily. "Forty years teaching and I still
  promise the interesting stuff for next session."

# ─── Step 5: the finale — Sariel teaches Shadow Bind ────────
# Sariel actually delivers on the promise from step 4: a shadow
# bound to a task does it for you while you do other things. Sets
# the base-game ability flag.
npc_vandara_sariel_5: >-
  "You brought the bowl. Good. Set it down — there, on the
  floor between us." Sariel doesn't move from the chair, but
  the candle flame flickers once. "Now. The trick I promised.
  Shadows aren't free. They are you, a part you push out into
  the world. So binding one costs your own magic, continuously,
  for as long as you keep it out." A long, slow pause. "Pick a
  task. Anything you do with your hands — chopping, brewing,
  drawing water. Look at your shadow. Then ask it to do that
  task instead of you. Not aloud. With the same wordless push
  you used when you grabbed the shadow off the wall last time."
  You try. The shadow at your feet lengthens — and then it
  lifts the bowl. Holds it. Steady. Sariel smiles, faintly.
  "Yes. That. Now you can do something else while the shadow
  carries on. Magic drains the whole time, mind you. When it
  runs out the shadow lets go." Another pause. "One shadow.
  One task. That's the cap I can teach you. Splitting your
  attention further than that is for the next forty years, not
  the next hour." They lean back. "Go. Do two things at once.
  It is the closest most of us ever come to being free."

# ─── Ormias — Dragon Studies ──────────────────────────
# One session per main type, in order: intro, Great Dragons,
# Wyverns, Lindwurms, Amphitheres, Leviathans, Seraphs, Fae,
# and Lungs as the dramatic-irony closer.
npc_vandara_ormias_1: >-
  Lector Ormias is old. Very old. His dragon-form skull
  shimmers when he speaks — Magma Lindwurm line, scales like
  hardened lava. He wears rumpled robes and a pair of glasses
  that really don't fit. "Sit, student. Dragon Studies, basic
  course. We know seven main types: Great Dragons, Wyverns,
  Lindwurms, Amphitheres, Leviathans, Seraphs, Fae. Plus the
  imperial Lungs — an exception we'll get to last." He coughs.
  "One per session. No shortcuts. And remember the single most
  important thing about every one of them: they all have wings."
  A pause. "Yes. All of them."

npc_vandara_ormias_2: >-
  "Great Dragons. Guardians of the Realms. The bread-and-butter
  people from the Crystal Realm in the west." Ormias sketches a
  four-legged silhouette on the board — chalk breaks. "Strong
  build, four legs, a pair of broad leather wings, often an
  armoured tail-tip and large horns. The most common type by
  far. Many late bloomers — wings don't always come in until
  twenty or thirty." He glances at you over his glasses.
  "Statistically you are most likely one of these. Patience.
  They'll come."

npc_vandara_ormias_3: >-
  "Wyverns. Hunters of the skies." Another sketch — the chalk
  breaks again. "Two hindlegs only. Their front limbs fused
  with the wings during evolution. Fast, muscular flyers,
  usually with a venom-stinger or a heavy club at the tail.
  The Storm-Wyverns have wing-edges so sharp they cut wind
  like blades." He pushes his glasses up. They slide down
  immediately. "Common in the western lowlands. You'd remember
  if you were one — they fly young."

npc_vandara_ormias_4: >-
  "Lindwurms. The Earth-Bound." For the first time today,
  Ormias smiles, briefly. "My kind. Massive body, only two
  forelegs, the rear half a long serpent we drag behind us.
  Wings we have, but heavy — we are not graceful in the air.
  We dig, we climb, we are slow, and we are stubborn. Two main
  lines: Magma Lindwurms, scales like glowing lava, living
  near the magma sea. And Swamp Lindwurms, scales like algae
  and bark, blending into the Emerald jungle." He coughs.
  "Foreigners sometimes lump us in with western dragons. We
  are eastern. Don't confuse us."

npc_vandara_ormias_5: >-
  "Amphitheres. The Feathered Serpents." Ormias gestures broadly
  with both arms. "No limbs at all. Just a long serpentine
  body and a single pair of enormous, magnificent feathered
  wings — which, by the way, can store magical energy. Rare.
  Beautiful — even I admit it. Two sub-types we know of:
  Dream-Amphitheres, whose wing-strokes spin illusion-mist.
  And Sun-Amphitheres, golden feathers that can detonate into
  a blinding flash when threatened." He raises an eyebrow.
  "Magistra Veyra is one. Don't tell her I said she's beautiful."

npc_vandara_ormias_6: >-
  "Leviathans. Rulers of the Extremes." Ormias's voice drops —
  respect, not pride. "They live where no one else can. Tide-
  Leviathans command the floating water islands and the sea
  routes; sinewy wings doubling as fins underwater, fine gill-
  slits, absolute lords of the currents. Magma-Leviathans on
  the lowest, hottest islands above the lava sea; massive
  armoured wings, obsidian-plated scales, lungs that filter
  superheated gas. Once a year they meet at the lava-falls and
  trade." A short pause. "The most prestigious craft-folk in
  the empire."

npc_vandara_ormias_7: >-
  "Seraph Dragons. The Sky-Stormers." Ormias's tone goes dry.
  "Slender, aerodynamic, four to six narrow wings stacked one
  above the other. They live where the air is thin enough that
  a Great Dragon would lose consciousness, and they laugh at
  our storms because what we call a hurricane is their morning
  breeze." He waves a hand. "Don't expect to see one — they
  almost never come down. If you do, be polite."

npc_vandara_ormias_8: >-
  "Fae Dragons. The Emerald Weavers." Ormias's mouth twitches
  — something like fondness. "The smallest. Dragonfly wings,
  chameleon camouflage, originally from the deep Emerald
  jungle. Two cultures now: the wild Forest-Fae who still
  vanish into bark, and the City-Fae who've adapted to urban
  life and grow brilliant, gaudy scales because nothing in
  town wants to eat them anymore." He almost smiles. "If you
  ever meet one in a tavern, buy them a drink. Best gossip in
  Draconia."

npc_vandara_ormias_9: >-
  "And finally — the Lung Dragons. The Sky-Walkers." Ormias
  taps his desk pointedly. "Serpentine, wingless, four legs
  with sharp claws, characteristic beard-whiskers at the head.
  They fly by pure magic — no wings at all. The single
  exception to my opening rule." His glasses slip and he
  doesn't catch them this time. "And before you ask: yes, I
  noticed you have no wings. Don't get excited. Lung Dragons
  are an absolute genetic outlier — they only appear in the
  imperial bloodline, and even there currently only two exist.
  Emperor Ignis Aurum and Prince Ryuga. That is the list." He
  clears his throat. "You are most likely a late-blooming
  Great Dragon. In eighty percent of cases. Patience."

# Step 10 — post-reveal reaction. Ormias gracefully eats his
# words about the late-blooming Great Dragon prediction.
npc_vandara_ormias_10: >-
  "Ah." Ormias adjusts his glasses, which immediately slip
  back down. "I heard. Word travels fast in academy
  corridors, especially when it involves the impossible." He
  coughs. "Allow me one moment of professional embarrassment.
  I told you, with some confidence, that you were most likely
  a late-blooming Great Dragon. I appear to have been
  incorrect — though, in fairness, also not entirely wrong.
  Shadow is a sub-variant of Light. Light-shifters are Great
  Dragons. So technically, statistically, the eighty percent
  still holds. Just." He gestures vaguely. "I would very much
  like to update Chapter Two of my book. Come and visit again
  sometime — I will have new questions for you, and the
  questions are usually more interesting than the answers."

# Step 11 — oral graduation exam on Dragon Studies.
npc_vandara_ormias_11: >-
  Ormias has cleared his usual chaos off the desk and lined up
  a single sheet of paper, on which exactly one word is
  written: PROCEED. He looks at you sideways. "Right. Oral
  exam. I will say the prompt, you will speak the answer. No
  notes. Try not to cough on me." He clears his throat as if
  to demonstrate. "Name the seven main types of dragon-shifter,
  in any order, with one distinguishing feature each." Long
  silence as you recite. He nods through each. "Good, good,
  good." Then: "And the eighth." A pause. "Yes, the eighth. We
  both know there is one. Name it, and the one identifying
  feature that disqualifies all of the others." Another pause
  as you answer. His glasses slip and he does not catch them
  this time either. "Lung-Drachen. Wingless. Exactly." He
  smiles, briefly. "You pass. Tell Olié. And come back later
  for a longer conversation. I have updated some questions."

# ─── Quinell — Arcane Foundations ───────────────────────────
# One lecture per law, in order: intro, definition, three-component
# law, element binding, conservation, exhaustion, exceptions —
# closing with Sariel as the academy's one documented exception.
npc_vandara_quinell_1: >-
  Doctor Quinell is a crystal-dragon-shifter — scales like cut
  rock crystal that refract the hall's light into every colour
  of the spectrum. He stands behind a lectern, motionless.
  "Welcome. Arcane Foundations is the most boring lecture you
  will hear at this academy. And the most important. If you don't
  understand what magic IS, you will never apply it precisely.
  You will cast like a dog swims — functional, ugly, inefficient.
  Seven sessions: the definition, four laws, and the exceptions
  that frame them. No shortcuts. We begin with the definition."

npc_vandara_quinell_2: >-
  "Definition." Quinell does not move while speaking. "Magic is
  the manipulation of the aether through a draconic mind. Note:
  the aether — not 'energy', not 'force'. Note: draconic mind —
  not draconic body. The body is a tool, the mind is the caster."
  He pauses for two seconds. "If you remember nothing else from
  this entire course, remember those two words. Aether. Mind.
  Everything else follows."

npc_vandara_quinell_3: >-
  "First law. The Three-Component Law." Quinell draws three
  circles on the board, perfectly symmetrical. "Every act of
  magic requires three elements at once. Element — your innate
  alignment, the one element your bloodline grants you. Will —
  the trained focus of your draconic mind. Substrate — the
  physical material through which the effect manifests. Your
  own form, a tool, the air itself." His tone sharpens. "Three.
  Always three. Whoever cannot separate them in their mind will
  fail every advanced course at this academy."

npc_vandara_quinell_4: >-
  "Second law. The Element-Binding Law." Quinell's tone does
  not warm. "You cannot 'choose' your element. You cannot
  'switch'. Whatever your bloodline gave you at birth is what
  you will cast for the entirety of your life. A fire-shifter
  who tries to wield water produces nothing — not weak water,
  no water at all." He looks past you, not at you. "Students
  occasionally arrive convinced they can train themselves into
  a second element. They cannot. Disabuse yourself now."

npc_vandara_quinell_5: >-
  "Third law. The Conservation Law." Quinell lifts a heavy
  quartz staff from beside the lectern, holds it, sets it down
  again. "Magic does not come from nothing. What you send into
  the world comes from you. Personal energy out, magical effect
  in — one to one, no exceptions to the accounting. The aether
  is a medium, not a source." He pauses. "Anyone who tells you
  they have found 'free magic' is selling you a fraud or
  performing a parlour trick. Probably both."

npc_vandara_quinell_6: >-
  "Fourth law. The Exhaustion Law." Quinell finally lets a
  small expression cross his face — almost approval. "This is
  the law students misunderstand most. Exhaustion is not
  failure. Exhaustion is the measure of your effect. Tired
  means the magic happened. Untired means it did not." His
  voice levels again. "Whoever casts without exhaustion has
  done nothing. Whoever exhausts themselves casting a teacup
  has cast a real teacup. Apply both halves of that rule and
  you will already cast better than three quarters of the
  students sitting in this hall."

npc_vandara_quinell_7: >-
  "Final session. Exceptions." Quinell sets a thin booklet on
  the lectern but does not push it toward you. "Four laws. They
  are correct. They are also exceptions away from being
  incorrect — very few, very rare, in eighty percent of cases
  the laws hold without remainder. The remaining twenty are
  what doctoral theses are made of." For the first time, he
  pauses noticeably. "There was a colleague here once. Sariel.
  Element-agnostic, the records said, until they themselves
  disproved that. Chapter six of these notes is mine — I
  transcribed it from their lectures. They are blind, have been
  since before I knew them; the writing was always my part of
  the arrangement. They lectured, I wrote. The chapter is the
  only treatise I know on Shadow as a sub-variant of Light.
  No one has ever met a documented shadow-shifter willing to
  be examined. They left the academy forty years ago. Whether
  they still live, I do not know." A small breath, then nothing.
  "Read the chapter. If you ever find evidence of a current
  shadow-shifter, write the thesis. Dedicate it appropriately."

# Step 8 — post-reveal reaction. Quinell, who'd lectured about
# Sariel with the resigned tone of someone mourning a colleague,
# gets a quiet vindication. He does not show it loudly.
npc_vandara_quinell_8: >-
  Quinell does not move when you enter — but the angle of his
  head shifts, ever so slightly. "I heard." A pause. "Sariel
  was correct, then. The records were wrong; the lecture chapter
  was right. I will note it in the archives." Another pause,
  longer. "If you ever — when you go back down to them — tell
  Sariel that the chapter still works. Forty years on, students
  still pass it. They may not remember me, but I have remembered
  them." His voice does not change pitch, but something in the
  room does. "That is all. Go. Study. Apply the laws. You will
  need every one of them."

# Step 9 — written graduation exam on Arcane Foundations.
npc_vandara_quinell_9: >-
  Quinell does not move when you enter. A single sheet of
  paper waits on the lectern with four lines printed on it.
  "Sit. Write. State each of the four laws by name and one
  sentence of substance. You may take as long as you require
  within reason. Use the pen, not your finger." Long silence.
  You write. He waits, motionless. When you set the pen down he
  reads the sheet without expression, then folds it once and
  drops it into a tray marked PASSED. "Satisfactory. Return to
  Olié." A pause that for him counts as warm. "Apply them
  honestly. The laws do not care whether you remember them.
  Only whether you respect them."

npc_vandara_gate_guard_admit: >-
  The gate warden — a massive earth-dragon shifter with scales like
  polished stone — looks you over slowly as you produce the letter.
  His gaze drifts across the rose-gold seal, then he gives a short
  nod. "First time in Vandara, eh? We see academy invitations every
  few weeks. You'll be surprised how big this city is below the
  surface." A wave of his hand and the great gate swings open behind
  him. "Welcome, {player}. Go on through — the mentors will explain
  the rest."

# Return after the shadow reveal. By this point the player has
# enrolled at the academy, taken the element tests, met the mentors —
# and discovered that shadow is their element. The warden notices
# in his own terse way.
npc_vandara_gate_guard_respect: >-
  The warden recognizes you before you've even reached the gate. He
  straightens up and brings a hand briefly to his chest — not a
  formal salute, more the gesture earth-dragon shifters use when
  they mean someone. "You've seen the city beneath the city. That
  changes a person." A small smile. "Most come with the letter,
  leave with the letter, see only half. You belong to those who
  know both halves now. Take care of yourself, {player}."


# ─── Catacomb students arc (Korren + Iska + Daven) ───────────
# Two students serving opposite Vandara Vassals push each other
# into bigger and bigger rule-breaking; Marshal Daven eventually
# comes down to arrest them with the player's help.

npc_vandara_korren_1: >-
  Korren looks up from a low workbench cluttered with broken
  pottery and old metal fragments. His skin has the rust-brown
  tone of old earth at the neck and hands where the scales
  show through, and his wings — when he shifts on his stool —
  fan out behind him in deep red membrane.
  "You came down. Good. Word travels, even to here." He
  gestures at the bench. "I'm Korren. I'm — well. I work for
  King Archivaris. Not officially, you understand. Officially
  I'm a third-year student who 'fell behind on Dragon Studies'.
  Unofficially I'm down here proving something." He picks up
  a corroded ring. "Echo-summoning. Old objects remember. I
  bring them up just enough to whisper. The academy thinks
  it's necromancy. It isn't — there's no soul, just resonance.
  But the academy doesn't care about distinctions when it
  can't see the math." He holds the ring out. "Help me. I
  need a thread of your magic to anchor the echo. Five
  threads' worth, that's all. The ring will tell me how the
  smith who made it died. Small thing. Proof."

npc_vandara_korren_2: >-
  Korren is energised — pacing, scales darker, more vivid.
  "I heard Iska did it. The Wyvern with the puppet. Made a
  teaspoon stand up by itself for ten seconds." A bitter grin.
  "Cute. Animation is the easy thing. Anyone can poke matter
  and make it twitch. What I'm doing is harder — I'm reaching
  across time. But the corridor talked about Iska, not me, and
  that means my king loses today's argument." He shoves the
  ring back into a pile. "We're going bigger. I have a coin,
  military issue, from the war forty years ago. It's seen a
  man die. If I can make it tell me HOW, the academy can't
  call the echo trick parlour magic any more. Ten threads. Now."

npc_vandara_korren_3: >-
  Korren has barely slept. The workbench is covered in objects.
  "Iska is animating a corpse-doll. A SMALL one, but still.
  The whole city will hear about that by the end of the week,
  and if Archivaris doesn't have an answer by then, Novia's
  faction wins this round in court. So we're going to wake a
  real memory." He holds up something wrapped in cloth. "A
  shard from the imperial archive. Don't ask how I got it.
  It saw — never mind what it saw. Twenty threads of magic,
  and we'll know whether the official records are the actual
  records." The shard hums when you touch it. The candle flame
  goes out for a full second. Korren laughs — too thinly.
  "It worked. Oh, it worked. Wait until I write this up. Wait
  until—" He cuts off, staring at nothing.

npc_vandara_iska_1: >-
  A Wyvern in humanoid form stands at a workbench surrounded
  by trinkets — a spoon, a coil of wire, a chess piece. Her
  hair is dark, sticking up at angles, and her patchwork robe
  is a riot of colour. Her wings flick out behind her in deep
  red, the same shape as Korren's down the corridor. "Hi, hi,
  sit down, don't break my circle." She doesn't look up.
  "Iska. Wind line. I'm not supposed to be here, I'm supposed
  to be at Pamle's tier-three lecture, but Pamle teaches
  BREWING and I want to make things MOVE." She points at the
  spoon. "Watch. Five threads of magic from you, that's all I
  need. The spoon stands up. Maybe. Last time it stood up and
  stabbed me, so. Stand back." She grins. "King Novia would
  love this. The old people say matter is inert. Matter is
  not inert. Matter is just shy."

npc_vandara_iska_2: >-
  Iska is grinning wider than before, gesturing with both
  hands at once. "Korren did the ring thing. Made it whisper.
  Whisper. Anyone can whisper. I want to MOVE." She points
  at a clockwork chassis on her workbench. "I'm wiring runes
  into a clockwork. Not just twitch — walk. Three steps. The
  court will laugh Korren out of the room when they see this.
  Ten threads, please, fast, I've got the geometry held in my
  head and I'll lose it if you make me wait."

npc_vandara_iska_3: >-
  Iska looks haggard. Both eyes red-rimmed. On the workbench
  is something small under a cloth. "Korren is going to the
  imperial archive. Did you know that? I know it. The walls
  down here listen." She uncovers the cloth. A small puppet
  figure made of wood, wire, and something that looks
  suspiciously like a finger-bone. "Don't ask. Borrowed. From
  an old grave. The grave's a hundred years past anyone
  caring. Twenty threads, and I make it walk a circle. If I
  do, Novia's faction owns the lecture halls for a decade."
  The figure stirs when you channel the magic. Stands. Takes
  one step, then another, then a third, then — it turns its
  tiny head toward you. Iska laughs, ecstatic. "YES. That.
  Did you see that? It looked. It LOOKED—"

npc_vandara_daven_1: >-
  A tall Great Dragon shifter steps into the candlelit
  chamber. Their scales are slate-grey, their coat a deep red
  with a single thread of academy gold at the collar. They
  look at you, not at the workbenches. "You. Student. I've
  been told you've been visiting down here. I'm Marshal Daven,
  Council-of-Vandara enforcement." A small nod. "I'm not
  arresting you — yet. I'm asking because you've seen them.
  Korren the echo-summoner and Iska the animator. What are
  they up to? Speak plainly. The Council has had complaints
  from both kings' agents, which is rare enough to be its own
  kind of evidence. Tell me what you can. We can speak about
  your own role afterwards."

npc_vandara_daven_2: >-
  Daven listens, taking notes on a small slate. "An echo from
  an imperial archive shard. An animated figure made from
  grave-robbed bone. Both anchored to your own magic." They
  sigh once, briefly. "This is the pattern I've seen every
  fifteen or twenty years. Two students, one for each king.
  They start small, they escalate against each other, and
  somebody eventually goes to the imperial archive or to a
  grave. You did not start this. You did, however, contribute
  the magical thread that pushed both of them past the line."
  They look at you directly for the first time. "I appreciate
  your cooperation. One last question. Show me where they
  work. Exactly where. The Council prefers a clean arrest."

npc_vandara_daven_3: >-
  You lead Daven to Korren's workbench, then to Iska's. They
  nod once at each. Two more guards step in behind them —
  quiet, professional. There is no shouting; both students
  seem to have been waiting, in their own way. Korren
  straightens, refuses to look at you. Iska looks at you and
  grins, then winks, and lets herself be led out. "Thanks for
  the boost, kid! Tell Pamle I'm sorry about the brewing
  class!" Daven returns to you alone. "It's done. The Council
  will hear them in a month. Probably suspended for two
  years, probably back at the academy after that with a
  different mentor each. No prison. They are children." A
  pause. "You. Your role will be noted in the file as
  'cooperating witness'. That is more generous than
  'accomplice', which it could just as easily be. Walk
  carefully, student. Do not believe everything every Vassal's
  agent tells you." They turn to leave. "And the next time
  someone in the catacombs asks for your magic — say no. Just
  once. Say no."
