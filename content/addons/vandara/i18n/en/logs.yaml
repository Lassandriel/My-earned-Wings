receive_vandara_letter: >-
  Aria hands you a letter sealed in rose gold wax. An invitation to
  the Academy in Vandara.
vandara_admitted: >-
  You've been admitted to Vandara. The academy lies before you.
vandara_enrolled: >-
  Olié hands you the student ID. You are officially a student of
  the Rose Gold Academy.
vandara_alchemy_laboratory_built: >-
  Your Alchemy Laboratory is up. Now you just need someone to show
  you what to do with it.
vandara_katakomben_unlocked: >-
  Fafa shows you the hidden entrance to the catacombs beneath
  Vandara. Another city lies below.
vandara_veyra_intro_done: >-
  You've completed Veyra's element diagnostic consultation.
vandara_ormias_intro_done: >-
  You've completed Ormias's basic course on Dragon Studies.
vandara_quinell_intro_done: >-
  You've completed Quinell's basic course on Arcane Foundations.
vandara_trial_fire: Fire trial — no resonance.
vandara_trial_earth: Earth trial — no resonance.
vandara_trial_wind: Wind trial — no resonance.
vandara_trial_tide: Tide trial — no resonance.
vandara_trial_light: >-
  Light trial — something flickered. But not clean light. Veyra
  is unsettled-fascinated.
vandara_shadow_revealed: >-
  Veyra has confirmed it: you are a shadow-shifter. A sub-variant
  of Light, extremely rare. She points you to someone who can
  actually help — Fafa knows where.
vandara_katakomben_entered: >-
  Fafa leads you into the catacombs. In a small chamber waits
  someone named Sariel — candlelit, blind, and apparently
  not surprised.
vandara_shadow_trained: >-
  Sariel has walked you through the basics. You're awake — the
  rest comes with practice.
vandara_pamle_intro_done: >-
  Pamle showed you the two basic recipes — energy potion and
  magic potion.
vandara_pamle_tier2_done: >-
  Pamle takes your three energy potions and teaches you tier-2 —
  Wakeful Pollen Tea and Spark Light Vial.
vandara_pamle_tier3_done: >-
  Pamle takes three Spark Light Vials and teaches you Arcane
  Water and Ash Burn Tincture.
vandara_alchemy_mastered: >-
  You've mastered Pamle's full basics. More complex recipes will
  come later.
