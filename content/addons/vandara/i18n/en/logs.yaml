receive_vandara_letter: >-
  Aria hands you a letter sealed in rose gold wax. An invitation to
  the Academy in Vandara.
vandara_admitted: >-
  You've been admitted to Vandara. The academy lies before you.
vandara_enrolled: >-
  Olié hands you the student ID. You are officially a student of
  the Rose Gold Academy.
vandara_alchemy_laboratory_built: >-
  Your Alchemy Laboratory is up. Now you just need someone to show
  you what to do with it.
vandara_dorm_built: >-
  You've rented a student room in Vandara. Small, but your own.
vandara_loft_built: >-
  You've moved into a sunlit scholar's loft. Light everywhere —
  shadows come easy here.
vandara_catacomb_built: >-
  You've claimed a hidden chamber in the catacombs. Quiet, dark,
  and entirely off the records.
vandara_katakomben_unlocked: >-
  Fafa shows you the hidden entrance to the catacombs beneath
  Vandara. Another city lies below.
vandara_veyra_intro_done: >-
  You've completed Veyra's element diagnostic consultation.
vandara_ormias_intro_done: >-
  You've completed Ormias's basic course on Dragon Studies.
vandara_quinell_intro_done: >-
  You've completed Quinell's basic course on Arcane Foundations.
vandara_trial_fire: Fire trial — no resonance.
vandara_trial_earth: Earth trial — no resonance.
vandara_trial_wind: Wind trial — no resonance.
vandara_trial_tide: Tide trial — no resonance.
vandara_trial_light: >-
  Light trial — something flickered. But not clean light. Veyra
  is unsettled-fascinated.
vandara_shadow_revealed: >-
  Veyra has confirmed it: you are a shadow-shifter. A sub-variant
  of Light, extremely rare. She gives you a name — Sariel, an old
  colleague who left the academy forty years ago.
vandara_shadow_trained: >-
  Sariel has walked you through the basics. You're awake — the
  rest comes with practice.
vandara_shadow_bind_learned: >-
  Sariel has taught you to bind a shadow to a task. Magic drains
  while it works; one shadow at a time for now.

# Reveal-reaction beats. The flag-revealed news has spread through
# the academy and these NPCs each had something to say about it.
vandara_ormias_reveal_reaction: >-
  Ormias gracefully eats his "late-blooming Great Dragon"
  prediction. He'd like you back for more questions.
vandara_quinell_reveal_reaction: >-
  Quinell quietly acknowledges Sariel was right all along.
vandara_olie_reveal_reaction: >-
  Olié updates your student record. Element: Shadow. Sub-Light. Rare.
vandara_pamle_reveal_reaction: >-
  Pamle has heard. Says she'll think about shadow-flavoured reagents.

# Graduation arc — Olié schedules the exam, the player runs the
# three stations, returns for the diploma.
vandara_exam_scheduled: >-
  Olié has scheduled your graduation exam. Three stations: Veyra
  for the practical, Ormias for the oral, Quinell for the written.
vandara_exam_veyra_done: >-
  Practical exam passed. Veyra's note: "exemplary control for a
  first-year shadow-shifter."
vandara_exam_ormias_done: >-
  Oral exam passed. Ormias's note: "remembered all seven and named
  the eighth without prompting."
vandara_exam_quinell_done: >-
  Written exam passed. Quinell's note: "satisfactory" — his highest
  praise in forty years.
vandara_graduated: >-
  You have graduated from the Rose Gold Academy of Vandara.

vandara_pamle_intro_done: >-
  Pamle showed you the two basic recipes — energy potion and
  magic potion.
vandara_pamle_tier2_done: >-
  Pamle takes your three energy potions and teaches you tier-2 —
  Wakeful Pollen Tea and Spark Light Vial.
vandara_pamle_tier3_done: >-
  Pamle takes three Spark Light Vials and teaches you Arcane
  Water and Ash Burn Tincture.
vandara_alchemy_mastered: >-
  You've mastered Pamle's full basics. More complex recipes will
  come later.

# Catacomb students arc — three loops then arrest.
vandara_korren_1_done: >-
  Korren has woken a faint echo from a smith's ring. He's pleased.
vandara_korren_2_done: >-
  Korren has pulled a fuller echo out of an old military coin.
  He's pacing.
vandara_korren_arc_done: >-
  Korren has cracked an imperial archive shard open. The candle
  went out for a second. He doesn't look well.
vandara_iska_1_done: >-
  Iska's spoon stood up by itself for ten seconds. She is
  delighted and slightly bleeding.
vandara_iska_2_done: >-
  Iska's clockwork figure took three steps. The court will hear.
vandara_iska_arc_done: >-
  Iska's bone puppet walked a circle and turned to look at you.
  Iska is laughing. You are not.
vandara_daven_tip_1: >-
  Marshal Daven has arrived and asked you for a general account.
vandara_daven_tip_2: >-
  You have described both experiments in detail. Daven is taking
  notes.
vandara_catacomb_students_busted: >-
  You led Marshal Daven to both workbenches. Korren and Iska
  have been arrested. Your role: cooperating witness.
