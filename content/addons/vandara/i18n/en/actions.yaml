act-vandara-brew-energy-potion-small:
  title: "Brew Small Energy Potion"
  desc: >-
    Pamle's first recipe. Herbs crushed in a mortar, hot water
    poured over, stirred once. Tastes of meadow and bad tea —
    but it works immediately.

act-vandara-brew-magic-potion-small:
  title: "Brew Small Magic Potion"
  desc: >-
    Blossoms distilled in water. Turns pale purple when ready.
    Helps you focus, tastes like the first sip of something
    you shouldn't drink.

act-vandara-brew-pollen-tea:
  title: "Brew Wakeful Pollen Tea"
  desc: >-
    Glow pollen dusted over blossoms, steeped for a minute.
    Bright infusion that regenerates you steadily for a while
    instead of one short jolt.

act-vandara-brew-spark-vial:
  title: "Brew Spark Light Vial"
  desc: >-
    Glitter dust bound inside an ash flower. The vial glows on
    its own — a portable light you can hang from your belt.
    Lowers the magic cost of your arcane focus.

act-vandara-brew-arcane-water:
  title: "Brew Arcane Water"
  desc: >-
    Student standard: arcane dust dissolved in water, stabilised
    with a pinch of glitter dust. Crisp magic boost now, gentle
    aftereffect.

act-vandara-brew-ash-tincture:
  title: "Brew Ash Burn Tincture"
  desc: >-
    Pamle's own invention. Ash-flower pollen concentrated with
    resin. Turns you into a logging machine for two minutes —
    more yield from every strike.
