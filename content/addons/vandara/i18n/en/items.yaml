item_vandara_letter_title: Rose Gold Academy Invitation
item_vandara_letter_desc: >-
  A folded, heavy letter on cream-coloured paper, sealed with rose
  gold wax. Inside, in elegant handwriting, the academy invites you
  to Vandara. "We welcome dragon-shifters of all backgrounds to find
  their own way." A map of the city is enclosed.

item_vandara_student_id_title: Rose Gold Academy Student ID
item_vandara_student_id_desc: >-
  A small, weighty plaque of polished rose gold with your name, a
  serial number, and the academy crest. Issued by the secretariat —
  Secretary Olié had you spell your name twice, "to keep the record
  clean."

item_alchemy_table_title: Alchemy Table
item_alchemy_table_desc: >-
  Solid, heat-resistant table with vial holders, a small burner
  and a mortar shelf. From Kal're's blueprint. Place it in one of
  your homes — Pamle's recipes will then be ready to brew.

