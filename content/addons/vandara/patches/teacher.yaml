# Vandara — patches against base game content.
#
# Hangs a 4th step (the Vandara invitation letter) onto Aria's
# act-npc-teacher action, AND wires her graduation step (step 3, 0-based
# index 2) to fire `extendNPCArc` on herself at exactly the moment the
# player graduates. The NPC.maxProgress lift happens runtime, so the
# player never sees a "3/4" spoiler before the achievement — Aria reads
# as "3/3 done" through the entire base demo and only opens up to "3/4"
# the instant graduation fires.
#
# This is the canonical pattern for "NPC X gets a new step after
# achievement Y" — see also Veyras Shadow-Reveal → Wächter (Step 6
# of act-npc-vandara-veyra).

- targetType: action
  targetId: act-npc-teacher
  appendSteps:
    - cost: 5
      costType: energy
      requirements:
        flags.school_graduate: true
      onSuccess:
        - type: unlockItem
          id: item-vandara-letter
        - type: setFlag
          flag: vandara-invited
          value: true
        # Surfaces the gate guard NPC in the Orte > Vandara sub-tab.
        # Without this the player would have the letter but nowhere
        # visible to take it — the guard is their first contact.
        - type: unlockNPC
          id: npc-vandara-gate-guard
        - type: log
          logKey: receive_vandara_letter
          color: var(--gold)
      dialogueKey: npc_teacher_vandara_letter
  # Step 3 = index 2 in steps[] (Aria's "graduate" step, sets
  # school_graduate). Adding extendNPCArc to its onSuccess bumps
  # Aria's NPC.maxProgress from 3 → 4 right when she graduates,
  # making the freshly-appended Vandara-letter step (index 3)
  # reachable — without any build-time spoiler.
  addStepOnSuccess:
    step: 2
    effects:
      - type: extendNPCArc
        npcId: npc-teacher
