# Akademie-Mentoren — drei Lehrkräfte für das Grund-Curriculum. Alle
# gegated auf `vandara-enrolled` (gesetzt von Olié's Schritt 3), also
# tauchen sie auf sobald der Spieler offiziell eingeschrieben ist.
#
# Convention: Drachenwandler tragen keine Nachnamen (nur Titel +
# Vorname). Gilt für alle Akademie-NPCs.

- id: npc-vandara-veyra
  nameKey: npc_vandara_veyra_name
  icon: ☀️
  image: img/addons/vandara/veyra.webp
  color: '#fbbf24'
  progKey: vandaraVeyra
  # 4 intro-Stufen + 2 reveal-Stufen (gated auf light-resonance-found).
  # Die 6. Stufe setzt vandara-shadow-revealed, was im nächsten Drop
  # Sariel in den Katakomben freischaltet.
  maxProgress: 6
  chapter: Vandara
  location: vandara
  # Element-Trial-Buttons erscheinen sobald die Intro-Klasse durch ist
  # (minProgress: 4 = nach Stufe 4 von Veyra's Hauptaktion).
  tradeActions:
    - { id: act-vandara-try-fire, minProgress: 4 }
    - { id: act-vandara-try-earth, minProgress: 4 }
    - { id: act-vandara-try-wind, minProgress: 4 }
    - { id: act-vandara-try-tide, minProgress: 4 }
    - { id: act-vandara-try-light, minProgress: 4 }

- id: npc-vandara-ormias
  nameKey: npc_vandara_ormias_name
  icon: 🐲
  image: img/addons/vandara/ormias.webp
  color: '#7c2d12'
  progKey: vandaraOrmias
  # 9 Stufen — Intro + sieben Hauptarten (Großdrachen, Wyvern,
  # Lindwürmer, Amphithere, Leviathane, Seraphe, Fae) + Lung als
  # Schlussbeat mit Dramatic Irony.
  maxProgress: 9
  chapter: Vandara
  location: vandara

- id: npc-vandara-quinell
  nameKey: npc_vandara_quinell_name
  icon: 💎
  image: img/addons/vandara/quinell.webp
  color: '#c084fc'
  progKey: vandaraQuinell
  # 7 Stufen — Intro, Definition, Drei-Komponenten-Gesetz,
  # Element-Bindung, Erhaltungsgesetz, Erschöpfungs-Gesetz,
  # Ausnahmen + Sariel-Erwähnung als Schluss.
  maxProgress: 7
  chapter: Vandara
  location: vandara
