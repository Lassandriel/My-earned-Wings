# Sariels Schatten-Schulung — 4 Stufen total.
#
# Step 1 ist die mysteriöse Erstbegegnung in den Katakomben (gegated
# auf Fafa-Step-4 via `katakomben-unlocked`). Sariel weiß bereits,
# dass der Spieler ein Schattenwandler ist, sagt aber nichts — kein
# Spoiler. Die Steps 2-4 (echte Schatten-Schulung) sind hinter
# `vandara-shadow-revealed` gegated und werden via extendNPCArc
# (von Veyras Reveal-Step) auf der NPC-Karte sichtbar gemacht.
#
# Die finale Stufe setzt `vandara-shadow-trained`, der Anker für
# die echte Schatten-Mechanik (Drop 3): Schatten als Helfer, die
# Aktionen ausführen solange eine Lichtquelle existiert.

- id: act-npc-vandara-sariel
  npcId: npc-vandara-sariel
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraSariel
  # 5 Steps total. Step 1 ist die Erstbegegnung (vor Schatten-
  # Reveal erreichbar). Steps 2-5 sind die echte Schatten-Schulung,
  # gegated auf `shadow-revealed` und durch Veyras Reveal-Step via
  # extendNPCArc by: 4 freigeschaltet.
  maxProgress: 5
  journalIcon: 🕯️
  icon: 🕯️
  journalColor: '#1e1b4b'
  steps:
    # ─── Step 1: Mysteriöse Erstbegegnung (pre-shadow-reveal) ───
    - cost: 10
      costType: energy
      requirements:
        flags.vandara-katakomben-unlocked: true
      dialogueKey: npc_vandara_sariel_1
    # ─── Steps 2-5: Schatten-Schulung (post-shadow-reveal) ──────
    # Werden via extendNPCArc von Veyras Step 6 freigeschaltet.
    # Der `shadow-revealed` Requirement ist Belt-and-braces.
    - cost: 10
      costType: magic
      requirements:
        flags.vandara-shadow-revealed: true
      dialogueKey: npc_vandara_sariel_2
    - cost: 15
      costType: magic
      requirements:
        flags.vandara-shadow-revealed: true
      dialogueKey: npc_vandara_sariel_3
    - cost: 15
      costType: magic
      requirements:
        flags.vandara-shadow-revealed: true
      onSuccess:
        - type: setFlag
          flag: vandara-shadow-trained
          value: true
        - type: log
          logKey: vandara_shadow_trained
          color: var(--gold)
      dialogueKey: npc_vandara_sariel_4
    # ─── Step 5: Schatten-Bindung als Finale ────────────────────
    # Schaltet die Auto-Wiederholungs-Mechanik frei (base game
    # `ability-shadow-bind` Flag — taught hier statt bei Aris im
    # Sanctum). Aus Lore-Sicht: dey zeigt dir, wie du einen
    # Schatten an eine Aufgabe bindest, damit er sie wiederholt
    # während du dich um anderes kümmerst. Magie-Verbrauch läuft
    # über tickShadow im Engine.
    - cost: 20
      costType: magic
      requirements:
        flags.vandara-shadow-trained: true
      onSuccess:
        - type: setFlag
          flag: ability-shadow-bind
          value: true
        - type: log
          logKey: vandara_shadow_bind_learned
          color: var(--gold)
      dialogueKey: npc_vandara_sariel_5
  customExecute: npc_execute
