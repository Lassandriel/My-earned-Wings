# Element-Übungen für Veyra's Klasse. Erscheinen als Trade-Buttons
# auf Veyra's NPC-Card sobald `vandara-veyra-intro-done` gesetzt ist.
#
# Jede Übung ist einmalig (maxProgress: 1). Vier Elemente reagieren
# nicht — Feuer / Erde / Wind / Gezeiten. Nur Licht zuckt schwach,
# was Veyra ein "wir testen genauer" entlockt und ihre Stufe 5
# (Schatten-Reveal) freischaltet. Der Spieler kann die fünf in
# beliebiger Reihenfolge probieren; das Licht-Test ist der Schlüssel.

- id: act-vandara-try-fire
  category: vandara_trial
  icon: "🔥"
  cost: 5
  costType: energy
  requirements:
    flags.vandara-veyra-intro-done: true
  progKey: vandaraTrialFire
  maxProgress: 1
  steps:
    - cost: 5
      costType: energy
      onSuccess:
        - type: setFlag
          flag: vandara-tested-fire
          value: true
        - type: log
          logKey: vandara_trial_fire
          color: var(--text-dim)
      dialogueKey: vandara_trial_fire_dialog
  customExecute: npc_execute

