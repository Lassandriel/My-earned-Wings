# ─── Marshal Daven — Council enforcement, arrest arc ─────────
- id: act-npc-vandara-daven
  npcId: npc-vandara-daven
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraDaven
  maxProgress: 3
  journalIcon: 🛡️
  icon: 🛡️
  journalColor: '#475569'
  steps:
    # 1 — Daven arrives, asks generally what's going on.
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-korren-arc-done: true
        flags.vandara-iska-arc-done: true
      onSuccess:
        - type: setFlag
          flag: vandara-daven-tip-1
          value: true
        - type: log
          logKey: vandara_daven_tip_1
          color: var(--text-dim)
      dialogueKey: npc_vandara_daven_1
    # 2 — player provides specifics about both experiments.
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-daven-tip-1: true
      onSuccess:
        - type: setFlag
          flag: vandara-daven-tip-2
          value: true
        - type: log
          logKey: vandara_daven_tip_2
          color: var(--text-dim)
      dialogueKey: npc_vandara_daven_2
    # 3 — player guides Daven to both workbenches. Arrest.
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-daven-tip-2: true
      onSuccess:
        - type: setFlag
          flag: vandara-catacomb-students-busted
          value: true
        - type: log
          logKey: vandara_catacomb_students_busted
          color: var(--gold)
      dialogueKey: npc_vandara_daven_3
  customExecute: npc_execute
