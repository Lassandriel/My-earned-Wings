# Gate guard interaction. One step, fires once. The vandara-invited
# flag (set by Aria's letter-step in patches/teacher.yaml) gates it
# so the guard ignores anyone without an invitation. The letter item
# stays in inventory as a memento — the base game has no removeItem
# effect, and narratively it's fine for the player to keep the
# letter; what matters mechanically is the `vandara-admitted` flag
# that the academy content downstream watches.

- id: act-npc-vandara-gate-guard
  npcId: npc-vandara-gate-guard
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraGateGuard
  # maxProgress 2 dokumentiert die volle Länge des Arcs. Engine
  # verwendet aber `npc.maxProgress` als das Gate (siehe gate.yaml in
  # npcs/) — Step 2 unreachable bis Veyras Reveal-Step die NPC.maxProgress
  # via `extendNPCArc` auf 2 bumpt.
  maxProgress: 2
  journalIcon: 🛡️
  icon: ✉️
  journalColor: '#a8a29e'
  steps:
    # ─── Step 1: Admission via Aria's Brief ─────────────────────
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-invited: true
      onSuccess:
        - type: setFlag
          flag: vandara-admitted
          value: true
        # Admission also opens up the rest of the city. Without these
        # unlocks the NPCs stay in the registry but are invisible
        # (requirements gate executability, not visibility — unlocked
        # status controls whether they appear in the village view's
        # NPC grid).
        - type: unlockNPC
          id: npc-vandara-olie
        - type: unlockNPC
          id: npc-vandara-kalre
        - type: unlockNPC
          id: npc-vandara-fafa
        - type: log
          logKey: vandara_admitted
          color: var(--gold)
      # The visible "Zugang zu Vandara" line in the Effekt section
      # comes from the action translation's `unlocks` field — see
      # i18n/<lang>/actions.yaml. setFlag itself doesn't render in
      # the tooltip; the unlocks string covers the player-facing copy.
      dialogueKey: npc_vandara_gate_guard_admit

    # ─── Step 2: Wieder-Begegnung nach Schatten-Reveal ──────────
    # Wird sichtbar erst nachdem Veyras Reveal-Step `extendNPCArc` auf
    # den Wächter-NPC ausgelöst hat (bumpt npc.maxProgress auf 2).
    # Der `vandara-shadow-revealed` Flag-Check ist zusätzlicher
    # Sicherheitsgurt — Engine-Bump UND Story-Flag sind beide nötig.
    - cost: 1
      costType: energy
      requirements:
        flags.vandara-shadow-revealed: true
      onSuccess:
        - type: setFlag
          flag: vandara-gate-guard-respected
          value: true
      dialogueKey: npc_vandara_gate_guard_respect
  customExecute: npc_execute
