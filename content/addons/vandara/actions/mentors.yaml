# Mentor-Aktionen für das Akademie-Grundstudium. Jede Klasse hat
# 4 Vorlesungs-Stufen — Intro + Theorie + Praxis + Abschluss. Die
# konkreten Lehrinhalte (Element-Übungen für Veyra, Drachen-Bestimmung
# für Ormias, Zauberformel-Lab für Quinell) kommen in eigenen
# Iterationen als zusätzliche Actions je Mentor.

# ─── Veyra — Element-Diagnostik (Sprechstunde, kein Lehrfach) ──
# Veyra ist keine Mentorin im klassischen Sinn — sie hat keine
# Klasse. Olié schickt den Spieler nur zu ihr, weil das Element
# unklar ist (Sprechstunde-Setting). Der Reveal-Arc läuft trotzdem
# über sie, weil sie die Diagnose macht und damit am Ende auch das
# Schatten-Element findet. Andere Studenten gehen nie zu ihr.
- id: act-npc-vandara-veyra
  npcId: npc-vandara-veyra
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraVeyra
  maxProgress: 6
  journalIcon: ☀️
  icon: ☀️
  journalColor: '#fbbf24'
  steps:
    - cost: 10
      costType: energy
      requirements:
        flags.vandara-enrolled: true
      dialogueKey: npc_vandara_veyra_1
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_veyra_2
    - cost: 15
      costType: magic
      dialogueKey: npc_vandara_veyra_3
    - cost: 15
      costType: magic
      onSuccess:
        - type: setFlag
          flag: vandara-veyra-intro-done
          value: true
        - type: log
          logKey: vandara_veyra_intro_done
          color: var(--gold)
      dialogueKey: npc_vandara_veyra_4
    # Stufe 5 — Spieler kehrt zurück nachdem die Lichtprobe gezuckt
    # hat. Veyra macht den tiefen Test und entdeckt: das war kein
    # Licht. Das war Schatten. Gegated auf alle drei Mentoren-Intros
    # — Veyra will erst Rücksprache mit Ormias + Quinell halten,
    # bevor sie den vertiefenden Test macht. Pamle bleibt optional.
    - cost: 20
      costType: magic
      requirements:
        flags.vandara-light-resonance-found: true
        flags.vandara-ormias-intro-done: true
        flags.vandara-quinell-intro-done: true
      dialogueKey: npc_vandara_veyra_5
    # Stufe 6 — Nachwirkung. Veyra erklärt was Schatten als Licht-
    # Sub bedeutet, gesteht ihre Grenzen ein, deutet auf jemanden
    # in den Katakomben (Sariel — die der Spieler vermutlich schon
    # kennt, mysteriös und Element-agnostisch). Gleichzeitig:
    # andere Vandara-NPCs (Wächter, Fafa, Sariel) "merken" diese
    # Veränderung am Spieler — Story-Bumps via extendNPCArc machen
    # ihre nächsten Steps sichtbar OHNE Pre-Reveal-Spoiler in den
    # Progress-Balken.
    - cost: 10
      costType: energy
      onSuccess:
        - type: setFlag
          flag: vandara-shadow-revealed
          value: true
        - type: log
          logKey: vandara_shadow_revealed
          color: var(--gold)
        # Wächter 1 → 2: Wieder-Begegnung (Respekt) wird klickbar.
        - type: extendNPCArc
          npcId: npc-vandara-gate-guard
        # Fafa 4 → 5: Bestätigungs-Beat (Step 5 Patch) wird klickbar.
        - type: extendNPCArc
          npcId: npc-vandara-fafa
        # Sariel 1 → 4: echte Schatten-Schulung (Steps 2-4). by: 3
        # weil Sariel total 4 Steps hat und vorher nur Step 1
        # (Element-agnostische Erstbegegnung) erreichbar war.
        - type: extendNPCArc
          npcId: npc-vandara-sariel
          by: 3
      dialogueKey: npc_vandara_veyra_6
  customExecute: npc_execute

# ─── Ormias — Drachenkunde ────────────────────────────────────
# Eine Lehrstunde pro Drachen-Hauptart, plus Intro vorne und
# Lung-Drachen ganz hinten. Reihenfolge geht pädagogisch von
# "alltäglich" (Großdrachen) zu "exotisch" (Fae). Lung als 9.
# Step ist der Dramatic-Irony-Knipser: Ormias erklärt warum der
# flügellose Spieler unmöglich ein Lung sein kann — Spieler weiß
# (oder ahnt) zu dem Zeitpunkt vielleicht schon mehr.
- id: act-npc-vandara-ormias
  npcId: npc-vandara-ormias
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraOrmias
  maxProgress: 9
  journalIcon: 🐲
  icon: 🐲
  journalColor: '#7c2d12'
  steps:
    # 1 — Intro + Übersicht der sieben Hauptarten + "alle haben Flügel"-Punchline.
    - cost: 10
      costType: energy
      requirements:
        flags.vandara-enrolled: true
      dialogueKey: npc_vandara_ormias_1
    # 2 — Großdrachen. Hier sagt er auch "du bist sicher Spätzünder-Großdrache".
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_2
    # 3 — Wyvern.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_3
    # 4 — Lindwürmer (meinesgleichen-Moment).
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_4
    # 5 — Amphithere.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_5
    # 6 — Leviathane.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_6
    # 7 — Seraph-Drachen.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_7
    # 8 — Fae-Drachen.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_8
    # 9 — Lung-Drachen. Setzt die intro-done-Flag, weil das jetzt
    # der Kurs-Abschluss ist (nicht mehr Step 4).
    - cost: 10
      costType: energy
      onSuccess:
        - type: setFlag
          flag: vandara-ormias-intro-done
          value: true
        - type: log
          logKey: vandara_ormias_intro_done
          color: var(--gold)
      dialogueKey: npc_vandara_ormias_9
  customExecute: npc_execute

