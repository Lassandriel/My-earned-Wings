# Mentor-Aktionen für das Akademie-Grundstudium. Jede Klasse hat
# 4 Vorlesungs-Stufen — Intro + Theorie + Praxis + Abschluss. Die
# konkreten Lehrinhalte (Element-Übungen für Veyra, Drachen-Bestimmung
# für Ormias, Zauberformel-Lab für Quinell) kommen in eigenen
# Iterationen als zusätzliche Actions je Mentor.

# ─── Veyra — Element-Diagnostik (Sprechstunde, kein Lehrfach) ──
# Veyra ist keine Mentorin im klassischen Sinn — sie hat keine
# Klasse. Olié schickt den Spieler nur zu ihr, weil das Element
# unklar ist (Sprechstunde-Setting). Der Reveal-Arc läuft trotzdem
# über sie, weil sie die Diagnose macht und damit am Ende auch das
# Schatten-Element findet. Andere Studenten gehen nie zu ihr.
- id: act-npc-vandara-veyra
  npcId: npc-vandara-veyra
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraVeyra
  maxProgress: 6
  journalIcon: ☀️
  icon: ☀️
  journalColor: '#fbbf24'
  steps:
    - cost: 10
      costType: energy
      requirements:
        flags.vandara-enrolled: true
      dialogueKey: npc_vandara_veyra_1
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_veyra_2
    - cost: 15
      costType: magic
      dialogueKey: npc_vandara_veyra_3
    - cost: 15
      costType: magic
      onSuccess:
        - type: setFlag
          flag: vandara-veyra-intro-done
          value: true
        - type: log
          logKey: vandara_veyra_intro_done
          color: var(--gold)
      dialogueKey: npc_vandara_veyra_4
    # Stufe 5 — Spieler kehrt zurück nachdem die Lichtprobe gezuckt
    # hat. Veyra macht den tiefen Test und entdeckt: das war kein
    # Licht. Das war Schatten. Gegated auf alle drei Mentoren-Intros
    # — Veyra will erst Rücksprache mit Ormias + Quinell halten,
    # bevor sie den vertiefenden Test macht. Pamle bleibt optional.
    - cost: 20
      costType: magic
      requirements:
        flags.vandara-light-resonance-found: true
        flags.vandara-ormias-intro-done: true
        flags.vandara-quinell-intro-done: true
      dialogueKey: npc_vandara_veyra_5
    # Stufe 6 — Nachwirkung. Veyra erklärt Schatten als Sub-
    # Variante des Lichts, gesteht ihre Grenzen ein. Sie kennt
    # Fafa NICHT (die ist Bettlerin, Veyra ist Akademie). Aber
    # sie kannte Sariel als Kollegin vor 40 Jahren — den Namen
    # gibt sie weiter. Das ist der Mechanik-Trigger für Sariels
    # Schatten-Schulung (Steps 2-4). Wächter Step 2 wird via
    # extendNPCArc ebenfalls klickbar — er erkennt den Spieler
    # bei der nächsten Begegnung anders. Fafa hat hier nichts
    # zu tun — ihr Stufe-4-Beat (Katakomben-Unlock) lief
    # bereits vor dem Reveal über Sariels Step-1-Freischaltung.
    - cost: 10
      costType: energy
      onSuccess:
        - type: setFlag
          flag: vandara-shadow-revealed
          value: true
        - type: log
          logKey: vandara_shadow_revealed
          color: var(--gold)
        # Wächter 1 → 2: Wieder-Begegnung (Respekt) wird klickbar.
        - type: extendNPCArc
          npcId: npc-vandara-gate-guard
        # Sariel 1 → 5: echte Schatten-Schulung (Steps 2-5,
        # inkl. Finale wo Shadow Bind freigeschaltet wird). by: 4
        # weil Sariel total 5 Steps hat und vorher nur Step 1
        # (Element-agnostische Erstbegegnung) erreichbar war.
        - type: extendNPCArc
          npcId: npc-vandara-sariel
          by: 4
        # Reveal-Reaktionen der anderen Mentoren + Olié + Pamle.
        # Je ein zusätzlicher Step pro NPC, in dem sie auf das
        # Schatten-Reveal reagieren. Reine Story-Beats, kein neuer
        # Mechanik-Unlock.
        - type: extendNPCArc
          npcId: npc-vandara-ormias
        - type: extendNPCArc
          npcId: npc-vandara-quinell
        - type: extendNPCArc
          npcId: npc-vandara-olie
        - type: extendNPCArc
          npcId: npc-vandara-pamle
      dialogueKey: npc_vandara_veyra_6
  customExecute: npc_execute

# ─── Ormias — Drachenkunde ────────────────────────────────────
# Eine Lehrstunde pro Drachen-Hauptart, plus Intro vorne und
# Lung-Drachen ganz hinten. Reihenfolge geht pädagogisch von
# "alltäglich" (Großdrachen) zu "exotisch" (Fae). Lung als 9.
# Step ist der Dramatic-Irony-Knipser: Ormias erklärt warum der
# flügellose Spieler unmöglich ein Lung sein kann — Spieler weiß
# (oder ahnt) zu dem Zeitpunkt vielleicht schon mehr.
- id: act-npc-vandara-ormias
  npcId: npc-vandara-ormias
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraOrmias
  # Base 9 (Intro + 7 Hauptarten + Lung-Schluss). Schritt 10 ist
  # ein Reveal-Reaktions-Beat, freigeschaltet via extendNPCArc von
  # Veyras Step 6 — Ormias gesteht ein, dass er den Spätzünder-
  # Großdrachen-Tipp halb daneben hatte.
  maxProgress: 10
  journalIcon: 🐲
  icon: 🐲
  journalColor: '#7c2d12'
  steps:
    # 1 — Intro + Übersicht der sieben Hauptarten + "alle haben Flügel"-Punchline.
    - cost: 10
      costType: energy
      requirements:
        flags.vandara-enrolled: true
      dialogueKey: npc_vandara_ormias_1
    # 2 — Großdrachen. Hier sagt er auch "du bist sicher Spätzünder-Großdrache".
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_2
    # 3 — Wyvern.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_3
    # 4 — Lindwürmer (meinesgleichen-Moment).
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_4
    # 5 — Amphithere.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_5
    # 6 — Leviathane.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_6
    # 7 — Seraph-Drachen.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_7
    # 8 — Fae-Drachen.
    - cost: 10
      costType: energy
      dialogueKey: npc_vandara_ormias_8
    # 9 — Lung-Drachen. Setzt die intro-done-Flag, weil das jetzt
    # der Kurs-Abschluss ist (nicht mehr Step 4).
    - cost: 10
      costType: energy
      onSuccess:
        - type: setFlag
          flag: vandara-ormias-intro-done
          value: true
        - type: log
          logKey: vandara_ormias_intro_done
          color: var(--gold)
      dialogueKey: npc_vandara_ormias_9
    # 10 — Reveal-Reaktion. Wird durch Veyra Step 6 extendNPCArc
    # erst klickbar. Ormias gibt zu, dass er den Spätzünder-
    # Großdrachen-Tipp halb daneben hatte, lädt zum Wiederkommen
    # ein. Reine Story, kein Mechanik-Unlock.
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-shadow-revealed: true
      onSuccess:
        - type: log
          logKey: vandara_ormias_reveal_reaction
          color: var(--text-dim)
      dialogueKey: npc_vandara_ormias_10
  customExecute: npc_execute

# ─── Quinell — Arkane Grundlagen ───────────────────────────────
# Eine Vorlesung pro Gesetz: Intro, Definition (was IST Magie),
# Drei-Komponenten (Element/Will/Substrate), Element-Bindung,
# Erhaltungsgesetz, Erschöpfungs-Gesetz, und als Schluss die
# "Ausnahmen existieren"-Stunde mit der Sariel-Erwähnung — Setup
# für Sariels eigene Lehrstunden später.
- id: act-npc-vandara-quinell
  npcId: npc-vandara-quinell
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraQuinell
  # Base 7 (Intro + Definition + vier Gesetze + Ausnahmen-Stunde
  # mit Sariel-Erwähnung). Schritt 8 ist ein Reveal-Reaktions-Beat,
  # freigeschaltet via extendNPCArc von Veyras Step 6 — leise
  # Vindikation für Sariel.
  maxProgress: 8
  journalIcon: 💎
  icon: 💎
  journalColor: '#c084fc'
  steps:
    # 1 — Intro: "langweiligste, wichtigste Vorlesung".
    - cost: 10
      costType: energy
      requirements:
        flags.vandara-enrolled: true
      dialogueKey: npc_vandara_quinell_1
    # 2 — Definition: Was IST Magie überhaupt?
    - cost: 10
      costType: magic
      dialogueKey: npc_vandara_quinell_2
    # 3 — Drei-Komponenten-Gesetz: Element, Will, Substrate.
    - cost: 10
      costType: magic
      dialogueKey: npc_vandara_quinell_3
    # 4 — Element-Bindung: warum man nicht switchen kann.
    - cost: 10
      costType: magic
      dialogueKey: npc_vandara_quinell_4
    # 5 — Erhaltungsgesetz: Magie kostet DICH.
    - cost: 10
      costType: magic
      dialogueKey: npc_vandara_quinell_5
    # 6 — Erschöpfungs-Gesetz: Müdigkeit als Messgerät der Wirkung.
    - cost: 10
      costType: magic
      dialogueKey: npc_vandara_quinell_6
    # 7 — Ausnahmen + Sariel-Erwähnung. Schließt den Kurs ab.
    - cost: 10
      costType: magic
      onSuccess:
        - type: setFlag
          flag: vandara-quinell-intro-done
          value: true
        - type: log
          logKey: vandara_quinell_intro_done
          color: var(--gold)
      dialogueKey: npc_vandara_quinell_7
    # 8 — Reveal-Reaktion. Wird durch Veyra Step 6 extendNPCArc
    # klickbar. Leise Vindikation für Sariel: "dey hatte Recht."
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-shadow-revealed: true
      onSuccess:
        - type: log
          logKey: vandara_quinell_reveal_reaction
          color: var(--text-dim)
      dialogueKey: npc_vandara_quinell_8
  customExecute: npc_execute
