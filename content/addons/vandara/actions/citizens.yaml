- id: act-vandara-buy-glitter-dust
  category: village
  icon: "✨"
  cost: 10
  costType: shards
  yieldType: glitter_dust
  rewards:
    glitter_dust: 1
  sfx: click
  particleType: shards

# ─── Kal're's "rare goods" tier ────────────────────────────────
# Unlocked at minProgress 5 — pays off her step 5 promise ("come to
# me before you ask anyone else"). These are reagents the player
# would normally gather in the village (or via base-game grinds);
# Kal're sells them at a marked-up shard price as a shortcut. Tier-3
# reagents (arcane_dust) are priciest, tier-2 (resin) middle,
# tier-2-easier (glowpollen) cheapest of the three.
- id: act-vandara-buy-glowpollen
  category: village
  icon: "🌼"
  cost: 15
  costType: shards
  yieldType: glowpollen
  rewards:
    glowpollen: 1
  sfx: click
  particleType: shards

- id: act-vandara-buy-resin
  category: village
  icon: "🟤"
  cost: 20
  costType: shards
  yieldType: resin
  rewards:
    resin: 1
  sfx: click
  particleType: shards

- id: act-vandara-buy-arcane-dust
  category: village
  icon: "🔮"
  cost: 25
  costType: shards
  yieldType: arcane_dust
  rewards:
    arcane_dust: 1
  sfx: click
  particleType: shards

# ─── Fafa — beggar ────────────────────────────────────────────
# Four-step interaction. First three cost a token donation; she
# repays each in city lore. Step 4 is free and opens the
# catacombs path (placeholder flag — catacomb content lands later).
- id: act-npc-vandara-fafa
  npcId: npc-vandara-fafa
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraFafa
  maxProgress: 4
  journalIcon: 🪨
  icon: 🪙
  journalColor: '#a8a29e'
  steps:
    - cost: 10
      costType: shards
      requirements:
        flags.vandara-admitted: true
      dialogueKey: npc_vandara_fafa_1
    - cost: 10
      costType: shards
      dialogueKey: npc_vandara_fafa_2
    - cost: 10
      costType: shards
      dialogueKey: npc_vandara_fafa_3
    # Step 4 — Fafa drops the act, points the player at the catacombs.
    # Schaltet die drei Katakomben-Bewohner als NPCs frei: Sariel
    # in der hinteren Kammer (Element-agnostische Erstbegegnung),
    # plus die beiden Studenten Korren und Iska, die in den
    # Seitenkammern an halb-legalen Experimenten arbeiten.
    - cost: 5
      costType: energy
      onSuccess:
        - type: setFlag
          flag: vandara-katakomben-unlocked
          value: true
        - type: unlockNPC
          id: npc-vandara-sariel
        - type: unlockNPC
          id: npc-vandara-korren
        - type: unlockNPC
          id: npc-vandara-iska
        - type: log
          logKey: vandara_katakomben_unlocked
          color: var(--gold)
      dialogueKey: npc_vandara_fafa_4
  customExecute: npc_execute
