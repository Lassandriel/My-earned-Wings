# Vandara citizens — Olié the secretary, Kal're the street trader,
# Fafa the beggar. Each has a multi-step story action; Kal're also
# carries the trade-actions her tradeActions[] field references.
#
# Splitter / shards is the city's coin (already defined in base
# resources as `shards`). Players earn shards in the village by
# selling wood to the baker / stone to the artisan — see
# content/base/actions/village.yaml.

# ─── Olié — Sekretariat / enrollment ───────────────────────────
- id: act-npc-vandara-olie
  npcId: npc-vandara-olie
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraOlie
  # Base 3 (Greeting, Gebühr, Ausweis-Ausstellung). Schritt 4 ist
  # ein Reveal-Reaktions-Beat (bürokratische Akten-Aktualisierung),
  # via Veyras Step 6 extendNPCArc freigeschaltet.
  maxProgress: 4
  journalIcon: 📋
  icon: 📋
  journalColor: '#0ea5e9'
  steps:
    # 1. Greeting — free intro.
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-admitted: true
      dialogueKey: npc_vandara_olie_1
    # 2. Pay enrollment fee — costs shards.
    - cost: 25
      costType: shards
      dialogueKey: npc_vandara_olie_2
    # 3. Explanation + hand over student ID + unlock the three
    # academy mentors so the player can actually start classes.
    - cost: 5
      costType: energy
      onSuccess:
        - type: unlockItem
          id: item-vandara-student-id
        - type: setFlag
          flag: vandara-enrolled
          value: true
        - type: unlockNPC
          id: npc-vandara-veyra
        - type: unlockNPC
          id: npc-vandara-ormias
        - type: unlockNPC
          id: npc-vandara-quinell
        - type: unlockNPC
          id: npc-vandara-pamle
        - type: log
          logKey: vandara_enrolled
          color: var(--gold)
      dialogueKey: npc_vandara_olie_3
    # 4 — Reveal-Reaktion: Olié aktualisiert die Akte des Spielers.
    # Bürokratisch-knapp, Element-Feld wird nachträglich ausgefüllt.
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-shadow-revealed: true
      onSuccess:
        - type: log
          logKey: vandara_olie_reveal_reaction
          color: var(--text-dim)
      dialogueKey: npc_vandara_olie_4
  customExecute: npc_execute

# ─── Kal're — street trader ────────────────────────────────────
# Standard "5 trust steps, free intro, trade actions unlock as
# progress builds" pattern (mirrors the village baker / blacksmith).
- id: act-npc-vandara-kalre
  npcId: npc-vandara-kalre
  category: npc
  isStory: true
  chapter: chapter_vandara
  progKey: vandaraKalre
  maxProgress: 5
  journalIcon: 🌬️
  icon: 🌬️
  journalColor: '#a5b4fc'
  steps:
    - cost: 5
      costType: energy
      requirements:
        flags.vandara-admitted: true
      dialogueKey: npc_vandara_kalre_1
    - cost: 5
      costType: energy
      dialogueKey: npc_vandara_kalre_2
    # Step 3 — teaches the player how academy students set up an
    # alchemy laboratory at home. Mirrors the village blacksmith /
    # sage pattern: dialogue step fires `unlockRecipe`, the player
    # then crafts in the Workshop tab next to Kitchen / Sanctum.
    - cost: 5
      costType: energy
      onSuccess:
        - type: unlockRecipe
          id: build-vandara-alchemy-laboratory
      dialogueKey: npc_vandara_kalre_3
    - cost: 5
      costType: energy
      dialogueKey: npc_vandara_kalre_4
    - cost: 5
      costType: energy
      dialogueKey: npc_vandara_kalre_5
  customExecute: npc_execute

# Kal're's wares.
- id: act-vandara-buy-ash-flower
  category: village
  icon: "🌸"
  cost: 5
  costType: shards
  yieldType: ash_flower
  rewards:
    ash_flower: 1
  sfx: click
