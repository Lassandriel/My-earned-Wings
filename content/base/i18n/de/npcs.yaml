# Auto-cleaned 2026-05-14 after Vandara rollback.
npc_baker_1: >-
  "Willkommen! Ich bin Gara. Ich bin der Bäcker hier im Ort. Und wie heißt du,
  Fremder?"
npc_baker_2: >-
  "Der Ofen brennt heiß. Danke für das Holz, {player}. Wenn du mehr hast lass
  sie bei mir. Ich gebe dir dafür Geld!"
npc_baker_3: "\"Ein Keks gefällig, {player}? Sie halten dich auf Trab.\""
npc_baker_4: "\"Immer mehr Leute kommen wegen meines Gebäcks. Du bist ein Segen, {player}.\""
npc_baker_5: "\"{player}, nimm diesen letzten Vorrat. Du hast viel für uns getan.\""
npc_flowerGirl_1: "\"Hallo... uhm, ich bin Mina. Ich, äh... {player}? Das ist ein schöner Name.\""
npc_flowerGirl_2: "\"Schönheit gedeiht auch im Schatten, {player}... spüre den Rhythmus.\""
npc_flowerGirl_3: "\"Die Farben der Welt verändern sich, {player}, wenn man genau hinsieht.\""
npc_flowerGirl_4: "\"Diese Schuppe... nimm sie, {player}. Sie gehört zum Äther.\""
npc_flowerGirl_5: "\"Thorin braucht jemanden wie dich, {player}. Sag ihm, ich schicke dich.\""
npc_flowerGirl_6: >-
  "Wunderbar, {player}! Diese Kräuter werden dem Dorf im Winter helfen. Hier ist
  der Bauplan für das Haus am See, den ich versprochen habe."
npc_flowerGirl_7: >-
  "Du hast mir so viel geholfen... Ich kenne einen Ort, tief im Wald, den nur
  wenige sehen können. Es ist der Flüsterhain. Hier, nimm diesen Pfad. Aber sei
  vorsichtig mit den Geistern dort."
npc_artisan_1: "\"Ich bin Geron. Holz ist der Anfang von alles. Ein Wanderstock gibt dir Halt.\""
npc_artisan_2: "\"Stein ist geduldig, {player}. Er formt die Welt, Schritt für Schritt.\""
npc_artisan_3: "\"Präzision ist alles. Nimm diesen Meißel, {player}, und forme dein Schicksal.\""
npc_teacher_1: >-
  "Hallo dort! Du musst {player} sein, nicht wahr? Ich bin Aria, die Lehrerin
  hier im Dorf."
npc_teacher_2_no_house: >-
  "Es ist schön dich zu sehen, {player}. Aber ohne ein festes Dach über dem Kopf
  wird das mit dem Lernen schwierig. Komm doch wieder, wenn du ein eigenes Haus
  hast."
npc_teacher_2_with_house: >-
  "Ah, ich sehe du hast dich bereits häuslich eingerichtet! Sehr gut. Wie wäre
  es, wenn du deinen Schulabschluss nachholst? Es gibt viel über Draconia zu
  lernen."
npc_teacher_3: >-
  "Wunderbar! Hier sind zwei grundlegende Werke über unsere Welt. Das eine
  handelt von der kaiserlichen Blutlinie, das andere von der Geographie unserer
  schwebenden Inseln. Lies sie dir unter "Deine Reise" aufmerksam durch. Wir
  sprechen uns danach wieder!"
npc_teacher_4_not_read: >-
  "Hast du die Bücher schon gelesen, die ich dir gegeben habe? Studiere sie
  bitte erst gründlich."
npc_teacher_6: >-
  "Herzlichen Glückwunsch, {player}. Du hast die Bücher studiert und damit
  deinen Abschluss verdient!"
npc_aris_6: >-
  "Der Äther ist hier besonders dicht. Ein Turm würde als Kanal für deine
  Seelenform dienen. Dieser Entwurf wird deinen Bau leiten."
npc_townHall_1: >-
  "Willkommen im Rathaus. Ich bin der Verwalter. Alle Ankömmlinge müssen
  registriert werden, wenn sie hier sesshaft werden wollen."
npc_townHall_2: "\"Deine Papiere sind nun in Ordnung, {player}. Du darfst nun im Dorf arbeiten.\""
npc_townHall_3: "\"Steuern und Abgaben... nur so kann unser Dorf wachsen, {player}.\""
npc_townHall_4: >-
  "Du bist hier jetzt bekannt, {player}. Ein wertvolles Mitglied unserer
  Gemeinschaft. Wenn du noch ein wenig mehr gibst, kann ich dir, den Platz wo du
  wohnst, verkaufen."
npc_townHall_5: >-
  "Diese Urkunde besiegelt deinen Platz in Draconia, {player}. Du darfst nun ein
  Haus bauen. Wenn du Hilfe brauchst, bin ich mir sicher das die anderen
  Dorfbewohner dir gerne helfen."
npc_blacksmith_1: "\"Wer stört in der Schmiede? Ah... ich bin Thorin. und du?\""
npc_blacksmith_2: "\"Magie im Feuer, {player}. Du verstehst das Handwerk.\""
npc_blacksmith_3: "\"Ein Felsen ist nur ein Hindernis, {player}, bis man ihn bricht.\""
npc_blacksmith_4: "\"Ein guter Wetzstein ist Gold wert, {player}. Er hält deine Ziele scharf.\""
npc_blacksmith_5: "\"{player}, kein Flug, aber ein fester Stand. Das ist deine wahre Stärke.\""
npc_hunter_1: "\"Halt! Wer schleicht da? ... Ach, ein neues Gesicht. Ich bin Nyx.\""
npc_hunter_2: "\"Ein Bogen braucht Geduld, {player}. Und gutes Eschenholz.\""
npc_hunter_3: "\"Hier, {player}, nimm diesen Bogen. Er wird deine Stimme im Dickicht sein.\""
npc_hunter_4: "\"Der Wald gibt uns, was wir brauchen, {player}. Wenn wir ihn respektieren.\""
npc_hunter_5: "\"Die Schatten gehören uns beiden nun. Ich jage an deiner Seite, {player}.\""
npc_sage_1: "\"Wissen ist eine Bürde. Ich bin der Seher. Lies dieses book, Wandler.\""
npc_sage_2: "\"Die Sterne flüstern von vergangenen Zeitaltern, {player}.\""
npc_sage_3: "\"Dein Geist dehnt sich aus, {player}... siehst du die Muster?\""
npc_sage_4: "\"Die Geschichte wiederholt sich nicht, {player}, aber es reimt sich.\""
npc_sage_5: "\"{player}, du bist kein Rätsel mehr, sondern ein Teil von Draconia.\""
npc_ellie_1: "\"Spürst du das Zittern der Erde?\""
npc_ellie_2: "\"Die Träume weisen uns den Weg.\""
npc_ellie_3: "\"Das Licht des Aethers wird immer heller.\""
npc_ellie_4: "\"Geduld, kleiner Drache. Dein Weg ist fast bereit.\""
npc_ellie_5: "\"Das Herz des Bodens schlägt für dich, {player}.\""
npc_aris_1: "\"Jeder Zauber beginnt mit einem einzelnen Gedanken.\""
npc_aris_2: "\"Spüre, wie die Energie in deine Fingerspitzen fließt.\""
npc_aris_3: "\"Magie ist nicht nur Macht, sie ist Verantwortung.\""
npc_aris_4: "\"Deine Verbindung zum Aether wird stärker.\""
npc_aris_5: "\"Du hast das Herz von Draconia berührt.\""
npc_treeOfLife_1: "\"Ich bin der Puls dieser Welt. Deine Reise hat gerade erst begonnen, Kleiner.\""
lore_1_step_1: >-
  <i>Die kaiserliche Familie herrscht vom Sonnenpalast aus, der im Herzen der
  Caldera thront, einem gewaltigen, üppig bewachsenen Vulkankrater.</i>
lore_1_step_2: >-
  <i>Kaiser Ignis Aurum führt Draconia mit eiserner Disziplin. Seine Magie ist
  so heiß wie die Sonne selbst.</i>
lore_1_step_3: >-
  <i>Kaiserin Amaterasu stammt aus dem Kristallreich im Westen. Ihre sanfte
  Lichtmagie wärmt das Gemüt des gesamten Volkes.</i>
lore_1_step_4: >-
  <i>Kronprinzessin Lunara ist die Erstgeborene. Sie befehligt nicht nur die
  Gezeiten, sondern wandelt auch sicher durch die Welt der Träume.</i>
lore_1_step_5: >-
  <i>Prinz Valerius, der General des Reiches, nutzt seine Erdmagie, um selbst
  härtestes Gestein wie weiches Wachs zu formen.</i>
lore_1_step_6: >-
  <i>Zephyrion, der Winddrache, ist für seine Schnelligkeit berühmt – doch nur
  wenige wissen von seiner Leidenschaft für die Alchemie.</i>
lore_1_step_7: >-
  <i>Der junge Ryuga ist der Jüngste der Familie. Noch ein kleiner Funke, doch
  sein Potenzial wird eines Tages die Welt erschüttern.</i>
lore_1_step_8: >-
  <i>Drachenwandler besitzen zwei Formen. Es gilt als unhöflich, die Schwingen
  in der humanoiden Form ohne Grund offen zu tragen.</i>
lore_1_step_9: >-
  <i>Die Dual-Monarchie stellt sicher, dass Frieden zwischen den verschiedenen
  Spezies herrscht, da Draconia zu groß für einen einzelnen Herrscher ist.</i>
lore_1_step_10: >-
  <i>Unter der Herrschaft der Kaiser stehen die Vasallen-Könige, welche die
  entlegeneren Inselgruppen verwalten und die Treue zum Sonnenpalast
  schwören.</i>
lore_2_step_1: >-
  <i>Draconia besteht aus zahllosen Inseln, die über einem endlosen Meer aus
  kochender Lava schweben.</i>
lore_2_step_2: >-
  <i>Luxana, die prachtvolle Hauptstadt, liegt direkt neben der majestätischen
  Caldera des Sonnenpalastes und bildet das pulsierende Herz des Reiches.</i>
lore_2_step_3: >-
  <i>Im fernen Westen liegt das Kristallreich, eine Welt aus leuchtenden
  Edelsteinen, die jegliche Magie reflektieren.</i>
lore_2_step_4: >-
  <i>Luxana, die Stadt des Lichts, glüht selbst bei Nacht in warmen Goldtönen.
  In ihren Straßen treffen sich Drachen aus allen Reichen — Händler, Künstler
  und Reisende.</i>
lore_2_step_5: >-
  <i>Der Smaragd-Wald ist ein gigantischer Dschungel, dessen Flora schneller
  wächst als man zusehen kann.</i>
lore_2_step_6: >-
  <i>Der Flüsterhain ist ein mystischer Ort, an dem die Geister der Ahnen in den
  Bäumen wohnen.</i>
lore_2_step_7: >-
  <i>Vandara ist die Stadt der Gelehrten. In der berühmten Roségold-Akademie
  studieren Drachen aus dem ganzen Reich die Geheimnisse des Äthers.</i>
lore_2_step_8: >-
  <i>Es regnet fast täglich in Draconia, was die schwebenden Inseln extrem
  fruchtbar und grün macht.</i>
lore_2_step_9: >-
  <i>Legenden besagen, dass der Planet einst eine ganze Kugel war, bis ein
  unbekanntes Ereignis ihn in tausend Stücke zerschmetterte.</i>
lore_2_step_10: >-
  <i>Der Pakt von Luxana wird alle hundert Jahre erneuert, um den Bund zwischen
  den Drachenspezies zu festigen.</i>
