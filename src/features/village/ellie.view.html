<!-- ELLIE TUTORIAL MODAL -->
<div 
  class="ellie-intro-modal" 
  x-show="$store.game.showEllieIntro" 
  x-transition:enter="modal-overlay-enter"
  x-transition:leave="modal-overlay-leave"
  style="display: none;"
>
  <div class="ellie-intro-inner" @click.stop>
    <div 
      class="ellie-image-shell"
      x-transition:enter="modal-card-enter"
    >
      <img src="img/npcs/Ellie.webp" class="ellie-image" alt="Ellie">
    </div>

    <div 
      class="ellie-text-card"
      x-transition:enter="modal-card-enter"
    >
      <h4 x-text="$store.game.t('npc_ellie_name')"></h4>
      <p x-text="$store.game.t('ellie_tutorial_1', 'logs')"></p>
      <p x-text="$store.game.t('ellie_tutorial_2', 'logs')"></p>
      <p x-text="$store.game.t('ellie_tutorial_3', 'logs')"></p>
      
      <button 
        class="btn-small" 
        @click="$store.game.ellie.close($store.game)" 
        x-text="$store.game.t('ui_btn_thanks')"
      ></button>
    </div>
  </div>
</div>
