<!-- VILLAGE VIEW - REFACTORED 3.1 -->
<div 
  x-show="$store.ui.view === 'village'" 
  class="game-view-content" 
  x-data="{ 
    locTab: 'village',
    get schoolActions() {
      return Object.keys($store.game.content.registries.actions)
        .filter(id => $store.game.content.get(id, 'actions').category === 'school');
    },
    get vandaraActions() {
      const path = $store.game.academy_path;
      if (!path) return [];
      return Object.keys($store.game.content.registries.actions)
        .filter(id => {
          const act = $store.game.content.get(id, 'actions');
          return id.startsWith('act-vandara-') && act.requirements?.academy_path === path;
        });
    },
    getPathMentorId() {
      const path = $store.game.academy_path;
      if (path === 'solen') return 'npc-magistra_solen';
      if (path === 'bram') return 'npc-meister_bram';
      return 'npc-lyra';
    },
    selectPath(npcId) {
      const path = npcId.split('-').pop().split('_').pop();
      $store.ui.viewManager.showConfirm($store.game, $store.game.t('ui_vandara_path_confirm'), () => { 
        $store.game.academy_path = path; 
        $store.game.actions.effectHandlers.unlockNPC($store.game, { type: 'unlockNPC', id: npcId });
        $store.game.saveGame(); 
      });
    }
  }"
>
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_locations')"></h3>
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_village'), desc: $store.game.t('nav_village_desc') })"
      @mouseleave="$store.game.setHovered(null)"
    >
      ?
    </div>
  </div>

  <!-- Location Tabs -->
  <nav class="nav-tabs-wrapper m-lg" x-show="$store.game.flags.vandara_unlocked">
    <div class="nav-tabs">
      <button class="nav-tab-btn" :class="locTab === 'village' && 'active'" @click="locTab = 'village'" x-text="$store.game.t('nav_village')"></button>
      <button class="nav-tab-btn" :class="locTab === 'vandara' && 'active'" @click="locTab = 'vandara'" x-text="$store.game.t('nav_vandara')"></button>
    </div>
  </nav>

  <!-- VILLAGE SUB-VIEW -->
  <div x-show="locTab === 'village'" x-transition>
    <div class="game-grid">
      <!-- NPC CARDS -->
      <template x-for="npcId in $store.game.unlockedNPCs.filter(id => !$store.game.content.get(id, 'npcs')?.isVandara)" :key="npcId">
        <div
          :id="npcId + '-card'"
          class="game-card npc-card"
          @click="$store.game.executeAction('act-' + npcId)"
          @mouseenter="$store.game.setHovered('act-' + npcId)"
          @mouseleave="$store.game.setHovered(null)"
          x-data="{ npc: $store.game.ui.getNPCData($store.game, npcId) }"
        >
          <div class="game-card-visual">
            <div class="npc-portrait-wrapper">
              <div
                class="npc-img-blur-bg"
                x-show="npc?.image"
                :style="'background-image: url(' + npc?.image + ')'"
              ></div>
              <img x-show="npc?.image" :src="npc?.image" class="npc-img" :alt="$store.game.t(npc?.nameKey)" />
              <div x-show="!npc?.image" class="npc-placeholder" x-text="npc?.icon"></div>
            </div>
            <template x-if="$store.game.ui.isNPCMaxed($store.game, npcId)">
              <div class="status-check" title="Maxed">✓</div>
            </template>
          </div>

          <div class="game-card-footer">
            <h4 class="game-card-title" x-text="$store.game.t(npc?.nameKey)"></h4>
            <div class="npc-progress-mini-track">
              <div
                class="npc-progress-fill"
                :class="$store.game.ui.isNPCMaxed($store.game, npcId) && 'is-maxed'"
                :style="'width: ' + $store.game.ui.getNPCProgressPercent($store.game, npcId) + '%'"
              ></div>
            </div>
          </div>

          <!-- Trade Actions Overlay -->
          <div
            class="npc-trade-actions"
            x-show="$store.game.content.getNPCActions($store.game, npcId).length > 0"
          >
            <template x-for="action in $store.game.content.getNPCActions($store.game, npcId)" :key="action.id">
              <button
                class="npc-trade-btn"
                @click.stop="$store.game.attemptAction($el, action.id)"
                @mouseenter="$store.game.setHovered(action.id)"
                @mouseleave="$store.game.setHovered(null)"
                :title="$store.game.t(action.id, 'actions').title"
              >
                <span x-text="action.icon || '💰'"></span>
              </button>
            </template>
          </div>
        </div>
      </template>
    </div>

    <!-- SCHOOL SECTION -->
    <section class="school-container" x-show="$store.game.flags.school_unlocked" x-transition>
      <div class="school-header-flex">
        <div class="school-title-group">
          <span class="school-icon-main">🏛️</span>
          <h3 class="school-title" x-text="$store.game.t('cat_school')"></h3>
        </div>
        
        <div class="teacher-spotlight" @mouseenter="$store.game.setHovered('npc-teacher')" @mouseleave="$store.game.setHovered(null)">
          <img src="img/npcs/teacher_aria.webp" class="teacher-mini-img" alt="Teacher Aria">
          <div class="teacher-info">
            <span x-text="$store.game.t('ui_teacher_label') || 'Lehrkraft'"></span>
            <strong x-text="$store.game.t('npc_teacher_name')"></strong>
          </div>
        </div>
      </div>

      <div class="game-grid">
        <template x-for="actionId in schoolActions" :key="actionId">
          <div
            class="game-card school-action-card"
            :class="{ 
              'active-focus': $store.game.activeFocus === actionId,
              ['card-' + actionId.split('-').pop()]: true
            }"
            @click="$store.game.attemptAction($el, actionId)"
            @mouseenter="$store.game.setHovered(actionId)"
            @mouseleave="$store.game.setHovered(null)"
            x-show="$store.game.actions.checkRequirement($store.game, 'actions.' + actionId, $store.game.content.get(actionId, 'actions').requirements)"
          >
            <div class="game-card-visual">
              <span class="school-card-visual" x-text="$store.game.content.get(actionId, 'actions').image || '📚'"></span>
            </div>
            
            <div class="game-card-footer school-card-footer">
              <h4 class="game-card-title" x-text="$store.game.ui.renderActionTitle($store.game, actionId)"></h4>
              
              <div class="school-card-costs">
                <template x-for="cost in $store.game.getTooltipCosts($store.game.content.get(actionId, 'actions'))" :key="cost.res">
                  <span class="cost-badge" :class="cost.has ? 'has-cost' : 'missing-cost'">
                    <span x-text="cost.amount + ' ' + cost.name"></span>
                  </span>
                </template>
              </div>
            </div>

            <div class="school-active-bar" x-show="$store.game.activeFocus === actionId"></div>
          </div>
        </template>
      </div>
    </section>
  </div>

  <!-- VANDARA SUB-VIEW -->
  <div x-show="locTab === 'vandara'" x-transition>
    
    <!-- Path Selection -->
    <div x-show="!$store.game.academy_path">
      <header class="vandara-intro">
        <h4 class="vandara-title" x-text="$store.game.t('cat_vandara')"></h4>
        <p class="vandara-hint" x-text="$store.game.t('ui_vandara_path_hint')"></p>
      </header>
      
      <div class="game-grid">
        <template x-for="npcId in ['npc-magistra_solen', 'npc-meister_bram', 'npc-lyra']" :key="npcId">
          <div
            class="game-card npc-card path-card"
            @click="selectPath(npcId)"
            @mouseenter="$store.game.setHovered(npcId, { isNPC: true })"
            @mouseleave="$store.game.setHovered(null)"
            x-data="{ npc: $store.game.content.get(npcId, 'npcs') }"
          >
            <div class="game-card-visual">
              <div class="npc-portrait-wrapper">
                <div
                  class="npc-img-blur-bg"
                  x-show="npc?.image"
                  :style="'background-image: url(' + npc?.image + ')'"
                ></div>
                <img x-show="npc?.image" :src="npc?.image" class="npc-img" :alt="$store.game.t(npc?.nameKey)" />
                <div x-show="!npc?.image" class="npc-placeholder" x-text="npc?.icon"></div>
              </div>
            </div>
            <div class="game-card-footer">
              <h4 class="game-card-title" x-text="$store.game.t(npc?.nameKey)"></h4>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Academy Content -->
    <div x-show="$store.game.academy_path">
      <div class="school-header-flex" style="margin-top: 0; margin-bottom: 30px;">
        <div class="school-title-group">
          <span class="school-icon-main">✨</span>
          <h4 class="school-title" x-text="$store.game.t('cat_vandara')"></h4>
        </div>
        
        <!-- Mentor Spotlight -->
        <div 
          class="teacher-spotlight mentor-spotlight" 
          x-data="{ get mentor() { return $store.game.content.get(getPathMentorId(), 'npcs'); } }"
          @mouseenter="$store.game.setHovered(getPathMentorId(), { isNPC: true })" 
          @mouseleave="$store.game.setHovered(null)"
        >
          <div class="npc-portrait-wrapper mentor-mini-portrait">
            <img x-show="mentor.image" :src="mentor.image" class="teacher-mini-img" :alt="mentor.nameKey">
            <div x-show="!mentor.image" class="npc-placeholder mentor-placeholder" x-text="mentor.icon"></div>
          </div>
          <div class="teacher-info">
            <span x-text="$store.game.t('ui_mentor_label')"></span>
            <strong x-text="$store.game.t(mentor.nameKey)"></strong>
          </div>
        </div>
      </div>

      <div class="game-grid">
        <template x-for="actionId in vandaraActions" :key="actionId">
          <div
            class="game-card action-card"
            @click="$store.game.attemptAction($el, actionId)"
            @mouseenter="$store.game.setHovered(actionId)"
            @mouseleave="$store.game.setHovered(null)"
            x-show="$store.game.actions.checkRequirement($store.game, 'actions.' + actionId, $store.game.content.get(actionId, 'actions').requirements)"
          >
            <div class="game-card-visual">
              <div class="action-icon-bg"></div>
              <span class="action-icon" x-text="$store.game.content.get(actionId, 'actions').image || '✨'"></span>
            </div>
            <div class="game-card-footer action-card-footer">
              <h4 class="game-card-title" x-text="$store.game.ui.renderActionTitle($store.game, actionId)"></h4>
              <div class="action-costs">
                <template x-for="cost in $store.game.getTooltipCosts($store.game.content.get(actionId, 'actions'))" :key="cost.res">
                  <span class="cost-badge" :class="cost.has ? 'has-cost' : 'missing-cost'">
                    <span x-text="cost.amount + ' ' + cost.name"></span>
                  </span>
                </template>
              </div>
            </div>
            <div class="action-active-ring" x-show="$store.game.activeFocus === actionId"></div>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
