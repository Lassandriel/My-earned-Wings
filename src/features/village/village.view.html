<!-- VILLAGE VIEW -->
<!--
  "Orte" tab — shows NPCs grouped by physical location with a sub-tab
  strip across the top. Locations come from each NPC's `location` field
  (defaults to 'village' when missing). Addons add new values by
  shipping NPCs with `location: <id>` plus a translation
  `location_<id>_name`. Sub-tab bar hides itself automatically when
  only one location is active so the demo flow stays unchanged for
  players who never install an addon.
-->
<div
  x-show="$store.game.view === 'village'"
  class="game-view-content"
  x-data="{
    /** location-id for an NPC, defaulting to 'village' when unset. */
    locOf(npcId) {
      const npc = $store.game.content.get(npcId, 'npcs');
      return (npc && npc.location) || 'village';
    },
    /** distinct active locations across unlocked NPCs, village first. */
    get activeLocations() {
      const seen = new Set();
      for (const id of $store.game.unlockedNPCs) seen.add(this.locOf(id));
      const out = Array.from(seen);
      out.sort((a, b) => (a === 'village' ? -1 : b === 'village' ? 1 : a.localeCompare(b)));
      return out;
    },
    /** show sub-tab strip only when there are at least two locations. */
    get showLocationTabs() { return this.activeLocations.length > 1; },
    /** make sure currentLocation always points at a location the player can see. */
    syncCurrentLocation() {
      const locs = this.activeLocations;
      if (locs.length === 0) return;
      if (!locs.includes($store.game.currentLocation)) {
        $store.game.currentLocation = locs[0];
      }
    },
  }"
  x-effect="syncCurrentLocation()"
>
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_locations')"></h3>
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.helpHover('cat_village', 'nav_village_desc')"
      @mouseleave="$store.game.setHovered(null)"
    >
      ?
    </div>
  </div>

  <!-- Location sub-tab strip (only when 2+ locations are active). -->
  <nav class="location-tabs-bar" x-show="showLocationTabs">
    <template x-for="loc in activeLocations" :key="loc">
      <button
        class="location-tab-btn"
        :class="{ 'is-active': $store.game.currentLocation === loc }"
        @click="$store.game.currentLocation = loc; $store.game.playSound('click')"
        x-text="$store.game.t('location_' + loc + '_name')"
      ></button>
    </template>
  </nav>

  <div class="game-grid centered-grid">
    <!-- NPC CARDS — filtered to the active location -->
    <template x-for="npcId in $store.game.unlockedNPCs.filter(id => locOf(id) === $store.game.currentLocation)" :key="npcId">
      <div
        :id="npcId + '-card'"
        class="game-card npc-card"
        @click="$store.game.commands.enqueue({ type: 'executeAction', actionId: 'act-' + npcId })"
        @mouseenter="$store.game.setHovered('act-' + npcId)"
        @mouseleave="$store.game.setHovered(null)"
        x-data="{ npc: $store.game.ui.getNPCData($store.game, npcId) }"
      >
        <div class="game-card-visual">
          <div class="npc-portrait-wrapper">
            <div
              class="npc-img-blur-bg"
              x-show="npc?.image"
              :style="'background-image: url(' + npc?.image + ')'"
            ></div>
            <img x-show="npc?.image" :src="npc?.image" class="npc-img" :alt="$store.game.t(npc?.nameKey)" />
            <div x-show="!npc?.image" class="npc-placeholder" x-text="npc?.icon"></div>
          </div>
          <template x-if="$store.game.ui.isNPCMaxed($store.game, npcId)">
            <div class="status-check" :title="$store.game.t('ui_maxed')"></div>
          </template>
        </div>

        <div class="game-card-footer">
          <h4 class="game-card-title" x-text="$store.game.t(npc?.nameKey)"></h4>
          <div class="npc-progress-mini-track">
            <div
              class="npc-progress-fill"
              :class="$store.game.ui.isNPCMaxed($store.game, npcId) && 'is-maxed'"
              :style="'width: ' + $store.game.ui.getNPCProgressPercent($store.game, npcId) + '%'"
            ></div>
          </div>
        </div>

        <!-- Trade Actions Overlay -->
        <div
          class="npc-trade-actions"
          x-show="$store.game.content.getNPCActions($store.game, npcId).length > 0"
        >
          <template x-for="action in $store.game.content.getNPCActions($store.game, npcId)" :key="action.id">
            <button
              class="npc-trade-btn"
              @click.stop="$store.game.commands.enqueue({ type: 'attemptAction', actionId: action.id, element: $el })"
              @mouseenter="$store.game.setHovered(action.id)"
              @mouseleave="$store.game.setHovered(null)"
              :title="$store.game.t(action.id, 'actions').title"
            >
              <span x-text="action.icon || ''"></span>
            </button>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>
