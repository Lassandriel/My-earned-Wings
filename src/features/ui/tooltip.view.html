<!-- FLOATING TOOLTIP (Senior Redesign) -->
<div
  class="floating-tooltip"
  id="tooltip-container"
  x-show="$store.game.hoveredAction && !$store.game.settingsOpen && !$store.game.confirmModal.open"
  style="display: none"
  x-transition:enter="tt-enter"
  x-transition:enter-start="tt-enter-start"
  x-transition:enter-end="tt-enter-end"
>
  <!-- 1. Title -->
  <div
    class="tt-title"
    x-html="$store.game.ui.renderTooltipTitle($store.game, $store.game.hoveredAction)"
  ></div>

  <div
    class="tt-story"
    x-html="$store.game.ui.renderTooltipStory($store.game, $store.game.hoveredAction)"
  ></div>

  <!-- Divider (NEW) -->
  <hr class="tt-divider" x-show="$store.game.hoveredAction" />

  <!-- Status / Active (NEW) -->
  <div class="tt-status" x-show="$store.game.hoveredAction?.data?.onSuccess?.some(e => e.type === 'setHome' && e.id === $store.game.activeHome)">
    <span class="status-active" x-text="$store.game.t('ui_symbol_sparkle') + $store.game.t('ui_current_home')"></span>
  </div>

  <!-- 3. Costs & Requirements Section -->
  <div
    class="tt-section"
    x-show="$store.game.ui.hasTooltipCosts($store.game, $store.game.hoveredAction) || $store.game.getTooltipRequirements($store.game.hoveredAction).length > 0"
  >
    <div class="tt-section-header" x-text="$store.game.t('ui_require') + $store.game.t('ui_divider_colon')"></div>
    <div class="tt-cost-list">
      <!-- Costs -->
      <template
        x-for="line in $store.game.getTooltipCosts($store.game.hoveredAction)"
        :key="line.label"
      >
        <div class="tt-data-line" :class="line.affordable ? 'tt-ready' : 'tt-blocked'">
          <span x-text="line.display"></span>
        </div>
      </template>
      <!-- Requirements -->
      <template
        x-for="req in $store.game.getTooltipRequirements($store.game.hoveredAction)"
        :key="req.label"
      >
        <div class="tt-data-line" :class="req.met ? 'tt-ready' : 'tt-blocked'">
          <span x-text="req.display"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- 4. Effects & Unlocks Section (skipped entirely for help-mode hovers like menu buttons) -->
  <template x-if="$store.game.hoveredAction && !$store.game.hoveredAction.isHelp">
    <div
      class="tt-section"
      x-show="$store.game.getActionEffect($store.game.hoveredAction).length > 0 || $store.game.t($store.game.hoveredAction.id, 'actions')?.unlocks"
    >
      <div class="tt-section-header" x-text="$store.game.t('ui_effect') + $store.game.t('ui_divider_colon')"></div>
      <div class="tt-effect-list">
        <!-- Yield/Effects -->
        <template
          x-for="eff in $store.game.getActionEffect($store.game.hoveredAction)"
          :key="eff"
        >
          <div class="tt-data-line tt-bonus">
            <span x-text="eff"></span>
          </div>
        </template>
        <!-- UNLOCKS -->
        <template
          x-for="item in ($store.game.t($store.game.hoveredAction.id, 'actions')?.unlocks || '').split(',')"
          :key="item"
        >
          <div class="tt-data-line tt-bonus" x-show="item.trim()">
            <span x-text="$store.game.t('ui_list_bullet') + item.trim().replace(/^::\s*/, '')"></span>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- 5. Buff Duration (NEW) -->
  <div class="tt-section" x-show="$store.game.hoveredAction?.isBuff">
    <div class="tt-section-header" x-text="$store.game.t('ui_duration_wrap').replace('{val}', $store.game.t('ui_duration'))"></div>
    <div class="tt-data-line tt-bonus">
      <span
        x-text="$store.game.t('ui_remaining_prefix') + ' ' + Math.ceil($store.game.hoveredAction?.remaining || 0) + ' ' + $store.game.t('ui_seconds')"
      ></span>
    </div>
  </div>
</div>
