<!-- Sidebar Navigation -->
<nav class="sidebar">
  <ul class="nav-list nav-items-top">
    <template x-for="item in Object.values($store.game.content.registries.navigation).filter(i => !i.requiredFlag || $store.game.flags[i.requiredFlag])" :key="item.id">
      <li
        class="nav-item"
        :id="'nav-' + item.id"
        :class="$store.ui.view === item.id && 'active'"
        @click="$store.ui.view = item.id; $store.game.playSound('click')"
        @keydown.enter="$store.ui.view = item.id; $store.game.playSound('click')"
        :aria-label="$store.game.t('nav_to_prefix') + ' ' + $store.game.t(item.label)"
        role="menuitem"
        tabindex="0"
      >
        <img :src="'img/menu/menu_' + item.icon + '.webp'" :alt="$store.game.t(item.label)" class="menu-icon-img" />
        <span x-text="$store.game.t(item.label)"></span>
      </li>
    </template>
  </ul>

  <div class="sidebar-footer">
    <div
      class="save-status-sidebar"
      x-text="$store.game.saveInfoText || $store.game.t('save_never')"
    >
    </div>
  </div>
</nav>
