<!-- Sidebar Navigation -->
<nav 
  class="sidebar" 
  :class="$store.game.sidebarCollapsed && 'collapsed'"
  x-init="if (window.innerWidth < 1350) $store.game.sidebarCollapsed = true"
>
  <div class="sidebar-toggle-btn" @click="$store.game.toggleSidebar()">
    <span x-show="!$store.game.sidebarCollapsed">◀</span>
    <span x-show="$store.game.sidebarCollapsed">▶</span>
  </div>

  <div class="sidebar-help-row" x-show="!$store.game.sidebarCollapsed">
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.helpHover('sidebar_help_title', 'sidebar_help_desc')"
      @mouseleave="$store.game.setHovered(null)"
    >?</div>
  </div>

  <ul class="nav-list nav-items-top">
    <template x-for="item in Object.values($store.game.content.registries.navigation).filter(i => !i.requiredFlag || $store.game.flags[i.requiredFlag])" :key="item.id">
      <li
        class="nav-item"
        :id="'nav-' + item.id"
        :class="$store.game.view === item.id && 'active'"
        @click="$store.game.view = item.id; $store.game.playSound('click')"
        @keydown.enter="$store.game.view = item.id; $store.game.playSound('click')"
        :aria-label="$store.game.t('nav_to_prefix') + ' ' + $store.game.t(item.label)"
        role="menuitem"
        tabindex="0"
        @mouseenter="if ($store.game.sidebarCollapsed) $store.game.setHovered(item.id, { isHelp: true, title: $store.game.t(item.label), desc: '' })"
        @mouseleave="if ($store.game.sidebarCollapsed) $store.game.setHovered(null)"
      >
        <img :src="'img/menu/menu_' + item.icon + '.webp'" :alt="$store.game.t(item.label)" class="menu-icon-img" loading="lazy" />
        <span x-text="$store.game.t(item.label)"></span>
      </li>
    </template>
  </ul>

  <div class="sidebar-footer">
    <div
      class="save-status-sidebar"
      x-text="$store.game.saveInfoText || $store.game.t('save_never')"
    >
    </div>
  </div>
</nav>
