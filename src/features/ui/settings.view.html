<!--
  SETTINGS MODAL — extensible by addons.

  Tabs come from the settingsTabs registry (content/base/settingsTabs/*.yaml
  for base, content/addons/<name>/settingsTabs/*.yaml for addons). Addons
  add a new tab by shipping a YAML entry + filling the `settings-content`
  slot with a wrapper `<div x-show="settingsTab === '<your-id>'">…</div>`.

  Base tab bodies stay inline below for now (large refactor not justified
  for the existing 5 tabs). Renderer is hybrid: the sidebar nav + content
  header are data-driven from the registry; tab bodies are either inline
  (base) or slot-injected (addons).
-->
<div
  id="modal-settings"
  class="modal-overlay"
  x-show="$store.game.settingsOpen"
  style="display: none"
  x-transition.opacity
  x-data="{
    settingsTab: 'general',
    /* Sorted+filtered view of the settingsTabs registry. Cheap to recompute. */
    get visibleSettingsTabs() {
      const reg = $store.game.content?.registries?.settingsTabs || {};
      return Object.values(reg)
        .filter(t => !t.requiresFlag || !!$store.game.flags?.[t.requiresFlag])
        .sort((a, b) => (a.order ?? 100) - (b.order ?? 100));
    },
    get currentSettingsTab() {
      return this.visibleSettingsTabs.find(t => t.id === this.settingsTab) || null;
    }
  }"
  @click.self="$store.game.settingsOpen = false"
  role="dialog"
  aria-modal="true"
  aria-labelledby="settings-title"
>
  <div class="settings-modal-unified">
    <!-- Sidebar Navigation -->
    <div class="settings-sidebar">
      <div class="sidebar-header">
        <h2 id="settings-title" x-text="$store.game.t('settings_title')"></h2>
      </div>
      <nav class="settings-tabs">
        <!--
          Data-driven: iterates the settingsTabs registry. Base ships 5
          tabs as YAML; addons add their own by dropping a settingsTabs
          entry. See content/base/settingsTabs/main.yaml.
        -->
        <template x-for="tab in visibleSettingsTabs" :key="tab.id">
          <button
            class="tab-btn"
            :class="settingsTab === tab.id && 'active'"
            @click="settingsTab = tab.id"
          >
            <span class="tab-icon" x-text="tab.icon"></span>
            <span x-text="$store.game.t(tab.labelKey)"></span>
          </button>
        </template>
      </nav>
      <div class="sidebar-footer">
        <button
          class="save-back-btn-sidebar"
          @click="$store.game.saveGame(); $store.game.settingsOpen = false; $store.game.playSound('click')"
        >
          <span x-text="$store.game.t('btn_save_back')"></span>
        </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="settings-content-wrapper">
      <header class="content-header">
        <!-- Title is data-driven from the active settingsTab entry. -->
        <h3 x-text="currentSettingsTab ? $store.game.t(currentSettingsTab.labelKey) : ''"></h3>
        <button class="close-top-btn" @click="$store.game.settingsOpen = false">×</button>
      </header>

      <div class="settings-body-scrollable">
        <!-- 1. General Tab -->
        <div x-show="settingsTab === 'general'" x-transition>
          <section class="settings-card">
            <label x-text="$store.game.t('settings_name')"></label>
            <div class="control-group">
              <input
                type="text"
                x-model="$store.game.playerName"
                :placeholder="$store.game.t('settings_name') + '...'"
                @change="$store.game.saveGame()"
              />
            </div>
          </section>

          <section class="settings-card">
            <h4 x-text="$store.game.t('settings_lang')"></h4>
            <div class="lang-grid">
              <button
                class="lang-btn-modern"
                :class="$store.game.language === 'de' && 'active'"
                @click="$store.game.setLanguage('de')"
              >
                <span x-text="$store.game.t('ui_lang_de')"></span>
              </button>
              <button
                class="lang-btn-modern"
                :class="$store.game.language === 'en' && 'active'"
                @click="$store.game.setLanguage('en')"
              >
                <span x-text="$store.game.t('ui_lang_en')"></span>
              </button>
            </div>
          </section>
        </div>

        <!-- 1.5 Controls Tab — keyboard shortcut reference -->
        <div x-show="settingsTab === 'controls'" x-transition>
          <section class="settings-card">
            <p class="hint" x-text="$store.game.t('controls_intro')"></p>
            <table class="hotkeys-table">
              <tbody>
                <tr>
                  <td><kbd>F1</kbd> · <kbd>F2</kbd> · <kbd>F3</kbd></td>
                  <td x-text="$store.game.t('controls_primary')"></td>
                </tr>
                <tr>
                  <td><kbd>1</kbd> – <kbd>6</kbd></td>
                  <td x-text="$store.game.t('controls_tabs_number')"></td>
                </tr>
                <tr>
                  <td><kbd>↑</kbd> · <kbd>↓</kbd></td>
                  <td x-text="$store.game.t('controls_tabs_arrow')"></td>
                </tr>
                <tr>
                  <td><kbd>Enter</kbd></td>
                  <td x-text="$store.game.t('controls_enter')"></td>
                </tr>
                <tr>
                  <td><kbd>Esc</kbd></td>
                  <td x-text="$store.game.t('controls_esc')"></td>
                </tr>
                <tr>
                  <td><kbd>Tab</kbd></td>
                  <td x-text="$store.game.t('controls_tab_nav')"></td>
                </tr>
              </tbody>
            </table>
            <p class="hint" x-text="$store.game.t('controls_laptop_note')"></p>
          </section>
        </div>

        <!-- 2. Audio Tab -->
        <div x-show="settingsTab === 'audio'" x-transition>
          <section class="settings-card">
            <div class="control-group">
              <label>
                <span x-text="$store.game.t('settings_vol_global')"></span>
                <span
                  class="val-pill"
                  x-text="$store.game.t('ui_percent').replace('{val}', Math.round($store.game.settings.volumeGlobal * 100))"
                ></span>
              </label>
              <input
                type="range"
                min="0"
                max="1"
                step="0.01"
                x-model="$store.game.settings.volumeGlobal"
                @input="$store.game.audio.updateVolumes($store.game.settings)"
                @change="$store.game.saveGame()"
              />
            </div>

            <div class="control-group">
              <label>
                <span x-text="$store.game.t('settings_vol_music')"></span>
                <span
                  class="val-pill"
                  x-text="$store.game.t('ui_percent').replace('{val}', Math.round($store.game.settings.volumeMusic * 100))"
                ></span>
              </label>
              <input
                type="range"
                min="0"
                max="1"
                step="0.01"
                x-model="$store.game.settings.volumeMusic"
                @input="$store.game.audio.updateVolumes($store.game.settings)"
                @change="$store.game.saveGame()"
              />
            </div>

            <div class="control-group">
              <label>
                <span x-text="$store.game.t('settings_vol_sfx')"></span>
                <span
                  class="val-pill"
                  x-text="$store.game.t('ui_percent').replace('{val}', Math.round($store.game.settings.volumeSfx * 100))"
                ></span>
              </label>
              <input
                type="range"
                min="0"
                max="1"
                step="0.01"
                x-model="$store.game.settings.volumeSfx"
                @input="$store.game.audio.updateVolumes($store.game.settings)"
                @change="$store.game.saveGame()"
              />
            </div>

            <div class="control-group row-flex">
              <span x-text="$store.game.t('settings_mute')"></span>
              <label class="toggle-switch">
                <input
                  type="checkbox"
                  x-model="$store.game.settings.mute"
                  @change="$store.game.audio.updateVolumes($store.game.settings); $store.game.saveGame()"
                />
                <span class="slider round"></span>
              </label>
            </div>
          </section>
        </div>

        <!-- 3. Graphics Tab -->
        <div x-show="settingsTab === 'graphics'" x-transition>
          <section class="settings-card">
            <div class="control-group">
              <label x-text="$store.game.t('settings_resolution')"></label>
              <div class="resolution-grid">
                <template x-for="res in ['1280x720', '1600x900', '1920x1080', 'auto']">
                  <button
                    class="res-btn"
                    :class="$store.game.settings.resolution === res && 'active'"
                    @click="$store.game.settingsSystem.setResolution($store.game, res); $store.game.saveGame()"
                    x-text="res === 'auto' ? $store.game.t('settings_ui_scale_auto') : res"
                  ></button>
                </template>
              </div>
            </div>

            <div class="control-group" style="margin-top: 10px;">
              <label x-text="$store.game.t('settings_ui_scale')"></label>
              <div class="resolution-grid">
                <template x-for="scale in ['0.75', '1.0', '1.25', 'auto']">
                  <button
                    class="res-btn"
                    :class="$store.game.settings.uiScale === scale && 'active'"
                    @click="$store.game.settings.uiScale = scale; $store.game.settingsSystem.calculateScale($store.game); $store.game.saveGame()"
                    x-text="scale === 'auto' ? $store.game.t('settings_ui_scale_auto') : $store.game.t('ui_percent').replace('{val}', (parseFloat(scale) * 100))"
                  ></button>
                </template>
              </div>
            </div>

            <div class="control-group row-flex">
              <span x-text="$store.game.t('settings_show_particles')"></span>
              <label class="toggle-switch">
                <input
                  type="checkbox"
                  x-model="$store.game.settings.showParticles"
                  @change="$store.game.saveGame()"
                />
                <span class="slider round"></span>
              </label>
            </div>

            <div class="control-group row-flex">
              <span x-text="$store.game.t('settings_show_juice')"></span>
              <label class="toggle-switch">
                <input
                  type="checkbox"
                  x-model="$store.game.settings.showJuice"
                  @change="$store.game.saveGame()"
                />
                <span class="slider round"></span>
              </label>
            </div>
          </section>
        </div>

        <!-- 4. System Tab -->
        <div x-show="settingsTab === 'system'" x-transition>
          <section class="settings-card">
            <div class="control-group stack">
              <label x-text="$store.game.t('settings_system')"></label>
              <textarea
                x-model="$store.game.saveCode"
                class="modern-textarea"
                :placeholder="$store.game.t('settings_import_placeholder')"
              ></textarea>
              <div class="btn-row-flex">
                <button
                  class="action-btn-sm"
                  @click="$store.game.saveCode = $store.game.persistence.exportGameData($store.game)"
                  x-text="$store.game.t('btn_export')"
                >
                  <span x-text="$store.game.t('btn_export')"></span>
                </button>
                <button
                  class="action-btn-sm"
                  @click="$store.game.persistence.importGameData($store.game, $store.game.saveCode)"
                  x-text="$store.game.t('btn_import')"
                >
                  <span x-text="$store.game.t('btn_import')"></span>
                </button>
              </div>
            </div>

            <div class="system-actions">
              <button
                class="game-btn-wide"
                @click="$store.game.persistence.saveGame($store.game, true)"
              >
                <span x-text="$store.game.t('btn_save')"></span>
              </button>
              <button
                class="game-btn-wide secondary"
                @click="$store.game.persistence.loadGame($store.game)"
              >
                <span x-text="$store.game.t('btn_load')"></span>
              </button>
              <button
                class="game-btn-wide secondary"
                @click="$store.game.returnToMenu(); $store.game.settingsOpen = false;"
              >
                <span x-text="$store.game.t('btn_main_menu')"></span>
              </button>
            </div>

            <div class="danger-zone" x-show="$store.game.playerName === 'CHEAT'">
              <button
                class="game-btn-wide"
                style="background: var(--gold); color: black"
                @click="$store.game.applyCheats()"
              >
                <span x-text="$store.game.t('ui_cheats_unlock_all')"></span>
              </button>
            </div>

            <div class="danger-zone">
              <button class="danger-btn" @click="$store.game.hardReset()">
                <span x-text="$store.game.t('settings_reset')"></span>
              </button>
            </div>
          </section>
        </div>

        <!--
          Addons tab — informational read-out of every loaded addon
          (core + build-time + runtime). Pulls from getActiveAddons()
          which walks BUILD_TIME_ADDONS + the runtime registry, so
          drop-in addons that arrived after Alpine boot show up too.
          Source badge tells the player whether each entry is baked
          into the build or loaded from a folder next to the .exe.
        -->
        <div x-show="settingsTab === 'addons'" x-transition>
          <section class="settings-card">
            <p class="hint" x-text="$store.game.t('settings_addons_intro')"></p>
            <ul class="addon-list">
              <template x-for="a in $store.game.getActiveAddons()" :key="a.name">
                <li class="addon-row">
                  <div class="addon-row-head">
                    <div class="addon-row-main">
                      <strong class="addon-name" x-text="a.name"></strong>
                      <span class="addon-version" x-text="'v' + a.version"></span>
                    </div>
                    <span
                      class="addon-source"
                      :class="'addon-source-' + a.source"
                      x-text="a.source === 'build' ? $store.game.t('settings_addons_source_build') : $store.game.t('settings_addons_source_runtime')"
                    ></span>
                  </div>
                  <p class="addon-desc" x-show="a.description" x-text="a.description"></p>
                  <!--
                    Per-category entry chips. Object.entries gives us
                    [category, count] pairs; filter zeros + sort by
                    count descending so the most populous category
                    sits first. Limit to 6 chips to avoid wrapping
                    runaway when an addon ships a lot of categories.
                  -->
                  <div class="addon-entries" x-show="a.entries && Object.keys(a.entries).length > 0">
                    <template
                      x-for="[cat, n] in Object.entries(a.entries || {}).filter(([, n]) => n > 0).sort(([, a], [, b]) => b - a).slice(0, 6)"
                      :key="cat"
                    >
                      <span class="addon-entry-chip">
                        <span x-text="n"></span>
                        <span x-text="cat"></span>
                      </span>
                    </template>
                  </div>
                  <p class="addon-author" x-show="a.author">
                    <span x-text="$store.game.t('settings_addons_by')"></span>
                    <span x-text="a.author"></span>
                  </p>
                </li>
              </template>
            </ul>
            <p class="hint addon-list-note" x-text="$store.game.t('settings_addons_note')"></p>
          </section>
        </div>

        <!--
          Slot for addon-provided settings tab bodies. Addons that add
          their own settingsTabs entry ship the matching body markup
          via slots/settings-content.html as e.g.
            <div x-show="settingsTab === 'shadows'" x-transition>
              <section class="settings-card">…</section>
            </div>
          Multiple addons can append here; each gets its own
          data-addon-slot wrapper. Hidden by default — only the active
          tab body renders because of x-show. Lives inside the modal's
          x-data scope so `settingsTab` resolves correctly.
        -->
        <div data-slot="settings-content"></div>
      </div>
    </div>
  </div>
</div>
