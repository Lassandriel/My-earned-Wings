<section
  class="naming-modal-overlay"
  x-show="$store.game.view === 'naming'"
  x-transition:enter="modal-overlay-enter"
  x-transition:leave="modal-overlay-leave"
  x-data="{ tempName: '' }"
>
  <div
    class="naming-modal-card"
    x-transition:enter="modal-card-enter"
    x-transition:leave="modal-card-leave"
    x-init="$watch('$store.game.view', v => v === 'naming' && $nextTick(() => $el.querySelector('input').focus()))"
  >
    <div class="modal-decor-top"></div>

    <div class="modal-header">
      <h2 x-html="$store.game.t('ui_naming_title')"></h2>
      <p x-html="$store.game.t('ui_naming_desc')"></p>
    </div>

    <div class="naming-input-wrapper">
      <input
        type="text"
        id="player-name-input"
        x-model="tempName"
        :placeholder="$store.game.t('ui_naming_placeholder')"
        maxlength="16"
        @keydown.enter="if(tempName.trim().length >= 2) $store.game.confirmName(tempName)"
        class="premium-input"
        :class="{ 'input-error': tempName.length && (tempName.trim().length <= 1 || !/^[a-zA-ZÀ-ÿ\s'-]+$/.test(tempName)) }"
      />
      <div class="input-focus-line"></div>
      
      <!-- UX Feedback -->
      <div class="input-feedback-row">
        <span class="char-counter" :class="{ 'at-limit': tempName.length >= 16 }" x-text="tempName.length + ' / 16'"></span>
        <span class="validation-hint" x-show="tempName.length > 0 && tempName.trim().length < 2" x-transition x-text="$store.game.t('ui_naming_too_short', 'ui') || 'Too short...'"></span>
        <span class="validation-hint" x-show="tempName.length > 0 && !/^[a-zA-ZÀ-ÿ\s'-]+$/.test(tempName)" x-transition x-text="$store.game.t('ui_naming_invalid_chars', 'ui') || 'Invalid characters...'"></span>
      </div>
    </div>

    <div class="modal-footer">
      <button
        class="game-btn premium-confirm-btn"
        :disabled="!tempName || tempName.trim().length < 2 || !/^[a-zA-ZÀ-ÿ\s'-]+$/.test(tempName)"
        @click="$store.game.confirmName(tempName)"
      >
        <span x-text="$store.game.t('ui_naming_confirm')"></span>
        <span class="btn-shine"></span>
      </button>
    </div>

    <div class="modal-decor-bottom"></div>
  </div>
</section>
