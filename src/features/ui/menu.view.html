<!-- MAIN MENU VIEW -->
<section id="main-menu" x-show="$store.game.view === 'menu'" class="main-menu-overlay">
  <div class="menu-content">
    <div class="menu-logo-container">
      <img src="img/menu/logo_wings.webp" alt="Wings Logo" class="menu-logo" />
      <h1 class="menu-title" x-text="$store.game.t('menu_title') || 'Your earned Wings'"></h1>
      <div class="menu-subtitle">
        <span x-text="$store.game.t('menu_subtitle')"></span>
        <span class="demo-badge" x-text="$store.game.t('ui_demo_badge')"></span>
      </div>
    </div>

    <div class="menu-actions">
      <!-- Continue Button -->
      <button
        class="menu-btn primary"
        x-show="$store.game.hasSave"
        @click="$store.game.continueGame()"
        @mouseenter="$store.game.setHovered('continue', { isHelp: true, title: $store.game.t('menu_continue'), desc: $store.game.t('ui_continue_desc') })"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('menu_continue')"
      >
        <span class="btn-glow"></span>
        <span x-text="$store.game.t('menu_continue')"></span>
      </button>

      <!-- New Game Button -->
      <button 
        class="menu-btn" 
        @click="$store.game.startNewGame()" 
        @mouseenter="$store.game.setHovered('new_game', { isHelp: true, title: $store.game.t('menu_new_game'), desc: $store.game.t('ui_new_game_desc') })"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('menu_new_game')"
      >
        <span x-text="$store.game.t('menu_new_game')"></span>
      </button>

      <!-- Settings Button -->
      <button
        class="menu-btn"
        @click="$store.game.settingsOpen = true; $store.game.playSound('click')"
        @mouseenter="$store.game.setHovered('settings', { isHelp: true, title: $store.game.t('settings_title'), desc: $store.game.t('ui_settings_desc') })"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('settings_title')"
      >
        <span x-text="$store.game.t('settings_title')"></span>
      </button>

      <!-- Quit Button -->
      <button 
        class="menu-btn quit" 
        @click="$store.game.quit()" 
        @mouseenter="$store.game.setHovered('quit', { isHelp: true, title: $store.game.t('btn_quit'), desc: $store.game.t('ui_quit_desc') })"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('btn_quit')"
      >
        <span x-text="$store.game.t('btn_quit')"></span>
      </button>
    </div>
  </div>

  <div class="menu-footer">
    <span x-text="$store.game.t('menu_version')"></span>
    <a
      href="https://github.com/Lassandriel/My-earned-Wings"
      target="_blank"
      class="footer-repo-link"
      x-text="'github.com/Lassandriel/My-earned-Wings'"></a>
  </div>
</section>
