<!-- MAIN MENU VIEW -->
<section id="main-menu" x-show="$store.game.view === 'menu'" class="main-menu-overlay">
  <div class="menu-content">
    <div class="menu-logo-container">
      <img src="img/menu/logo_wings.webp" :alt="$store.game.t('ui_wings_logo_alt')" class="menu-logo" />
      <h1 class="menu-title" x-text="$store.game.t('menu_title')"></h1>
      <div class="menu-subtitle">
        <span x-text="$store.game.t('menu_subtitle')"></span>
        <span class="demo-badge" x-text="$store.game.t('ui_demo_badge')"></span>
      </div>
    </div>

    <div class="menu-actions">
      <!-- Continue Button -->
      <button
        class="menu-btn primary"
        x-show="$store.game.hasSave"
        @click="$store.game.continueGame()"
        @mouseenter="$store.game.helpHover('menu_continue', 'ui_continue_desc', 'continue')"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('menu_continue')"
      >
        <span class="btn-glow"></span>
        <span x-text="$store.game.t('menu_continue')"></span>
      </button>

      <!-- New Game Button -->
      <button 
        class="menu-btn" 
        @click="$store.game.startNewGame()" 
        @mouseenter="$store.game.helpHover('menu_new_game', 'ui_new_game_desc', 'new_game')"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('menu_new_game')"
      >
        <span x-text="$store.game.t('menu_new_game')"></span>
      </button>

      <!-- Settings Button -->
      <button
        class="menu-btn"
        @click="$store.game.settingsOpen = true; $store.game.playSound('click')"
        @mouseenter="$store.game.helpHover('settings_title', 'ui_settings_desc', 'settings')"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('settings_title')"
      >
        <span x-text="$store.game.t('settings_title')"></span>
      </button>

      <!-- Quit Button -->
      <button 
        class="menu-btn quit" 
        @click="$store.game.quit()" 
        @mouseenter="$store.game.helpHover('btn_quit', 'ui_quit_desc', 'quit')"
        @mouseleave="$store.game.setHovered(null)"
        :aria-label="$store.game.t('btn_quit')"
      >
        <span x-text="$store.game.t('btn_quit')"></span>
      </button>
    </div>
  </div>

  <div class="menu-footer">
    <span x-text="$store.game.t('menu_version')"></span>
    <a
      href="https://github.com/Lassandriel/My-earned-Wings/issues/new"
      target="_blank"
      class="footer-repo-link"
      x-text="$store.game.t('menu_report_bug')"></a>
  </div>
</section>
