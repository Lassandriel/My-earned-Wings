<!-- GLOBAL LOG CONTAINER -->
<section
  class="global-log-container"
  x-show="$store.game.view !== 'menu' && $store.game.view !== 'prologue'"
>
  <div class="category-header"><h3 x-text="$store.game.t('cat_log')"></h3></div>
  <p class="log-description" x-text="$store.game.t('chronicle_desc')"></p>
  <div class="log-stream">
    <template x-for="log in $store.game.logs" :key="log.timestamp">
      <div
        class="log-entry"
        :class="'log-' + (log.type || 'normal')"
        :style="'color: ' + log.color"
        x-html="$store.game.t(log.id, log.context, log.params) + (log.count > 1 ? ' (x' + log.count + ')' : '')"
      ></div>
    </template>
  </div>
</section>
