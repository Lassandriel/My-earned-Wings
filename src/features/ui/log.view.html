<!-- GLOBAL LOG CONTAINER -->
<section
  class="global-log-container"
  x-show="$store.game.view !== 'menu' && $store.game.view !== 'prologue'"
>
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_log')"></h3>
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_log'), desc: $store.game.t('chronicle_desc') })"
      @mouseleave="$store.game.setHovered(null)"
    >
      ?
    </div>
  </div>
  <div class="log-stream" role="log" aria-live="polite">
    <template x-for="log in $store.logs.list" :key="log.timestamp">
      <div
        class="log-entry"
        :class="'log-' + (log.type || 'normal')"
        :style="'color: ' + log.color"
        x-html="$store.game.language && $store.game.t(log.id, log.context, log.params) + (log.count > 1 ? ' (x' + log.count + ')' : '')"
      ></div>
    </template>
  </div>
</section>
