<!-- UPGRADES VIEW (THE DRAGON'S VAULT) - REFACTORED 3.1 -->
<div
  x-show="$store.ui.view === 'upgrades'"
  class="game-view-content"
  x-data="{ 
    activeCategory: 'all',
    get discoveredItems() {
      return $store.game.ui.getDiscoveredItemsByCategory($store.game, this.activeCategory);
    },
    get emptySlots() {
      return Math.max(0, 18 - this.discoveredItems.length);
    }
  }"
>
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_upgrades')"></h3>
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_upgrades'), desc: $store.game.t('cat_upgrades_desc') })"
      @mouseleave="$store.game.setHovered(null)"
    >?</div>
  </div>

  <!-- Sub-Tab Navigation -->
  <nav class="nav-tabs-wrapper m-lg">
    <div class="nav-tabs">
      <template x-for="cat in ['all', 'tools', 'artifacts', 'furniture', 'provisions']" :key="cat">
        <button
          class="nav-tab-btn"
          :class="activeCategory === cat && 'active'"
          @click="activeCategory = cat; $store.game.playSound('click')"
          x-text="$store.game.t('ui_' + cat)"
        ></button>
      </template>
    </div>
  </nav>

  <div class="vault-action-container">
    <div class="game-grid" x-transition>
      <!-- Item Slots -->
      <template x-for="id in discoveredItems" :key="id">
        <div
          class="game-card item-slot card-premium"
          :class="{
            'is-selected': $store.game.selectedItem === id,
            'slot-tool': id.startsWith('item-walking') || id.startsWith('item-axe'),
            'slot-rare': !id.startsWith('item-walking') && !id.startsWith('item-axe')
          }"
          @click="$store.game.selectedItem = id; $store.game.playSound('click')"
          @mouseenter="$store.game.setHovered(id)"
          @mouseleave="$store.game.setHovered(null)"
          x-data="{ item: $store.game.ui.getItemData($store.game, id) }"
        >
          <div class="game-card-visual">
            <img
              :src="item?.image || 'img/Placeholder_Item.webp'"
              :alt="id"
              class="slot-icon"
            />
          </div>
          <div class="game-card-footer">
            <h4 class="game-card-title" x-text="$store.game.t(item?.title, 'items')"></h4>
          </div>

          <template x-if="item?.consumable">
            <div class="item-action-overlay">
               <button 
                class="item-use-btn"
                @click.stop="$store.game.consumeItem(id)"
                :title="$store.game.t('ui_use')"
              >🍴</button>
            </div>
          </template>
        </div>
      </template>

      <!-- Empty Slots for Grid Consistency -->
      <template x-for="i in emptySlots" :key="'empty-' + i">
        <div class="item-slot-empty"></div>
      </template>
    </div>

    <div x-show="discoveredItems.length === 0" class="empty-state-container panel-premium flex-center m-lg" x-transition>
      <p class="empty-state-text text-dim" x-text="$store.game.t('ui_upgrades_empty')"></p>
    </div>
  </div>
</div>
