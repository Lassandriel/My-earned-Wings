<!-- CRAFTING & HOUSING HUB - REFACTORED 3.1 -->
<div
  x-show="$store.game.view === 'crafting'"
  class="game-view-content"
  x-data="{
    locTab: 'all',
    get blueprints() {
      const categories = ['camp', 'housing', 'furniture', 'crafting', 'tools', 'garden'];
      const allActions = $store.game.content.registries.actions;
      
      return Object.values(allActions)
        .filter(act => categories.includes(act.category) && this.isVisible(act))
        .filter(act => this.locTab === 'all' || act.category === this.locTab)
        .sort((a, b) => {
          const compA = this.isCompleted(a.id);
          const compB = this.isCompleted(b.id);
          if (compA !== compB) return compA ? 1 : -1;
          return a.id.localeCompare(b.id);
        });
    },
    isCompleted(id) {
      if ($store.game.flags[id] === true) return true;
      const action = $store.game.content.get(id, 'actions');
      if (action?.onSuccess) {
        const unlockItem = action.onSuccess.find(e => e.type === 'unlockItem');
        if (unlockItem && $store.game.discoveredItems.includes(unlockItem.id)) return true;
      }
      return false;
    },
    isVisible(act) {
      if (this.isCompleted(act.id) || $store.game.unlockedRecipes.includes(act.id)) return true;
      return !act.requirements || Object.entries(act.requirements).every(([p, r]) => $store.game.actions.checkRequirement($store.game, p, r));
    }
  }"
>
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_crafting')"></h3>
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_crafting'), desc: $store.game.t('nav_crafting_desc') })"
      @mouseleave="$store.game.setHovered(null)"
    >?</div>
  </div>

  <!-- Sub-Tab Navigation -->
  <nav class="nav-tabs-wrapper m-lg">
    <div class="nav-tabs">
      <template x-for="tab in ['all', 'camp', 'housing', 'furniture', 'crafting', 'tools', 'garden']" :key="tab">
        <button
          class="nav-tab-btn"
          :class="locTab === tab && 'active'"
          @click="locTab = tab; $store.game.playSound('click')"
          x-text="$store.game.t('ui_tab_' + tab)"
        ></button>
      </template>
    </div>
  </nav>

  <div class="action-container">
    <div class="game-grid" x-transition>
      <template x-for="bp in blueprints" :key="bp.id">
        <div
          class="game-card blueprint-card card-premium"
          :class="isCompleted(bp.id) && 'is-completed'"
          @click="!isCompleted(bp.id) && $store.game.attemptAction($el, bp.id)"
          @mouseover="$store.game.setHovered(bp.id)"
          @mouseout="$store.game.setHovered(null)"
        >
          <div class="game-card-visual">
            <div class="blueprint-visual-wrapper">
              <template x-if="bp.image">
                <img :src="bp.image" class="blueprint-img" :alt="bp.id" />
              </template>
              <template x-if="!bp.image">
                <span class="blueprint-icon-fallback" x-text="bp.id.includes('garden') ? '🌿' : '🏗️'"></span>
              </template>
            </div>
            <template x-if="isCompleted(bp.id)">
              <div class="status-check">✓</div>
            </template>
          </div>
          <div class="game-card-footer">
            <h4 class="game-card-title" x-text="$store.game.t(bp.id, 'actions').title"></h4>
          </div>
        </div>
      </template>
    </div>

    <div x-show="blueprints.length === 0" class="empty-state-container panel-premium flex-center m-lg" x-transition>
      <p class="empty-state-text text-dim" x-text="$store.game.t('ui_empty_category')"></p>
    </div>
  </div>
</div>
