<!-- CRAFTING & HOUSING HUB - CORE 3.0 -->
<div
  x-show="$store.game.view === 'crafting'"
  class="view-content-crafting"
  x-data="{
            // Dynamic resolution from ContentService
            getConstructionItems() {
                const categories = ['camp', 'housing', 'crafting', 'tools', 'garden'];
                const allActions = this.$store.game.content.registries.actions || {};
                
                let list = [];
                Object.values(allActions).forEach(action => {
                    if (categories.includes(action.category)) {
                        if (this.isVisible(action)) {
                            list.push({ id: action.id, cat: action.category });
                        }
                    }
                });
    
                if (this.$store.game.craftingSubView !== 'all') {
                    list = list.filter(a => a.cat === this.$store.game.craftingSubView);
                }
    
                return list.sort((a, b) => {
                    const compA = this.isCompleted(a.id);
                    const compB = this.isCompleted(b.id);
                    if (compA !== compB) return compA ? 1 : -1;
                    return a.id.localeCompare(b.id);
                });
            },
            isCompleted(id) {
                // Buildings usually set a flag with their ID
                if (this.$store.game.flags[id] === true) return true;
                
                // For items, check if the resulting item is already in the inventory/discovered
                const action = this.$store.game.content.get(id, 'actions');
                if (action && action.onSuccess) {
                    const unlockItem = action.onSuccess.find(e => e.type === 'unlockItem');
                    if (unlockItem && this.$store.game.discoveredItems.includes(unlockItem.id)) return true;
                }
                return false;
            },
            isVisible(action) {
                if (this.isCompleted(action.id)) return true;
                
                // If it's explicitly unlocked as a recipe, show it
                if (this.$store.game.unlockedRecipes.includes(action.id)) return true;

                if (!action.requirements) return true;
                
                // Use the global requirement engine (Core 3.0)
                return Object.entries(action.requirements).every(([path, rule]) => {
                    return this.$store.game.actions.checkRequirement(this.$store.game, path, rule);
                });
            }
          }"
>
  <!-- CATEGORY HEADER -->
  <div class="category-header">
    <div style="display: flex; align-items: center; justify-content: flex-start; gap: 15px">
      <h3 x-text="$store.game.t('cat_crafting')"></h3>
      <div
        class="nav-help-icon"
        @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_crafting'), desc: $store.game.t('nav_crafting_desc') })"
        @mouseleave="$store.game.setHovered(null)"
      >
        ?
      </div>
    </div>
  </div>

  <!-- SUB-TAB NAVIGATION -->
  <div class="crafting-tabs">
    <button
      class="craft-tab-btn"
      :class="$store.game.craftingSubView === 'all' && 'active'"
      @click="$store.game.craftingSubView = 'all'; $store.game.playSound('click')"
      x-text="$store.game.t('ui_tab_all')"
    >
    </button>
    <button
      class="craft-tab-btn"
      :class="$store.game.craftingSubView === 'camp' && 'active'"
      @click="$store.game.craftingSubView = 'camp'; $store.game.playSound('click')"
      x-text="$store.game.t('ui_tab_camp')"
    >
    </button>
    <button
      class="craft-tab-btn"
      :class="$store.game.craftingSubView === 'housing' && 'active'"
      @click="$store.game.craftingSubView = 'housing'; $store.game.playSound('click')"
      x-text="$store.game.t('ui_tab_housing')"
    >
    </button>
    <button
      class="craft-tab-btn"
      :class="$store.game.craftingSubView === 'crafting' && 'active'"
      @click="$store.game.craftingSubView = 'crafting'; $store.game.playSound('click')"
      x-text="$store.game.t('ui_tab_crafting')"
    >
    </button>
    <button
      class="craft-tab-btn"
      :class="$store.game.craftingSubView === 'tools' && 'active'"
      @click="$store.game.craftingSubView = 'tools'; $store.game.playSound('click')"
      x-text="$store.game.t('ui_tab_tools')"
    >
    </button>
    <button
      class="craft-tab-btn"
      :class="$store.game.craftingSubView === 'garden' && 'active'"
      @click="$store.game.craftingSubView = 'garden'; $store.game.playSound('click')"
      x-text="$store.game.t('ui_tab_garden')"
    >
    </button>
  </div>

  <div class="action-container">
    <div class="blueprint-grid" x-transition:enter="view-enter">
      <template x-for="bp in getConstructionItems()" :key="bp.id">
        <button
          class="blueprint-card"
          :class="isCompleted(bp.id) && 'is-completed'"
          @click="!isCompleted(bp.id) && $store.game.attemptAction($el, bp.id)"
          @mouseover="$store.game.setHovered(bp.id)"
          @mouseout="$store.game.setHovered(null)"
        >
          <div class="blueprint-visual">
            <template x-if="$store.game.content.get(bp.id)?.image">
              <img :src="$store.game.content.get(bp.id)?.image" class="blueprint-img" />
            </template>
            <template x-if="!$store.game.content.get(bp.id)?.image">
              <span style="font-size: 3rem" x-text="bp.id.includes('garden') ? '🌿' : '🏗️'"></span>
            </template>
            <template x-if="isCompleted(bp.id)">
              <div class="status-check">✓</div>
            </template>
          </div>
          <div class="blueprint-footer">
            <span class="blueprint-name" x-text="$store.game.t(bp.id, 'actions').title"></span>
          </div>
        </button>
      </template>
    </div>

    <div x-show="getConstructionItems().length === 0" class="vault-placeholder-box">
      <p x-text="$store.game.t('ui_empty_category')">Noch keine Baupläne in dieser Kategorie freigeschaltet.</p>
    </div>
  </div>
</div>
