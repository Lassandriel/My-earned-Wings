<!-- CHRONICLE VIEW -->
<div x-show="$store.game.view === 'collection'" class="view-content-story">
  <div class="category-header">
    <h3 x-text="$store.game.t('nav_story_tab_header')"></h3>
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.setHovered('help', { id: 'help', isHelp: true, title: $store.game.t('nav_story_tab_header'), desc: $store.game.t('nav_collection_desc') })"
      @mouseleave="$store.game.setHovered(null)"
    >
      ?
    </div>
  </div>

  <div class="story-archive-layout" x-show="$store.game.collectionHistory.length > 0 || $store.game.flags['unlocked-library']">
    <!-- Sidebar: NPC List -->
    <div class="story-archive-sidebar">
      <div
        class="npc-archive-tab"
        :class="$store.game.selectedStoryNpc === 'world' ? 'active' : ''"
        @click="$store.game.selectedStoryNpc = 'world'; $store.game.playSound('click')"
        x-show="$store.game.collectionHistory.some(e => !e.npcId || e.npcId === 'world')"
      >
        <span class="npc-archive-icon">📜</span>
        <span class="npc-archive-name" x-text="$store.game.t('cat_collection_world')"></span>
      </div>

      <div
        class="npc-archive-tab library-tab"
        :class="$store.game.selectedStoryNpc === 'library' ? 'active' : ''"
        @click="$store.game.selectedStoryNpc = 'library'; $store.game.playSound('click')"
        x-show="$store.game.flags['unlocked-library']"
      >
        <span class="npc-archive-icon">📚</span>
        <span class="npc-archive-name" x-text="$store.game.t('ui_library')"></span>
      </div>

      <template x-for="npcId in $store.game.unlockedNPCs" :key="npcId">
        <div
          class="npc-archive-tab"
          :class="$store.game.selectedStoryNpc === npcId ? 'active' : ''"
          @click="$store.game.selectedStoryNpc = npcId; $store.game.playSound('click')"
          x-show="$store.game.collectionHistory.some(e => e.npcId === npcId)"
        >
          <span
            class="npc-archive-icon"
            x-text="$store.game.content.get(npcId, 'npcs').icon"
          ></span>
          <span
            class="npc-archive-name"
            x-text="$store.game.t($store.game.content.get(npcId, 'npcs').nameKey)"
          ></span>
        </div>
      </template>
    </div>

    <!-- Main Content: Dialogue Log -->
    <div class="story-archive-content">
      <div class="archive-scroll-container">
        <template
          x-for="entry in $store.game.collectionHistory.filter(e => (e.npcId || 'world') === $store.game.selectedStoryNpc)"
          :key="entry.timestamp"
        >
          <div class="archive-entry card-premium m-sm p-sm" x-transition:enter="view-enter">
            <div class="archive-entry-header">
              <span class="archive-entry-chapter" x-text="$store.game.t(entry.chapter)"></span>
              <span
                class="archive-entry-time"
                x-text="new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })"
              ></span>
            </div>
            <div class="archive-entry-body">
              <div class="archive-entry-text" x-html="$store.game.language && (entry.textKey ? $store.game.t(entry.textKey, entry.context || 'npcs') : '')"></div>
            </div>
          </div>
        </template>
      </div>

      <!-- LIBRARY CONTENT -->
      <div 
        class="library-books-container p-lg" 
        x-show="$store.game.selectedStoryNpc === 'library'" 
        x-transition
        x-data="{
          getLoreActions() {
            return Object.keys($store.game.content.registries.actions)
              .filter(id => $store.game.content.get(id, 'actions').category === 'lore')
              .sort((a, b) => a.includes('read') ? -1 : 1);
          },
          getDisplayName(id) {
             const act = $store.game.content.get(id, 'actions');
             const itemId = id.replace('act-read-lore-', 'item-book_lore_');
             const item = $store.game.content.get(itemId, 'items', true);
             const isBook = id.startsWith('act-read-lore-');
             return (isBook && item && !item.id.includes('act-')) ? $store.game.t(item.title, 'items') : ($store.game.t(id, 'actions').title || id);
          },
          getDisplayDesc(id) {
             const act = $store.game.content.get(id, 'actions');
             const itemId = id.replace('act-read-lore-', 'item-book_lore_');
             const item = $store.game.content.get(itemId, 'items', true);
             const isBook = id.startsWith('act-read-lore-');
             return (isBook && item && !item.id.includes('act-')) ? $store.game.t(item.desc, 'items') : ($store.game.t(id, 'actions').desc || '');
          }
        }"
      >
        <template x-for="bookId in getLoreActions()" :key="bookId">
          <div class="library-book-card card-premium p-md m-b-lg" x-show="$store.game.unlockedRecipes.includes(bookId)">
            <div class="book-info-row">
              <div class="book-visual">
                 <span class="book-icon" x-text="$store.game.content.get(bookId, 'actions').icon"></span>
              </div>
              <div class="book-details">
                <h4 class="text-gold" x-text="getDisplayName(bookId)"></h4>
                <p class="text-dim m-b-sm" x-text="getDisplayDesc(bookId)"></p>
                
                <!-- Progress Bar (Only for Stepped Actions) -->
                <div class="book-progress-wrapper" x-show="$store.game.content.get(bookId, 'actions').steps">
                  <div class="book-progress-bar">
                    <div 
                      class="book-progress-fill" 
                      :style="'width: ' + (($store.game.npcProgress[$store.game.content.get(bookId, 'actions').progKey || bookId] || 0) / ($store.game.content.get(bookId, 'actions').maxProgress || 10) * 100) + '%'"
                    ></div>
                  </div>
                  <span class="book-progress-text" x-text="($store.game.npcProgress[$store.game.content.get(bookId, 'actions').progKey || bookId] || 0) + ' / ' + ($store.game.content.get(bookId, 'actions').maxProgress || 10)"></span>
                </div>
              </div>
            </div>
            
            <div class="book-actions m-t-md">
              <button 
                class="btn-premium"
                :disabled="($store.game.content.get(bookId, 'actions').steps && ($store.game.npcProgress[$store.game.content.get(bookId, 'actions').progKey || bookId] || 0) >= ($store.game.content.get(bookId, 'actions').maxProgress || 10)) || $store.game.activeTasks[bookId]"
                @click="$store.game.attemptAction($el, bookId)"
                @mouseenter="$store.game.setHovered(bookId)"
                @mouseleave="$store.game.setHovered(null)"
              >
                <template x-if="$store.game.content.get(bookId, 'actions').steps">
                  <span>
                    <span x-show="($store.game.npcProgress[$store.game.content.get(bookId, 'actions').progKey || bookId] || 0) < ($store.game.content.get(bookId, 'actions').maxProgress || 10)" x-text="$store.game.t('ui_read')"></span>
                    <span x-show="($store.game.npcProgress[$store.game.content.get(bookId, 'actions').progKey || bookId] || 0) >= ($store.game.content.get(bookId, 'actions').maxProgress || 10)">✓</span>
                  </span>
                </template>
                <template x-if="!$store.game.content.get(bookId, 'actions').steps">
                  <span x-text="$store.game.t(bookId, 'actions').title"></span>
                </template>
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Empty State View -->
  <div class="empty-story-splash panel-premium flex-center m-lg" x-show="$store.game.collectionHistory.length === 0" x-transition>
    <div class="splash-inner">
      <div class="splash-icon">📜</div>
      <h4 class="text-gold" x-text="$store.game.t('ui_collection_empty_title')"></h4>
      <p class="text-dim" x-text="$store.game.t('ui_empty_collection')"></p>
    </div>
  </div>
</div>
