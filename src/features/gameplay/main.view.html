<!-- GAMEPLAY VIEW - REFACTORED 3.1 -->
<div 
  x-show="$store.game.view === 'main'" 
  class="view-content-gameplay"
  x-data="{
    // Helper to check if an action should be shown
    canShow(id) {
      const act = $store.game.content.get(id, 'actions');
      if (!act) return false;
      return !act.requirements || Object.entries(act.requirements).every(([p, r]) => $store.game.actions.checkRequirement($store.game, p, r));
    },
    // Filter actions by category and custom rules
    getActions(category, customFilter = null) {
      return Object.keys($store.game.content.registries.actions)
        .filter(id => {
          const act = $store.game.content.get(id, 'actions');
          if (act.category !== category) return false;
          return customFilter ? customFilter(act, id) : true;
        });
    },
    // ─── Sub-tab + section logic ───────────────────────────────
    // The Main view ships an 'Allgemein' sub-tab (everything that
    // existed before) plus dynamic sub-tabs driven by the `sections`
    // registry. Base game's only dynamic sub-tab right now is
    // 'herstellen' (Kitchen lives there); addons add their own
    // sections to existing sub-tabs without touching this file.
    /** All section defs that target a given sub-tab. */
    getSectionsForSubTab(subTab) {
      const reg = $store.game.content?.registries?.sections || {};
      return Object.values(reg).filter((sec) => sec && sec.subTab === subTab);
    },
    /** Section is 'visible' if its requiresFlag isn't set or is currently true. */
    sectionIsActive(sec) {
      return !sec.requiresFlag || !!$store.game.flags[sec.requiresFlag];
    },
    /** True if the player has been taught this recipe (or it's
     *  category content that doesn't require explicit teaching —
     *  base kitchen recipes show as soon as the kitchen is built,
     *  no unlockedRecipes gate). Workshop recipes go through Pamle. */
    recipeAvailable(sec, actionId) {
      // Workshop pattern: hide recipes the player hasn't been taught
      // yet, even though the section is visible. Detect by whether
      // the recipe is on the unlockedRecipes list at all — if not
      // and the action is a category that gates by teaching
      // (vandara_workshop), hide. Other categories show unconditionally.
      if (sec.actionCategory === 'vandara_workshop') {
        return $store.game.unlockedRecipes && $store.game.unlockedRecipes.includes(actionId);
      }
      return true;
    },
    /** Recipe is greyed (visible but unclickable) when the section
     *  declares a placement requirement and the item isn't placed.
     *  Keeps the cost tooltip working so the player can still see
     *  what they'd need — they just can't fire the brew. */
    recipeIsLocked(sec, actionId) {
      if (sec.recipeLockedUnlessPlaced) {
        const placed = $store.game.placedItems || [];
        if (!placed.includes(sec.recipeLockedUnlessPlaced)) return true;
      }
      return false;
    },
    /** Sub-tab has content right now? Drives the sub-tab strip's
     *  visibility (mirrors the Orte hide-when-only-one pattern). */
    subTabHasContent(subTab) {
      return this.getSectionsForSubTab(subTab).some((sec) => this.sectionIsActive(sec));
    },
    get hasHerstellenContent() { return this.subTabHasContent('herstellen'); },
    get showMainSubTabs() { return this.hasHerstellenContent; },
    // Keep currentMainSubTab pointing at something visible. If
    // 'herstellen' is the active tab but its content goes away
    // (e.g. addon removed), fall back to 'general'.
    syncMainSubTab() {
      if ($store.game.currentMainSubTab === 'herstellen' && !this.hasHerstellenContent) {
        $store.game.currentMainSubTab = 'general';
      }
    },
  }"
  x-effect="syncMainSubTab()"
>
  <!-- Primary Stats Actions -->
  <!-- ID list mirrors PRIMARY_ACTIONS in src/core/constants.ts. If you change
       one place, change the other so F1/F2/F3 hotkeys keep matching the buttons. -->
  <nav class="primary-actions-bar">
    <template x-for="id in ['act-rest', 'act-meditate', 'act-eat']" :key="id">
      <button
        class="game-btn primary-btn"
        :class="{
          'primary-energy': id === 'act-rest',
          'primary-magic': id === 'act-meditate',
          'primary-satiation': id === 'act-eat'
        }"
        @click="$store.game.commands.enqueue({ type: 'attemptAction', actionId: id, element: $el })"
        @mouseover="$store.game.setHovered(id)"
        @mouseout="$store.game.setHovered(null)"
      >
        <span x-text="$store.game.t(id, 'actions').title"></span>
        <span class="key-tag" x-text="id === 'act-rest' ? 'F1' : (id === 'act-meditate' ? 'F2' : 'F3')"></span>
      </button>
    </template>
  </nav>

  <!-- Sub-tab strip — hidden until a non-default sub-tab has any
       content (no "Herstellen" before the kitchen is built etc.). -->
  <nav class="location-tabs-bar" x-show="showMainSubTabs">
    <button
      class="location-tab-btn"
      :class="{ 'is-active': $store.game.currentMainSubTab === 'general' }"
      @click="$store.game.currentMainSubTab = 'general'; $store.game.playSound('click')"
      x-text="$store.game.t('main_subtab_general_name')"
    ></button>
    <button
      class="location-tab-btn"
      x-show="hasHerstellenContent"
      :class="{ 'is-active': $store.game.currentMainSubTab === 'herstellen' }"
      @click="$store.game.currentMainSubTab = 'herstellen'; $store.game.playSound('click')"
      x-text="$store.game.t('main_subtab_herstellen_name')"
    ></button>
  </nav>

  <!-- ─── HERSTELLEN sub-tab: production stations ──────────────
       Sections are pure data: each entry in the `sections` registry
       with `subTab: herstellen` becomes a card-list. Base ships
       Kitchen; addons (Vandara) ship Workshop. Base never references
       a specific addon — just iterates whatever sections are loaded.

       Sections may carry `recipeLockedUnlessPlaced: <itemId>`. When
       set, recipe buttons stay visible but `is-locked` (greyed,
       unclickable) until the referenced furniture is placed in a
       home. Recipes the player hasn't been taught (recipe id not in
       unlockedRecipes) are hidden, not greyed — keeps the discovery
       moment intact when an NPC teaches them. -->
  <div x-show="$store.game.currentMainSubTab === 'herstellen'" class="action-container">
    <div class="action-column">
      <template x-for="sec in getSectionsForSubTab('herstellen')" :key="sec.id">
        <section class="action-group"
          x-show="!sec.requiresFlag || $store.game.flags[sec.requiresFlag]" x-collapse>
          <header class="category-header">
            <h3 x-text="$store.game.t(sec.headerLabel)"></h3>
            <div class="nav-help-icon"
              x-show="sec.helpTitleKey"
              @mouseenter="sec.helpTitleKey && $store.game.helpHover(sec.helpTitleKey, sec.helpDescKey || sec.helpTitleKey)"
              @mouseleave="$store.game.setHovered(null)">?</div>
          </header>
          <div class="btn-list">
            <template x-for="actionId in getActions(sec.actionCategory)" :key="actionId">
              <button
                x-show="recipeAvailable(sec, actionId)"
                class="game-btn action-btn-modular"
                :class="{
                  'is-working': $store.game.isTaskActive(actionId),
                  'is-locked': recipeIsLocked(sec, actionId)
                }"
                :disabled="recipeIsLocked(sec, actionId)"
                @click="!recipeIsLocked(sec, actionId) && $store.game.commands.enqueue({ type: 'attemptAction', actionId: actionId, element: $el })"
                @mouseover="$store.game.setHovered(actionId)"
                @mouseout="$store.game.setHovered(null)"
              >
                <span x-text="$store.game.ui.renderActionTitle($store.game, actionId)"></span>
                <div x-show="$store.game.activeTasks[actionId]" class="btn-progress-container">
                  <div class="btn-progress-fill" :style="'width: ' + $store.game.ui.getTaskProgress($store.game, actionId) + '%'"></div>
                </div>
              </button>
            </template>
          </div>
        </section>
      </template>
    </div>
  </div>

  <!-- ─── ALLGEMEIN sub-tab (default): everything else ───────── -->
  <div x-show="$store.game.currentMainSubTab === 'general'" class="action-container">
    <!-- LEFT COLUMN: GATHERING & WORK -->
    <div class="action-column">
      <!-- Gathering Section -->
      <section class="action-group">
        <header class="category-header">
          <h3 x-text="$store.game.t('cat_gather')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.helpHover('cat_gather', 'nav_gather_desc')" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>

        <template x-for="loc in $store.game.ui.getAvailableLocations($store.game)" :key="loc">
          <div class="location-group" x-data="{ expanded: true }">
            <h4 class="location-heading" @click="expanded = !expanded" style="cursor: pointer;">
              <span class="expand-icon" :class="expanded && 'expanded'">▶</span>
              <span x-text="$store.game.t('loc_' + loc)"></span>
            </h4>
            <div class="btn-list-inner" x-show="expanded" x-collapse>
              <template x-for="action in $store.game.ui.getGatheringActions($store.game).filter(a => a.locationId === loc)" :key="action.id">
                <button
                  x-show="canShow(action.id)"
                  class="game-btn action-btn-modular"
                  :class="action.costType === 'magic' && 'primary-magic'"
                  @click="$store.game.commands.enqueue({ type: 'attemptAction', actionId: action.id, element: $el })"
                  @mouseover="$store.game.setHovered(action.id)"
                  @mouseout="$store.game.setHovered(null)"
                >
                  <span x-text="$store.game.ui.renderActionTitle($store.game, action.id)"></span>
                  
                  <!-- Focus Toggle -->
                  <div
                    class="focus-toggle-btn"
                    x-show="$store.game.flags['ability-arcane-focus'] && action.isLoopable"
                    :class="$store.game.activeFocus === action.id && 'is-focused'"
                    @click.stop="$store.game.commands.enqueue({ type: 'toggleFocus', actionId: action.id })"
                  >✨</div>
                </button>
              </template>
            </div>
          </div>
        </template>
      </section>

      <!-- Work Section -->
      <section class="action-group" x-show="$store.game.flags['unlocked-work']" x-transition>
        <header class="category-header">
          <h3 x-text="$store.game.t('cat_work')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.helpHover('cat_work', 'nav_work_desc')" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="location-group" x-data="{ expanded: true }">
          <h4 class="location-heading" @click="expanded = !expanded" style="cursor: pointer;">
            <span class="expand-icon" :class="expanded && 'expanded'">▶</span>
            <span x-text="$store.game.t('loc_village')"></span>
          </h4>
          <div class="btn-list-inner" x-show="expanded" x-collapse>
            <button
              class="game-btn action-btn-modular"
              @click="$store.game.commands.enqueue({ type: 'attemptAction', actionId: 'act-work', element: $el })"
              @mouseover="$store.game.setHovered('act-work')"
              @mouseout="$store.game.setHovered(null)"
            >
              <span x-text="$store.game.t('act-work', 'actions').title"></span>
              <div class="focus-toggle-btn" x-show="$store.game.flags['ability-arcane-focus']" :class="$store.game.activeFocus === 'act-work' && 'is-focused'" @click.stop="$store.game.commands.enqueue({ type: 'toggleFocus', actionId: 'act-work' })">✨</div>
            </button>
          </div>
        </div>
      </section>
    </div>

    <div class="vertical-divider"></div>

    <!-- RIGHT COLUMN: ADVANCED FACILITIES -->
    <div class="action-column">

      <!-- (Kitchen moved to the Herstellen sub-tab above.) -->

      <!-- MAGIC -->
      <section class="action-group" x-show="$store.game.unlockedRecipes.includes('act-dream-bloom')" x-collapse>
        <header class="category-header">
          <h3 x-text="$store.game.t('cat_magic')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.helpHover('cat_magic', 'help_magic_desc')" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="btn-list">
          <template x-for="actionId in getActions('magic', (a) => a.id !== 'act-meditate-sanctum' && a.id !== 'act-spell-harvest')" :key="actionId">
            <button class="game-btn primary-magic" @click="$store.game.commands.enqueue({ type: 'attemptAction', actionId: actionId, element: $el })" @mouseover="$store.game.setHovered(actionId)" @mouseout="$store.game.setHovered(null)" x-text="$store.game.t(actionId, 'actions').title"></button>
          </template>
          
          <!-- Long-running Magic Actions -->
          <template x-for="actionId in ['act-meditate-sanctum', 'act-spell-harvest']" :key="actionId">
            <button
              x-show="actionId === 'act-meditate-sanctum' ? $store.game.flags['build-arcane-sanctum'] : true"
              class="game-btn primary-magic action-btn-modular"
              :class="$store.game.isTaskActive(actionId) && 'is-working'"
              @click="$store.game.commands.enqueue({ type: 'attemptAction', actionId: actionId, element: $el })"
              @mouseover="$store.game.setHovered(actionId)"
              @mouseout="$store.game.setHovered(null)"
            >
              <span x-text="$store.game.ui.renderActionTitle($store.game, actionId)"></span>
              <div x-show="$store.game.activeTasks[actionId]" class="btn-progress-container">
                <div class="btn-progress-fill" :style="'width: ' + $store.game.ui.getTaskProgress($store.game, actionId) + '%'"></div>
              </div>
            </button>
          </template>
        </div>
      </section>

      <!-- LIBRARY / LORE (Quick Access) -->
      <section class="action-group" x-show="$store.game.flags['unlocked-library']" x-collapse>
        <header class="category-header">
          <h3 x-text="$store.game.t('ui_library')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.helpHover('ui_library', 'help_library_desc')" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="location-group" x-data="{ expanded: true }">
          <h4 class="location-heading" @click="expanded = !expanded" style="cursor: pointer;">
            <span class="expand-icon" :class="expanded && 'expanded'">▶</span>
            <span x-text="$store.game.t('loc_library')"></span>
          </h4>
          <div class="btn-list-inner" x-show="expanded" x-collapse>
            <template x-for="actionId in getActions('lore')" :key="actionId">
              <button
                x-show="$store.game.unlockedRecipes.includes(actionId) && (($store.game.npcProgress[$store.game.content.get(actionId, 'actions').progKey || actionId] || 0) < ($store.game.content.get(actionId, 'actions').maxProgress || 10))"
                class="game-btn action-btn-modular"
                :class="$store.game.isTaskActive(actionId) && 'is-working'"
                @click="$store.game.commands.enqueue({ type: 'attemptAction', actionId: actionId, element: $el })"
                @mouseover="$store.game.setHovered(actionId)"
                @mouseout="$store.game.setHovered(null)"
              >
                <span x-text="$store.game.ui.renderActionTitle($store.game, actionId)"></span>
                <div x-show="$store.game.activeTasks[actionId]" class="btn-progress-container">
                  <div class="btn-progress-fill" :style="'width: ' + $store.game.ui.getTaskProgress($store.game, actionId) + '%'"></div>
                </div>
              </button>
            </template>
          </div>
        </div>
      </section>

      <!-- GARDEN -->
      <section class="action-group" x-show="$store.game.flags['build-garden']" x-collapse>
        <header class="category-header">
          <h3 x-text="$store.game.t('ui_tab_garden')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.helpHover('ui_tab_garden', 'help_garden_desc')" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="btn-list">
          <template x-for="actionId in getActions('garden_task')" :key="actionId">
            <button
              x-show="canShow(actionId)"
              class="game-btn action-btn-modular"
              :class="$store.game.isTaskActive(actionId) && 'is-working'"
              @click="$store.game.commands.enqueue({ type: 'attemptAction', actionId: actionId, element: $el })"
              @mouseover="$store.game.setHovered(actionId)"
              @mouseout="$store.game.setHovered(null)"
            >
              <span x-text="$store.game.ui.renderActionTitle($store.game, actionId)"></span>
              <div x-show="$store.game.activeTasks[actionId]" class="btn-progress-container">
                <div class="btn-progress-fill" :style="'width: ' + $store.game.ui.getTaskProgress($store.game, actionId) + '%'"></div>
              </div>
              <div
                class="focus-toggle-btn"
                x-show="$store.game.flags['ability-arcane-focus'] && $store.game.content.get(actionId, 'actions').isLoopable"
                :class="$store.game.activeFocus === actionId && 'is-focused'"
                @click.stop="$store.game.commands.enqueue({ type: 'toggleFocus', actionId: actionId })"
              >✨</div>
            </button>
          </template>
        </div>
      </section>

    </div>
  </div>
</div>
