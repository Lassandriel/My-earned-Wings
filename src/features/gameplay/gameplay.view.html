<!-- GAMEPLAY VIEW - REFACTORED 3.1 -->
<div 
  x-show="$store.game.view === 'gameplay'" 
  class="view-content-gameplay"
  x-data="{
    // Helper to check if an action should be shown
    canShow(id) {
      const act = $store.game.content.get(id, 'actions');
      if (!act) return false;
      return !act.requirements || Object.entries(act.requirements).every(([p, r]) => $store.game.actions.checkRequirement($store.game, p, r));
    },
    // Filter actions by category and custom rules
    getActions(category, customFilter = null) {
      return Object.keys($store.game.content.registries.actions)
        .filter(id => {
          const act = $store.game.content.get(id, 'actions');
          if (act.category !== category) return false;
          return customFilter ? customFilter(act, id) : true;
        });
    }
  }"
>
  <!-- Primary Stats Actions -->
  <nav class="primary-actions-bar">
    <template x-for="id in ['act-ausruhen', 'act-meditieren', 'act-essen']" :key="id">
      <button
        class="game-btn primary-btn"
        :class="{
          'primary-energy': id === 'act-ausruhen',
          'primary-magic': id === 'act-meditieren',
          'primary-satiation': id === 'act-essen'
        }"
        @click="$store.game.attemptAction($el, id)"
        @mouseover="$store.game.setHovered(id)"
        @mouseout="$store.game.setHovered(null)"
      >
        <span x-text="$store.game.t(id, 'actions').title"></span>
        <span class="key-tag" x-text="id === 'act-ausruhen' ? '1' : (id === 'act-meditieren' ? '2' : '3')"></span>
      </button>
    </template>
  </nav>

  <div class="action-container">
    <!-- LEFT COLUMN: GATHERING & WORK -->
    <div class="action-column">
      <!-- Gathering Section -->
      <section class="action-group">
        <header class="category-header">
          <h3 x-text="$store.game.t('cat_gather')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_gather'), desc: $store.game.t('nav_gather_desc') })" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>

        <template x-for="loc in $store.game.ui.getAvailableLocations($store.game)" :key="loc">
          <div class="location-group">
            <h4 class="location-heading" x-text="$store.game.t('loc_' + loc)"></h4>
            <div class="btn-list-inner">
              <template x-for="action in $store.game.ui.getGatheringActions($store.game).filter(a => a.locationId === loc)" :key="action.id">
                <button
                  x-show="canShow(action.id)"
                  class="game-btn action-btn-modular"
                  :class="action.costType === 'magic' && 'primary-magic'"
                  @click="$store.game.attemptAction($el, action.id)"
                  @mouseover="$store.game.setHovered(action.id)"
                  @mouseout="$store.game.setHovered(null)"
                >
                  <span x-text="$store.game.ui.renderActionTitle($store.game, action.id)"></span>
                  
                  <!-- Focus Toggle -->
                  <div
                    class="focus-toggle-btn"
                    x-show="$store.game.flags['ability-arcane-focus'] && action.isLoopable"
                    :class="$store.game.activeFocus === action.id && 'is-focused'"
                    @click.stop="$store.game.toggleFocus(action.id)"
                  >✨</div>
                </button>
              </template>
            </div>
          </div>
        </template>
      </section>

      <!-- Work Section -->
      <section class="action-group" x-show="$store.game.flags['unlocked-work']" x-transition>
        <header class="category-header">
          <h3 x-text="$store.game.t('cat_work')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_work'), desc: $store.game.t('nav_work_desc') })" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="btn-list">
          <button
            class="game-btn action-btn-modular"
            @click="$store.game.attemptAction($el, 'act-work')"
            @mouseover="$store.game.setHovered('act-work')"
            @mouseout="$store.game.setHovered(null)"
          >
            <span x-text="$store.game.t('act-work', 'actions').title"></span>
            <div class="focus-toggle-btn" x-show="$store.game.flags['ability-arcane-focus']" :class="$store.game.activeFocus === 'act-work' && 'is-focused'" @click.stop="$store.game.toggleFocus('act-work')">✨</div>
          </button>
        </div>
      </section>
    </div>

    <div class="vertical-divider"></div>

    <!-- RIGHT COLUMN: ADVANCED FACILITIES -->
    <div class="action-column">
      
      <!-- KITCHEN -->
      <section class="action-group" x-show="$store.game.flags['build-kitchen']" x-collapse>
        <header class="category-header">
          <h3 x-text="$store.game.t('ui_tab_kitchen')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('ui_tab_kitchen'), desc: $store.game.t('help_kitchen_desc') })" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="btn-list">
          <template x-for="actionId in getActions('kitchen')" :key="actionId">
            <button
              class="game-btn action-btn-modular"
              :class="$store.game.isTaskActive(actionId) && 'is-working'"
              @click="$store.game.attemptAction($el, actionId)"
              @mouseover="$store.game.setHovered(actionId)"
              @mouseout="$store.game.setHovered(null)"
            >
              <span x-text="$store.game.t(actionId, 'actions').title"></span>
              <div x-show="$store.game.activeTasks[actionId]" class="btn-progress-container">
                <div class="btn-progress-fill" :style="'width: ' + $store.game.ui.getTaskProgress($store.game, actionId) + '%'"></div>
              </div>
            </button>
          </template>
        </div>
      </section>

      <!-- MAGIC -->
      <section class="action-group" x-show="$store.game.unlockedRecipes.includes('act-dream-bloom')" x-collapse>
        <header class="category-header">
          <h3 x-text="$store.game.t('cat_magic')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('cat_magic'), desc: $store.game.t('help_magic_desc') })" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="btn-list">
          <template x-for="actionId in getActions('magic', (a) => a.id !== 'act-meditate' && a.id !== 'act-spell-harvest')" :key="actionId">
            <button class="game-btn primary-magic" @click="$store.game.attemptAction($el, actionId)" @mouseover="$store.game.setHovered(actionId)" @mouseout="$store.game.setHovered(null)" x-text="$store.game.t(actionId, 'actions').title"></button>
          </template>
          
          <!-- Long-running Magic Actions -->
          <template x-for="actionId in ['act-meditate', 'act-spell-harvest']" :key="actionId">
            <button
              x-show="actionId === 'act-meditate' ? $store.game.flags['build-arcane-sanctum'] : true"
              class="game-btn primary-magic action-btn-modular"
              :class="$store.game.isTaskActive(actionId) && 'is-working'"
              @click="$store.game.attemptAction($el, actionId)"
              @mouseover="$store.game.setHovered(actionId)"
              @mouseout="$store.game.setHovered(null)"
            >
              <span x-text="$store.game.t(actionId, 'actions').title"></span>
              <div x-show="$store.game.activeTasks[actionId]" class="btn-progress-container">
                <div class="btn-progress-fill" :style="'width: ' + $store.game.ui.getTaskProgress($store.game, actionId) + '%'"></div>
              </div>
            </button>
          </template>
        </div>
      </section>

      <!-- GARDEN -->
      <section class="action-group" x-show="$store.game.flags['build-garden']" x-collapse>
        <header class="category-header">
          <h3 x-text="$store.game.t('ui_tab_garden')"></h3>
          <div class="nav-help-icon" @mouseenter="$store.game.setHovered('help', { isHelp: true, title: $store.game.t('ui_tab_garden'), desc: $store.game.t('help_garden_desc') })" @mouseleave="$store.game.setHovered(null)">?</div>
        </header>
        <div class="btn-list">
          <template x-for="actionId in getActions('garden_task')" :key="actionId">
            <button
              x-show="canShow(actionId)"
              class="game-btn action-btn-modular"
              :class="$store.game.isTaskActive(actionId) && 'is-working'"
              @click="$store.game.attemptAction($el, actionId)"
              @mouseover="$store.game.setHovered(actionId)"
              @mouseout="$store.game.setHovered(null)"
            >
              <span x-text="$store.game.t(actionId, 'actions').title"></span>
              <div x-show="$store.game.activeTasks[actionId]" class="btn-progress-container">
                <div class="btn-progress-fill" :style="'width: ' + $store.game.ui.getTaskProgress($store.game, actionId) + '%'"></div>
              </div>
              <div
                class="focus-toggle-btn"
                x-show="$store.game.flags['ability-arcane-focus'] && $store.game.content.get(actionId, 'actions').isLoopable"
                :class="$store.game.activeFocus === actionId && 'is-focused'"
                @click.stop="$store.game.toggleFocus(actionId)"
              >✨</div>
            </button>
          </template>
        </div>
      </section>

      <!-- STUDY -->
      <section class="action-group" x-show="$store.game.flags['item-book-knowledge']" x-collapse>
        <div class="btn-list">
          <button class="game-btn" @click="$store.game.executeAction('act-study')" @mouseover="$store.game.setHovered('act-study')" @mouseout="$store.game.setHovered(null)">
            <span x-text="$store.game.t('act-study', 'actions').title"></span>
          </button>
        </div>
      </section>
    </div>
  </div>
</div>
