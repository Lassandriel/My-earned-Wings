<!-- HOUSING VIEW - Dedicated Home Management -->
<div
  x-show="$store.game.view === 'housing'"
  class="game-view-content"
>
  <div class="category-header">
    <h3 x-text="$store.game.t('nav_housing')"></h3>
    <div
      class="nav-help-icon"
      @mouseenter="$store.game.helpHover('nav_housing', 'nav_housing_desc')"
      @mouseleave="$store.game.setHovered(null)"
    >
      ?
    </div>
  </div>

  <!-- ACTIVE HOME PANEL -->
  <template x-if="$store.game.activeHome">
    <div class="active-home-panel-wrapper">
      <div class="active-home-card panel-premium" x-transition>
        <div class="home-visual">
          <img
            :src="$store.game.content.get($store.game.activeHome, 'homes')?.image"
            :alt="$store.game.t($store.game.content.get($store.game.activeHome, 'homes')?.nameKey)"
            class="home-img"
            loading="lazy"
          />
          <div class="home-overlay-glow"></div>
        </div>
        <div class="home-details">
          <div class="home-header">
            <span class="home-badge" x-text="$store.game.t('ui_home')"></span>
            <h4
              x-text="$store.game.t($store.game.content.get($store.game.activeHome, 'homes')?.nameKey)"
            ></h4>
          </div>
          <p
            class="home-flavor"
            x-text="$store.game.t($store.game.content.get($store.game.activeHome, 'homes')?.descKey)"
          ></p>

          <div class="home-stats-row">
            <div class="home-stat-item">
              <span class="stat-label" x-text="$store.game.t('ui_furniture_space')"></span>
              <div class="space-progress-bar">
                <div
                  class="space-fill"
                  :style="`width: ${Math.min(100, ($store.game.getUsedFurnitureSpace() / $store.game.getHomeCapacity()) * 100)}%`"
                  :class="$store.game.getUsedFurnitureSpace() > $store.game.getHomeCapacity() ? 'space-overload' : ''"
                ></div>
              </div>
              <span class="stat-numeric">
                <span x-text="$store.game.getUsedFurnitureSpace()"></span> /
                <span x-text="$store.game.getHomeCapacity()"></span>
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- No Home Placeholder -->
  <template x-if="!$store.game.activeHome">
    <div class="housing-empty-notice panel-premium flex-center">
        <p class="text-dim" x-text="$store.game.t('ui_no_shelter')"></p>
    </div>
  </template>

  <!-- HOME SWITCHER: every owned home except the active one. Switching
       parks the current furniture loadout + perks and loads the target's. -->
  <template x-if="$store.game.ownedHomes && $store.game.ownedHomes.length > 1">
    <div class="home-switcher panel-premium">
      <div class="group-header m-xxs">
        <h4 x-text="$store.game.t('ui_switch_home')"></h4>
      </div>
      <div class="home-switcher-list">
        <template x-for="hid in $store.game.ownedHomes" :key="hid">
          <button
            class="home-switcher-item card-premium p-sm"
            x-show="hid !== $store.game.activeHome"
            @click="$store.game.switchHome(hid)"
            @mouseenter="$store.game.setHovered(hid)"
            @mouseleave="$store.game.setHovered(null)"
          >
            <span class="home-switcher-name" x-text="$store.game.t($store.game.content.get(hid, 'homes')?.nameKey)"></span>
            <span class="home-switcher-cap" x-text="($store.game.content.get(hid, 'homes')?.capacity ?? 0) + ' ' + $store.game.t('ui_furniture_space')"></span>
          </button>
        </template>
      </div>
    </div>
  </template>

  <!-- Furniture Management UI -->
  <template x-if="$store.game.activeHome">
    <div class="housing-management-container">
      <!-- Placed Furniture -->
      <div class="furniture-group panel-premium">
        <div class="group-header m-xxs">
           <h4 class="text-gradient-teal" x-text="$store.game.t('ui_placed_furniture')"></h4>
        </div>
        <div class="furniture-list">
           <template x-for="id in $store.game.placedFurnitureList" :key="id">
             <div class="furniture-list-item card-premium p-sm" @mouseenter="$store.game.setHovered(id)" @mouseleave="$store.game.setHovered(null)" @click="$store.game.toggleFurniture(id)">
                <div class="furn-info">
                  <span class="furn-name" x-text="$store.game.t($store.game.content.get(id, 'items')?.title, 'items')"></span>
                </div>
                <button class="furn-btn remove">
                   <span x-text="$store.game.t('ui_remove')"></span>
                </button>
             </div>
           </template>
           <template x-if="$store.game.placedFurnitureList.length === 0">
             <div class="empty-state-info" x-text="$store.game.t('ui_no_furniture_placed')"></div>
           </template>
        </div>
      </div>

      <!-- Storage / Available -->
      <div class="furniture-group panel-premium">
        <div class="group-header m-xxs">
           <h4 class="text-gradient-purple" x-text="$store.game.t('ui_stored_furniture')"></h4>
        </div>
        <div class="furniture-list">
           <template x-for="id in $store.game.availableFurniture" :key="id">
             <div class="furniture-list-item card-premium p-sm" @mouseenter="$store.game.setHovered(id)" @mouseleave="$store.game.setHovered(null)" @click="$store.game.toggleFurniture(id)">
                <div class="furn-info">
                  <span class="furn-name" x-text="$store.game.t($store.game.content.get(id, 'items')?.title, 'items')"></span>
                  <span class="furn-space" x-text="$store.game.content.get(id, 'items')?.spaceCost + ' ' + $store.game.t('ui_space_cost')"></span>
                </div>
                <button class="furn-btn">
                   <span x-text="$store.game.t('ui_place')"></span>
                </button>
             </div>
           </template>
           <template x-if="$store.game.availableFurniture.length === 0">
             <div class="empty-state-info" x-text="$store.game.t('ui_no_more_furniture')"></div>
           </template>
        </div>
      </div>
    </div>
  </template>
</div>
