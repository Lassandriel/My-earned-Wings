<!-- INVENTORY VIEW -->
<main x-show="$store.game.view === 'inventory'">
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_inventory')">Besitz</h3>
  </div>
  <p class="log-description" x-text="$store.game.t('inventory_desc')"></p>
  <div class="action-container" style="max-width: 600px; margin: 0 auto;">
    <div class="inventory-grid">
      <template x-for="id in $store.game.inventory" :key="id">
        <div 
          class="inventory-item" 
          :class="$store.game.selectedItem === id && 'active'"
          @click="$store.game.selectedItem = id; $store.game.playSound('click')"
        >
          <img :src="$store.game.itemDb[id]?.image || 'img/Placeholder_Item.webp'" :alt="id">
        </div>
      </template>
    </div>

    <!-- Item Details -->
    <template x-if="$store.game.selectedItem && $store.game.itemDb[$store.game.selectedItem]">
      <div class="item-details">
        <div class="item-header">
          <img :src="$store.game.itemDb[$store.game.selectedItem].image" alt="Icon">
          <div class="item-title" x-text="$store.game.itemDb[$store.game.selectedItem].title"></div>
        </div>
        <div class="item-desc" x-text="$store.game.itemDb[$store.game.selectedItem].desc"></div>
        
        <div class="item-actions" x-show="$store.game.itemDb[$store.game.selectedItem].consumable">
          <button class="game-btn btn-use" @click="$store.game.consumeItem($store.game.selectedItem)">
            <span x-text="$store.game.t('ui_use')">Benutzen</span>
          </button>
        </div>
      </div>
    </template>
    
    <div x-show="!$store.game.inventory.length" class="empty-state-grid">
      <template x-for="i in 12">
        <div class="inventory-item-placeholder"></div>
      </template>
      <p class="empty-state-notice" x-text="$store.game.t('ui_inventory_empty')"></p>
    </div>
  </div>
</main>
