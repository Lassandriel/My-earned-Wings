<!-- TRAITS VIEW -->
<main x-show="$store.game.view === 'traits'">
  <div class="category-header">
    <h3 x-text="$store.game.t('nav_traits_tab_header')">Titel & Traits</h3>
    <div class="nav-help-icon" 
         @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('nav_traits_tab_header'), desc: $store.game.t('nav_traits_desc') }"
         @mouseleave="$store.game.hoveredAction = null">?</div>
  </div>
  <p class="log-description" x-text="$store.game.t('traits_desc')"></p>
  <div class="story-chronicle-container">
    <div class="traits-grid">
      <template x-for="trait in Object.values($store.game.traitDb)" :key="trait.id">
        <div class="trait-card" :class="$store.game.unlockedTraits.includes(trait.id) ? 'trait-unlocked' : 'trait-locked'">
          <div class="trait-header">
            <span class="trait-icon" x-text="$store.game.unlockedTraits.includes(trait.id) ? '🌟' : '🔒'"></span>
            <span class="trait-title" x-text="$store.game.t(trait.id, 'traits').title"></span>
          </div>
          <p class="trait-desc" x-text="$store.game.t(trait.id, 'traits').desc"></p>
          <div class="trait-bonus-box">
            <span class="trait-bonus-label" x-text="$store.game.t('ui_bonus') || 'Bonus:'"></span>
            <span class="trait-bonus-val" x-text="$store.game.t(trait.id, 'traits').bonus"></span>
          </div>
          <!-- Progress Bar -->
          <div class="trait-progress-container">
              <div class="trait-progress-bar">
                  <div class="trait-progress-fill" :style="'width: ' + Math.min(100, (($store.game.counters[trait.counter] || 0) / trait.requirement) * 100) + '%'"></div>
              </div>
              <div class="trait-progress-text">
                  <span x-text="Math.floor($store.game.counters[trait.counter] || 0)"></span> / <span x-text="trait.requirement"></span>
              </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</main>
