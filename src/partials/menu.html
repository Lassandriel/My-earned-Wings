<!-- MAIN MENU VIEW -->
<section id="main-menu" x-show="$store.game.view === 'menu'" class="main-menu-overlay">
  <div class="menu-content">
    <div class="menu-logo-container">
      <img src="img/logo_wings.webp" alt="Wings Logo" class="menu-logo" />
      <h1 class="menu-title">Your earned Wings</h1>
      <div class="menu-subtitle">Der Boden ist nur der Anfang</div>
    </div>

    <div class="menu-actions">
      <button 
        class="menu-btn primary" 
        x-show="$store.game.hasSave"
        @click="$store.game.continueGame()"
      >
        <span class="btn-glow"></span>
        <span x-text="$store.game.t('menu_continue')">Fortfahren</span>
      </button>
      
      <button 
        class="menu-btn" 
        @click="$store.game.startNewGame()"
      >
        <span x-text="$store.game.t('menu_new_game')">Neues Spiel</span>
      </button>


      <button 
        class="menu-btn" 
        @click="$store.game.settingsOpen = true; $store.game.playSound('click')"
      >
        <span x-text="$store.game.t('settings_title')">Einstellungen</span>
      </button>

      <button 
        class="menu-btn quit" 
        @click="window.electronAPI?.quitApp()"
      >
        <span x-text="$store.game.t('btn_quit')">Beenden</span>
      </button>
    </div>
  </div>

  <div class="menu-footer">
    <span x-text="$store.game.t('menu_version')">v1.0.0</span>
  </div>
</section>
