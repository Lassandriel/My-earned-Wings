<!-- PROLOGUE VIEW -->
<section 
  id="prologue-view" 
  x-show="$store.game.view === 'prologue'" 
  class="prologue-overlay"
  @click="$store.game.prologue.advancePrologue($store.game)"
  style="cursor: pointer"
>
  <!-- Image Backgrounds -->
  <div class="prologue-images">
      <img src="img/prologue/LM_islands.webp" class="pro-img" :class="[1,2].includes($store.game.prologueStep) && 'active'" />
      <img src="img/prologue/LM_Luxana.webp" class="pro-img" :class="[3,4,5].includes($store.game.prologueStep) && 'active'" />
      <img src="img/prologue/LM_Dorf.webp" class="pro-img" :class="[6,7].includes($store.game.prologueStep) && 'active'" />
  </div>

  <div class="prologue-container">
    <div class="prologue-text" x-show="$store.game.prologueStep === 1" x-transition x-text="$store.game.t('intro_1', 'logs')"></div>
    <div class="prologue-text" x-show="$store.game.prologueStep === 2" x-transition x-text="$store.game.t('intro_2', 'logs')"></div>
    <div class="prologue-text" x-show="$store.game.prologueStep === 3" x-transition x-text="$store.game.t('intro_3', 'logs')"></div>
    <div class="prologue-text" x-show="$store.game.prologueStep === 4" x-transition x-text="$store.game.t('intro_4', 'logs')"></div>
    <div class="prologue-text" x-show="$store.game.prologueStep === 5" x-transition x-text="$store.game.t('intro_5', 'logs')"></div>
    <div class="prologue-text" x-show="$store.game.prologueStep === 6" x-transition x-text="$store.game.t('intro_6', 'logs')"></div>
    <div class="prologue-text" x-show="$store.game.prologueStep === 7" x-transition x-text="$store.game.t('intro_7', 'logs')"></div>
    
    <div class="prologue-advance-hint" x-show="$store.game.view === 'prologue'">
      Klicke um fortzufahren...
    </div>
  </div>
  
  <div class="prologue-footer">
      <div class="skip-hint">[ESC] zum Überspringen | [ENTER] zum Fortfahren</div>
      <button class="skip-btn" @click.stop="$store.game.prologue.skipPrologue($store.game)">
        Skip Intro <span>»</span>
      </button>
  </div>
</section>
