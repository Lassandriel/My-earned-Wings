<!-- FLOATING TOOLTIP (Senior Redesign) -->
<div
  class="floating-tooltip"
  x-show="$store.game.hoveredAction && !$store.game.settingsOpen && !$store.game.confirmModal.open"
  style="display: none"
  x-transition:enter="tt-enter"
  x-transition:enter-start="tt-enter-start"
  x-transition:enter-end="tt-enter-end"
>
  <!-- 1. Title -->
  <div class="tt-title" x-text="(() => {
    const h = $store.game.hoveredAction;
    if(!h) return '';
    if(h.isHelp) return h.title || '';
    if(h.isBuff) return h.title || '';
    const lang = $store.game.t(h.id, 'actions');
    let title = lang ? (lang.title || null) : null;

    // Fallback for NPC actions: Use NPC name if action title is missing
    if (!title && h.id.includes('npc-') && h.data) {
        const npc = $store.game.content.get(h.data.npcId, 'npcs');
        if (npc) title = $store.game.t(npc.nameKey);
    }
    
    title = title || h.id; // Final fallback to ID
    
    // NPC Progress in Title
    if (h.id.includes('npc-') && h.data) {
        const progKey = h.data.progKey;
        const currentProg = $store.game.npcProgress[progKey] || 0;
        title += ' (' + currentProg + '/' + h.data.maxProgress + ')';
    }
    return title;
  })()"></div>

  <!-- 2. Story / Flavor Text -->
  <div class="tt-story" x-text="(() => {
    const h = $store.game.hoveredAction;
    if(!h) return '';
    if(h.isHelp) return h.desc || '';
    if(h.isBuff) return h.desc || '';
    
    // Dynamic NPC Dialog Preview
    if (h.id.includes('npc-') && h.data) {
        const progKey = h.data.progKey;
        const currentProg = $store.game.npcProgress[progKey] || 0;
        if (currentProg < h.data.maxProgress) {
            const dialogKey = `npc_${progKey}_${currentProg + 1}`;
            const dialogText = $store.game.t(dialogKey, 'logs');
            if (dialogText && dialogText !== dialogKey) return dialogText;
        }
    }

    const lang = $store.game.t(h.id, 'actions');
    return lang ? (lang.desc || '') : '';
  })()"></div>

  <!-- 3. Costs Section (Action Only) -->
  <div class="tt-section" x-show="(() => {
    const h = $store.game.hoveredAction;
    if(!h || !h.data || h.isHelp) return false;
    const prog = h.id.includes('npc-') ? ($store.game.npcProgress[h.data.progKey] || 0) : null;
    const step = (prog !== null && h.data.steps) ? h.data.steps[prog] : null;
    return !!( (step && (step.costs || step.cost)) || h.data.costs || h.data.cost);
  })()">
    <div class="tt-section-header" x-text="'<< ' + $store.game.t('ui_salary') + ' >>'"></div>
    <div class="tt-cost-list">
      <template x-for="line in $store.game.getTooltipCosts($store.game.hoveredAction)" :key="line.label">
        <div class="tt-data-line" :class="line.affordable ? 'tt-ready' : 'tt-blocked'">
          <span x-text="line.label"></span>
          <span x-text="line.value"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- 4. Effects Section (Action Only) -->
  <div class="tt-section" x-show="!$store.game.hoveredAction?.isHelp && $store.game.getActionEffect($store.game.hoveredAction)">
    <div class="tt-section-header" x-text="'[ ' + $store.game.t('ui_yield') + ' ]'"></div>
    <div class="tt-effect-list">
      <div class="tt-data-line tt-bonus">
        <span x-text="$store.game.getActionEffect($store.game.hoveredAction)"></span>
      </div>
      <!-- UNLOCKS (Enhanced List View) -->
      <div class="tt-section" x-show="$store.game.hoveredAction && $store.game.t($store.game.hoveredAction.id, 'actions')?.unlocks">
        <div class="tt-section-header" x-text="$store.game.t('ui_unlocks')">Schaltet frei:</div>
        <div class="tt-effect-list">
          <template x-for="item in ($store.game.t($store.game.hoveredAction?.id, 'actions')?.unlocks || '').split(',')" :key="item">
            <div class="tt-data-line tt-bonus">
              <span x-text="'• ' + item.trim().replace(/^::\s*/, '')"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- 5. Buff Duration (NEW) -->
  <div class="tt-section" x-show="$store.game.hoveredAction?.isBuff">
    <div class="tt-section-header" x-text="'[ Laufzeit ]'"></div>
    <div class="tt-data-line tt-bonus">
      <span x-text="'Noch ' + Math.ceil($store.game.hoveredAction?.remaining || 0) + ' Sekunden'"></span>
    </div>
  </div>
</div>
