<!-- Sidebar Navigation -->
<nav class="sidebar">
    <ul class="nav-list nav-items-top">
        <template x-for="item in $store.game.content.registries.navigation" :key="item.id">
            <li class="nav-item" 
                 :id="'nav-' + item.id"
                 :class="$store.game.view === item.id && 'active'" 
                 @click="$store.game.view = item.id; $store.game.playSound('click')"
                 :aria-label="'Navigate to ' + item.id">
                <img :src="'img/menu_' + item.icon + '.webp'" :alt="item.id" class="menu-icon-img" />
                <span x-text="$store.game.t(item.label)">Link</span>
            </li>
        </template>
    </ul>
    
    <div class="sidebar-footer">
        <div class="save-status-sidebar" x-text="$store.game.saveInfoText || $store.game.t('save_never')">
            Zuletzt gespeichert: Nie
        </div>
        <div class="settings-corner-btn" 
             @click="$store.game.settingsOpen = true"
             @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('settings_title'), desc: '' }">⚙️</div>
    </div>
</nav>
