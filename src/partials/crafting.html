<!-- CRAFTING & HOUSING HUB - CORE 3.0 -->
    <div x-show="$store.game.view === 'crafting'" 
          class="view-content-crafting"
          x-data="{
            // Dynamic resolution from ContentService
            getConstructionItems() {
                const categories = ['camp', 'housing', 'workshop', 'garden', 'kitchen'];
                const allActions = this.$store.game.content.actions || {};
                
                let list = [];
                Object.values(allActions).forEach(action => {
                    if (categories.includes(action.category)) {
                        if (this.isVisible(action)) {
                            list.push({ id: action.id, cat: action.category });
                        }
                    }
                });
    
                // Filter by subview
                if (this.$store.game.craftingSubView !== 'all') {
                    list = list.filter(a => a.cat === this.$store.game.craftingSubView);
                }
    
                // Sort: Uncompleted first, then by priority/id
                return list.sort((a, b) => {
                    const compA = this.isCompleted(a.id);
                    const compB = this.isCompleted(b.id);
                    if (compA !== compB) return compA ? 1 : -1;
                    return a.id.localeCompare(b.id);
                });
            },
            isCompleted(id) {
                return this.$store.game.flags[id] === true || this.$store.game.unlockedRecipes.includes(id);
            },
            isVisible(action) {
                if (this.isCompleted(action.id)) return true;
                if (!action.requirements) return true;
                
                // Show if all requirements (flags) are met
                return Object.entries(action.requirements).every(([path, val]) => {
                    return this.resolvePath(this.$store.game, path) === val;
                });
            },
            resolvePath(obj, path) {
                return path.split('.').reduce((prev, curr) => prev ? prev[curr] : undefined, obj);
            }
          }"
    >
  <!-- CATEGORY HEADER -->
  <div class="category-header">
    <div style="display: flex; align-items: center; justify-content: flex-start; gap: 15px;">
      <h3 x-text="$store.game.t('cat_crafting')">Bauen & Handwerk</h3>
      <div class="nav-help-icon" 
           @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('cat_crafting'), desc: $store.game.t('nav_crafting_desc') }"
           @mouseleave="$store.game.hoveredAction = null">?</div>
    </div>
  </div>

  <!-- SUB-TAB NAVIGATION -->
  <div class="crafting-tabs">
    <button class="craft-tab-btn" :class="$store.game.craftingSubView === 'all' && 'active'" @click="$store.game.craftingSubView = 'all'" x-text="$store.game.t('ui_tab_all')">Alle</button>
    <button class="craft-tab-btn" :class="$store.game.craftingSubView === 'camp' && 'active'" @click="$store.game.craftingSubView = 'camp'" x-text="$store.game.t('ui_tab_camp')">Lager</button>
    <button class="craft-tab-btn" :class="$store.game.craftingSubView === 'housing' && 'active'" @click="$store.game.craftingSubView = 'housing'" x-text="$store.game.t('ui_tab_housing')">Gebäude</button>
    <button class="craft-tab-btn" :class="$store.game.craftingSubView === 'workshop' && 'active'" @click="$store.game.craftingSubView = 'workshop'" x-text="$store.game.t('ui_tab_workshop')">Werkstatt</button>
    <button class="craft-tab-btn" :class="$store.game.craftingSubView === 'garden' && 'active'" @click="$store.game.craftingSubView = 'garden'" x-text="$store.game.t('ui_tab_garden')">Garten</button>
  </div>
  
  <div class="action-container">
    <div class="blueprint-grid" x-transition:enter="view-enter">
      <template x-for="bp in getConstructionItems()" :key="bp.id">
        <button class="blueprint-card" 
                :class="isCompleted(bp.id) && 'is-completed'"
                @click="!isCompleted(bp.id) && $store.game.executeAction(bp.id)"
                @mouseover="$store.game.hoveredAction = {id: bp.id, data: $store.game.content.get(bp.id)}"
                @mouseout="$store.game.hoveredAction = null"
        >
          <div class="blueprint-visual">
            <template x-if="$store.game.content.get(bp.id)?.image">
              <img :src="$store.game.content.get(bp.id)?.image" class="blueprint-img">
            </template>
            <template x-if="!$store.game.content.get(bp.id)?.image">
              <span style="font-size: 3rem;" x-text="bp.id.includes('garden') ? '🌿' : '🏗️'"></span>
            </template>
            <template x-if="isCompleted(bp.id)">
              <div class="status-check">✓</div>
            </template>
          </div>
          <div class="blueprint-footer">
            <span class="blueprint-name" x-text="$store.game.t(bp.id, 'actions').title"></span>
          </div>
        </button>
      </template>
    </div>
    
    <div x-show="getConstructionItems().length === 0" class="vault-placeholder-box">
        <p>Noch keine Baupläne in dieser Kategorie freigeschaltet.</p>
    </div>
  </div>
</div>
