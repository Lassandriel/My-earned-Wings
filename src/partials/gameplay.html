<!-- GAMEPLAY VIEW - CORE 3.0 -->
<div x-show="$store.game.view === 'gameplay'" class="view-content-gameplay">
  <div class="primary-actions-bar">
    <button
      class="game-btn primary-btn primary-satiation"
      @click="$store.game.executeAction('act-essen')"
      @mouseover="$store.game.hoveredAction = {id: 'act-essen', data: $store.game.content.get('act-essen')}"
      @mouseout="$store.game.hoveredAction = null"
    >
      <span x-text="$store.game.t('act-essen', 'actions').title">Beeren essen</span>
      <span class="key-tag">1</span>
    </button>
    <button
      class="game-btn primary-btn primary-energy"
      @click="$store.game.executeAction('act-ausruhen')"
      @mouseover="$store.game.hoveredAction = {id: 'act-ausruhen', data: $store.game.content.get('act-ausruhen')}"
      @mouseout="$store.game.hoveredAction = null"
    >
      <span x-text="$store.game.t('act-ausruhen', 'actions').title">Ausruhen</span>
      <span class="key-tag">2</span>
    </button>
    <button
      class="game-btn primary-btn primary-magic"
      @click="$store.game.executeAction('act-meditieren')"
      @mouseover="$store.game.hoveredAction = {id: 'act-meditieren', data: $store.game.content.get('act-meditieren')}"
      @mouseout="$store.game.hoveredAction = null"
    >
      <span x-text="$store.game.t('act-meditieren', 'actions').title">Blick nach oben</span>
      <span class="key-tag">3</span>
    </button>
  </div>

  <!-- Automation & Loop Control -->
  <div class="automation-bar" x-transition>
    <div class="loop-toggle-wrapper" :class="$store.game.isLooping && 'active'">
      <label class="premium-toggle">
        <input type="checkbox" x-model="$store.game.isLooping" aria-label="Toggle loop mode">
        <div class="toggle-track">
          <div class="toggle-thumb">
             <span class="thumb-icon" x-show="!$store.game.isLooping">◎</span>
             <span class="thumb-icon" x-show="$store.game.isLooping">🔄</span>
          </div>
        </div>
      </label>
      <span class="loop-label" x-text="$store.game.t('ui_loop_mode')">Dauerschleife</span>
    </div>
    
    <div class="loop-status-hint" x-show="$store.game.isLooping" x-transition>
      <span class="hint-text" x-text="$store.game.t('ui_loop_hint')">Aktionen werden automatisch wiederholt...</span>
    </div>
  </div>

  <div class="action-container">
    <div class="action-column">
      <section class="action-group">
        <div class="category-header">
          <h3 x-text="$store.game.t('cat_gather')">Sammeln</h3>
          <div class="nav-help-icon" 
               @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('cat_gather'), desc: $store.game.t('nav_gather_desc') }"
               @mouseleave="$store.game.hoveredAction = null">?</div>
        </div>
        <div class="btn-list">
        <button
            class="game-btn"
            @click="!$store.game.executeAction('act-wood') && ($el.classList.add('btn-shake'), setTimeout(()=>$el.classList.remove('btn-shake'), 400))"
            @mouseover="$store.game.hoveredAction = {id: 'act-wood', data: $store.game.content.get('act-wood')}"
            @mouseout="$store.game.hoveredAction = null"
            x-text="$store.game.flags['item-axe'] ? $store.game.t('act-wood', 'actions').title_alt : $store.game.t('act-wood', 'actions').title"
          >
          </button>
          <button class="focus-toggle-btn" :class="$store.game.activeFocus === 'act-wood' && 'is-focused'" @click.stop="$store.game.toggleFocus('act-wood')">✨</button>
        <button
            class="game-btn"
            @click="!$store.game.executeAction('act-stone') && ($el.classList.add('btn-shake'), setTimeout(()=>$el.classList.remove('btn-shake'), 400))"
            @mouseover="$store.game.hoveredAction = {id: 'act-stone', data: $store.game.content.get('act-stone')}"
            @mouseout="$store.game.hoveredAction = null"
            x-text="$store.game.flags['item-pickaxe'] ? $store.game.t('act-stone', 'actions').title_alt : $store.game.t('act-stone', 'actions').title"
          >
          </button>
          <button class="focus-toggle-btn" :class="$store.game.activeFocus === 'act-stone' && 'is-focused'" @click.stop="$store.game.toggleFocus('act-stone')">✨</button>
        <button
            x-show="$store.game.flags['item-bow']"
            class="game-btn primary-magic"
            @click="!$store.game.executeAction('act-hunt') && ($el.classList.add('btn-shake'), setTimeout(()=>$el.classList.remove('btn-shake'), 400))"
            @mouseover="$store.game.hoveredAction = {id: 'act-hunt', data: $store.game.content.get('act-hunt')}"
            @mouseout="$store.game.hoveredAction = null"
            x-text="$store.game.t('act-hunt', 'actions').title"
          >
          </button>
          <button class="focus-toggle-btn" :class="$store.game.activeFocus === 'act-hunt' && 'is-focused'" @click.stop="$store.game.toggleFocus('act-hunt')">✨</button>
        </div>
      </section>
    </div>

    <div class="vertical-divider"></div>

    <div class="action-column">

      <section class="action-group">
        <div class="category-header">
          <h3 x-text="$store.game.t('cat_work')">Arbeit</h3>
          <div class="nav-help-icon" 
               @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('cat_work'), desc: $store.game.t('nav_work_desc') }"
               @mouseleave="$store.game.hoveredAction = null">?</div>
        </div>
        <div class="btn-list">
          <button
            class="game-btn"
            @click="$store.game.executeAction('act-work')"
            @mouseover="$store.game.hoveredAction = {id: 'act-work', data: $store.game.content.get('act-work')}"
            @mouseout="$store.game.hoveredAction = null"
            x-text="$store.game.t('act-work', 'actions').title"
          >
          </button>
          <button class="focus-toggle-btn" :class="$store.game.activeFocus === 'act-work' && 'is-focused'" @click.stop="$store.game.toggleFocus('act-work')">✨</button>
        </div>
      </section>

      <!-- KITCHEN SECTION -->
      <section class="action-group" x-show="$store.game.flags['build-kitchen']" x-collapse>
        <div class="category-header">
          <h3 x-text="$store.game.t('ui_tab_kitchen')">Küche</h3>
          <div class="nav-help-icon" 
               @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('ui_tab_kitchen'), desc: $store.game.t('help_kitchen_desc') }"
               @mouseleave="$store.game.hoveredAction = null">?</div>
        </div>
        <div class="btn-list">
          <button class="game-btn" :class="$store.game.activeTasks['act-cook-gourmet'] && 'is-working'"
                  @click="!$store.game.activeTasks['act-cook-gourmet'] && $store.game.executeAction('act-cook-gourmet')"
                  @mouseover="$store.game.hoveredAction = {id: 'act-cook-gourmet', data: $store.game.content.get('act-cook-gourmet')}" @mouseout="$store.game.hoveredAction = null"
                  style="position: relative;">
            <span x-text="$store.game.t('act-cook-gourmet', 'actions').title"></span>
            <div x-show="$store.game.activeTasks['act-cook-gourmet']" class="btn-progress-container">
              <div class="btn-progress-fill" :style="'width: ' + (100 - ($store.game.activeTasks['act-cook-gourmet'].remaining / $store.game.activeTasks['act-cook-gourmet'].total * 100)) + '%'"></div>
            </div>
          </button>
        </div>
      </section>

      <!-- MAGIC SECTION -->
      <section class="action-group" x-show="$store.game.unlockedRecipes.includes('act-dream-bloom')" x-collapse>
        <div class="category-header">
          <h3 x-text="$store.game.t('cat_magic')">Magie</h3>
          <div class="nav-help-icon" 
               @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('cat_magic'), desc: $store.game.t('help_magic_desc') }"
               @mouseleave="$store.game.hoveredAction = null">?</div>
        </div>
        <div class="btn-list">
          <button
            class="game-btn primary-magic"
            @click="!$store.game.executeAction('act-dream-bloom') && ($el.classList.add('btn-shake'), setTimeout(()=>$el.classList.remove('btn-shake'), 400))"
            @mouseover="$store.game.hoveredAction = {id: 'act-dream-bloom', data: $store.game.content.get('act-dream-bloom')}"
            @mouseout="$store.game.hoveredAction = null"
            x-text="$store.game.t('act-dream-bloom', 'actions').title"
          >
          </button>
          
          <button
            x-show="$store.game.flags['build-arcane-sanctum']"
            class="game-btn primary-magic"
            :class="$store.game.activeTasks['act-meditate'] && 'is-working'"
            @click="!$store.game.activeTasks['act-meditate'] && $store.game.executeAction('act-meditate')"
            @mouseover="$store.game.hoveredAction = {id: 'act-meditate', data: $store.game.content.get('act-meditate')}"
            @mouseout="$store.game.hoveredAction = null"
            style="position: relative;"
          >
            <span x-text="$store.game.t('act-meditate', 'actions').title"></span>
            <div x-show="$store.game.activeTasks['act-meditate']" class="btn-progress-container">
              <div class="btn-progress-fill" :style="'width: ' + (100 - ($store.game.activeTasks['act-meditate'].remaining / $store.game.activeTasks['act-meditate'].total * 100)) + '%'"></div>
            </div>
          </button>
          <button class="focus-toggle-btn" :class="$store.game.activeFocus === 'act-meditate' && 'is-focused'" @click.stop="$store.game.toggleFocus('act-meditate')">✨</button>

          <button
            x-show="$store.game.flags['build-arcane-sanctum']"
            class="game-btn primary-magic"
            @click="!$store.game.executeAction('act-spell-harvest') && ($el.classList.add('btn-shake'), setTimeout(()=>$el.classList.remove('btn-shake'), 400))"
            @mouseover="$store.game.hoveredAction = {id: 'act-spell-harvest', data: $store.game.content.get('act-spell-harvest')}"
            @mouseout="$store.game.hoveredAction = null"
          >
            <span x-text="$store.game.t('act-spell-harvest', 'actions').title"></span>
          </button>
        </div>
      </section>

      <!-- GARDEN SECTION -->
      <section class="action-group" x-show="$store.game.flags['build-garden']" x-collapse>
        <div class="category-header">
          <h3 x-text="$store.game.t('ui_tab_garden')">Garten</h3>
          <div class="nav-help-icon" 
               @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('ui_tab_garden'), desc: $store.game.t('help_garden_desc') }"
               @mouseleave="$store.game.hoveredAction = null">?</div>
        </div>
        <div class="btn-list">
          <button class="game-btn" :class="$store.game.activeTasks['act-garden-plant'] && 'is-working'"
                  @click="!$store.game.activeTasks['act-garden-plant'] && $store.game.executeAction('act-garden-plant')"
                  @mouseover="$store.game.hoveredAction = {id: 'act-garden-plant', data: $store.game.content.get('act-garden-plant')}" @mouseout="$store.game.hoveredAction = null"
                  style="position: relative;">
            <span x-text="$store.game.t('act-garden-plant', 'actions').title + ' (1)'"></span>
            <div x-show="$store.game.activeTasks['act-garden-plant']" class="btn-progress-container">
              <div class="btn-progress-fill" :style="'width: ' + (100 - ($store.game.activeTasks['act-garden-plant'].remaining / $store.game.activeTasks['act-garden-plant'].total * 100)) + '%'"></div>
            </div>
          </button>

          <button x-show="$store.game.flags['gardenLevel'] >= 2" 
                  class="game-btn" :class="$store.game.activeTasks['act-garden-plant-2'] && 'is-working'"
                  @click="!$store.game.activeTasks['act-garden-plant-2'] && $store.game.executeAction('act-garden-plant-2')"
                  @mouseover="$store.game.hoveredAction = {id: 'act-garden-plant-2', data: $store.game.content.get('act-garden-plant-2')}" @mouseout="$store.game.hoveredAction = null"
                  style="position: relative;">
            <span x-text="$store.game.t('act-garden-plant', 'actions').title + ' (2)'"></span>
            <div x-show="$store.game.activeTasks['act-garden-plant-2']" class="btn-progress-container">
              <div class="btn-progress-fill" :style="'width: ' + (100 - ($store.game.activeTasks['act-garden-plant-2'].remaining / $store.game.activeTasks['act-garden-plant-2'].total * 100)) + '%'"></div>
            </div>
          </button>

          <button class="game-btn" :class="$store.game.activeTasks['act-garden-water'] && 'is-working'"
                  @click="!$store.game.activeTasks['act-garden-water'] && $store.game.executeAction('act-garden-water')"
                  @mouseover="$store.game.hoveredAction = {id: 'act-garden-water', data: $store.game.content.get('act-garden-water')}" @mouseout="$store.game.hoveredAction = null">
            <span x-text="$store.game.t('act-garden-water', 'actions').title"></span>
          </button>
        </div>
      </section>

      <!-- STUDY SECTION -->
      <section class="action-group" x-show="$store.game.flags['item-book-knowledge']" x-collapse>
        <div class="btn-list">
          <button class="game-btn" @click="$store.game.executeAction('act-study')"
                  @mouseover="$store.game.hoveredAction = {id: 'act-study', data: $store.game.content.get('act-study')}" @mouseout="$store.game.hoveredAction = null">
            <span x-text="$store.game.t('act-study', 'actions').title"></span>
          </button>
        </div>
      </section>
    </div>
  </div>
</div>
