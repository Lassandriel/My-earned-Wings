<!-- VILLAGE VIEW - CORE 3.0 -->
<div x-show="$store.game.view === 'village'" class="view-content-village">
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_village')">Das Dorf</h3>
    <div class="nav-help-icon" 
         @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('cat_village'), desc: $store.game.t('nav_village_desc') }"
         @mouseleave="$store.game.hoveredAction = null">?</div>
  </div>

  <div class="village-grid">
    <!-- 2. NPC CARDS (Dynamisches Grid) -->
    <template x-for="npcId in $store.game.unlockedNPCs" :key="npcId">
        <div :id="npcId + '-card'" class="village-card npc-card">
            <div class="card-header-visual">
                <div class="npc-portrait-wrapper">
                    <div class="npc-img-blur-bg" x-show="$store.game.content.get(npcId)?.image" :style="'background-image: url(' + $store.game.content.get(npcId)?.image + ')'"></div>
                    <img x-show="$store.game.content.get(npcId)?.image" :src="$store.game.content.get(npcId)?.image" class="npc-img">
                    <div x-show="!$store.game.content.get(npcId)?.image" class="npc-placeholder" x-text="$store.game.content.get(npcId)?.icon"></div>
                </div>
            </div>

            <div class="card-body">
                <div class="npc-info-row">
                    <h4 class="npc-display-name" x-text="$store.game.t($store.game.content.get(npcId)?.nameKey)"></h4>
                    <!-- Progress Tracker -->
                    <div class="npc-progress-mini-track">
                        <div class="npc-progress-fill" :style="'width: ' + $store.game.ui.getNPCProgressPercent($store.game, npcId) + '%'"></div>
                    </div>
                </div>

                <div class="npc-interaction-area">
                    <!-- Quest Action -->
                    <button
                        class="game-btn npc-main-action-btn"
                        x-show="($store.game.npcProgress[$store.game.content.get(npcId).progKey] || 0) < ($store.game.content.get(npcId).maxProgress)"
                        @click="$store.game.executeAction('act-' + npcId)"
                        @mouseover="$store.game.hoveredAction = {id: 'act-' + npcId, data: $store.game.content.get('act-' + npcId)}"
                        @mouseout="$store.game.hoveredAction = null"
                    >
                        <span x-text="$store.game.t('ui_details')"></span>
                    </button>

                    <!-- Trade Actions (Decentralized Market) -->
                    <div class="npc-trade-actions" x-show="$store.game.content.getNPCActions($store.game, npcId).length > 0">
                        <template x-for="action in $store.game.content.getNPCActions($store.game, npcId)" :key="action.id">
                            <button
                                class="game-btn npc-trade-btn"
                                @click="$store.game.attemptAction($el, action.id)"
                                @mouseover="$store.game.hoveredAction = {id: action.id, data: action}"
                                @mouseout="$store.game.hoveredAction = null"
                            >
                                <span x-text="$store.game.t(action.id, 'actions').title"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 3. Baum des Lebens (Finale) -->
    <div class="village-card finale-tree-card" x-show="$store.game.canAccessTreeOfLife && !$store.game.demoCompleted">
        <div class="finale-tree-visual">🌳</div>
        <div class="card-body">
            <h4 x-text="$store.game.t('npc_treeoflife_name')"></h4>
            <button 
                class="game-btn finale-trigger-btn"
                @click="$store.game.executeAction('act-npc-treeOfLife')"
                @mouseover="$store.game.hoveredAction = {id: 'act-npc-treeOfLife', data: $store.game.content.get('act-npc-treeOfLife')}"
                @mouseout="$store.game.hoveredAction = null"
                x-text="$store.game.t('btn_embrace_destiny')"
            >
            </button>
        </div>
    </div>
  </div>
</div>
