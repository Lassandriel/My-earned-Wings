<!-- VILLAGE VIEW -->
<div x-show="$store.game.view === 'village'" class="view-content-village">
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_village')">Das Dorf</h3>
    <div class="nav-help-icon" 
         @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('cat_village'), desc: $store.game.t('nav_village_desc') }"
         @mouseleave="$store.game.hoveredAction = null">?</div>
  </div>

  <div class="village-grid">
    <!-- 1. MARKTPLATZ (Statische Card für Ressourcenhandel) -->
    <div class="village-card market-card">
        <div class="card-bg-glow"></div>
        <div class="card-portrait-box market-icon-box">
            <span class="market-symbol">⚖️</span>
        </div>
        <div class="card-body">
            <h4 class="card-title" x-text="$store.game.t('cat_trade')">Marktplatz</h4>
            <div class="market-actions">
                <button
                    id="market-sell-wood-btn"
                    class="game-btn market-trade-btn"
                    @click="$store.game.executeAction('action-sell-wood')"
                    @mouseover="$store.game.hoveredAction = {id: 'action-sell-wood', data: $store.game.actionDb['action-sell-wood']}"
                    @mouseout="$store.game.hoveredAction = null"
                    aria-label="Sell Wood for Shards"
                >
                    <span x-text="$store.game.t('action-sell-wood', 'actions').title"></span>
                    <span class="trade-yield">+5 ✦</span>
                </button>
                <button
                    id="market-sell-stone-btn"
                    class="game-btn market-trade-btn"
                    @click="$store.game.executeAction('action-sell-stone')"
                    @mouseover="$store.game.hoveredAction = {id: 'action-sell-stone', data: $store.game.actionDb['action-sell-stone']}"
                    @mouseout="$store.game.hoveredAction = null"
                    aria-label="Sell Stone for Shards"
                >
                    <span x-text="$store.game.t('action-sell-stone', 'actions').title"></span>
                    <span class="trade-yield">+8 ✦</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 2. NPC CARDS (Dynamisches Grid) -->
    <template x-for="id in $store.game.unlockedNPCs" :key="id">
        <div :id="'npc-' + id + '-card'" class="village-card npc-card" :class="[$store.game.companions[id] && 'is-active-companion', id]">
            <div class="card-header-visual">
                <div class="npc-portrait-wrapper">
                    <img x-show="$store.game.actionDb[id]?.image" :src="'img/' + $store.game.actionDb[id].image" class="npc-img">
                    <div x-show="!$store.game.actionDb[id]?.image" class="npc-placeholder" x-text="$store.game.actionDb[id]?.journalIcon"></div>
                </div>
                    <!-- Companion Control Removed (Replaced by Arcane Focus) -->
                </div>
            </div>

            <div class="card-body">
                <div class="npc-info-row">
                    <h4 class="npc-display-name" x-text="($store.game.t(id, 'actions').title && $store.game.t(id, 'actions').title !== id) ? $store.game.t(id, 'actions').title : ($store.game.actionDb[id]?.title || id)"></h4>
                    <!-- Progress Tracker Mini -->
                    <div class="npc-progress-mini-track">
                        <div class="npc-progress-fill" :style="'width: ' + (($store.game.npcProgress[id.replace('npc-', '')] || 0) / ($store.game.actionDb[id].maxProgress || 5) * 100) + '%'"></div>
                    </div>
                </div>

                <div class="npc-interaction-area">
                    <!-- Standard Interaction: Talk -->
                    <button
                        :id="'npc-' + id + '-details-btn'"
                        class="game-btn npc-main-action-btn"
                        x-show="($store.game.npcProgress[id.replace('npc-', '')] || 0) < ($store.game.actionDb[id].maxProgress)"
                        @click="$store.game.executeAction(id)"
                        @mouseover="$store.game.hoveredAction = {id, data: $store.game.actionDb[id]}"
                        @mouseout="$store.game.hoveredAction = null"
                        :aria-label="'Talk to ' + id"
                    >
                        <span x-text="$store.game.t('ui_details')"></span>
                    </button>

                    <!-- Hunter Specific: Meat Exchange -->
                    <div class="npc-special-shop hunter-meat-exchange" x-show="id === 'npc-hunter' && $store.game.npcProgress.hunter >= 5">
                        <div class="shop-buttons-row">
                            <button class="game-btn shop-btn" @click="$store.game.executeAction('action-buy-meat')" @mouseover="$store.game.hoveredAction = {id: 'action-buy-meat', data: $store.game.actionDb['action-buy-meat']}" @mouseout="$store.game.hoveredAction = null">🍖</button>
                            <button class="game-btn shop-btn" @click="$store.game.executeAction('action-sell-meat')" @mouseover="$store.game.hoveredAction = {id: 'action-sell-meat', data: $store.game.actionDb['action-sell-meat']}" @mouseout="$store.game.hoveredAction = null">💰</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 3. Baum des Lebens (Finale) -->
    <div class="village-card finale-tree-card" x-show="$store.game.canAccessTreeOfLife && !$store.game.demoCompleted">
        <div class="finale-tree-visual">🌳</div>
        <div class="card-body">
            <h4 x-text="$store.game.t('npc-treeOfLife', 'actions').title"></h4>
            <button 
                class="game-btn finale-trigger-btn"
                @click="$store.game.executeAction('npc-treeOfLife')"
                @mouseover="$store.game.hoveredAction = {id: 'npc-treeOfLife', data: $store.game.actionDb['npc-treeOfLife']}"
                @mouseout="$store.game.hoveredAction = null"
            >
                Das Schicksal annehmen
            </button>
        </div>
    </div>
  </div>
</div>
