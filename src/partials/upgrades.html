<!-- UPGRADES VIEW (THE DRAGON'S VAULT) - CORE 3.0 -->
<div x-show="$store.game.view === 'upgrades'" class="view-content-upgrades" x-data="{ activeCategory: 'all' }">
  <div class="category-header">
    <h3 x-text="$store.game.t('cat_upgrades')">Besitztümer & Artefakte</h3>
    <div class="nav-help-icon" 
         @mouseenter="$store.game.hoveredAction = { id: 'help', isHelp: true, title: $store.game.t('cat_upgrades'), desc: $store.game.t('cat_upgrades_desc') }"
         @mouseleave="$store.game.hoveredAction = null">?</div>
  </div>

  <div class="upgrades-container">
    <!-- Category Filter Tabs -->
    <div class="vault-tabs">
        <button class="vault-tab-btn" :class="activeCategory === 'all'" @click="activeCategory = 'all'" x-text="$store.game.t('ui_all')"></button>
        <button class="vault-tab-btn" :class="activeCategory === 'tools'" @click="activeCategory = 'tools'" x-text="$store.game.t('ui_tools')"></button>
        <button class="vault-tab-btn" :class="activeCategory === 'artifacts'" @click="activeCategory = 'artifacts'" x-text="$store.game.t('cat_artifacts')"></button>
        <button class="vault-tab-btn" :class="activeCategory === 'provisions'" @click="activeCategory = 'provisions'" x-text="$store.game.t('cat_provisions')"></button>
    </div>

    <div class="vault-layout">
        <!-- Items Grid -->
        <div class="vault-grid-pane">
            <div class="items-display-grid">
                <template x-for="id in $store.game.discoveredItems.filter(id => {
                    const item = $store.game.content.get(id, 'items');
                    if (!item) return false;
                    if (activeCategory === 'all') return true;
                    return item.category === activeCategory;
                })" :key="id">
                    <div 
                        class="item-slot" 
                        :class="[$store.game.selectedItem === id && 'is-selected', id.startsWith('item-walking') || id.startsWith('item-axe') ? 'slot-tool' : 'slot-rare']"
                        @click="$store.game.selectedItem = id; $store.game.playSound('click')"
                    >
                        <div class="slot-inner-glow"></div>
                        <img :src="$store.game.content.get(id, 'items')?.image || 'img/Placeholder_Item.webp'" :alt="id" class="slot-icon">
                    </div>
                </template>

                <!-- Visual Placeholders -->
                <template x-for="i in Math.max(0, 12 - $store.game.discoveredItems.length)">
                    <div class="item-slot-empty"></div>
                </template>
            </div>
            
            <div x-show="$store.game.discoveredItems.length === 0" class="vault-empty-notice">
                <p x-text="$store.game.t('ui_upgrades_empty')"></p>
            </div>
        </div>

        <!-- Detail Panel -->
        <div class="vault-detail-pane">
            <template x-if="$store.game.selectedItem && $store.game.content.get($store.game.selectedItem, 'items')">
                <div class="item-info-card" x-transition:enter="item-fade-in">
                    <div class="item-visual-showcase">
                        <div class="aura-glow" :class="$store.game.content.get($store.game.selectedItem, 'items').category === 'tools' ? 'aura-teal' : 'aura-gold'"></div>
                        <img :src="$store.game.content.get($store.game.selectedItem, 'items').image" alt="Visual" class="showcase-img">
                    </div>
                    
                    <div class="item-text-content">
                        <div class="item-type-badge" x-text="$store.game.t('cat_' + $store.game.content.get($store.game.selectedItem, 'items').category)"></div>
                        <h2 class="item-name" x-text="$store.game.t($store.game.content.get($store.game.selectedItem, 'items').id + '_title', 'items')"></h2>
                        <div class="item-hr"></div>
                        <p class="item-description" x-text="$store.game.t($store.game.content.get($store.game.selectedItem, 'items').id + '_desc', 'items')"></p>
                        
                        <!-- Effects -->
                        <template x-if="$store.game.content.get($store.game.selectedItem, 'items').effect">
                            <div class="item-effects-box">
                                <template x-for="(val, key) in $store.game.content.get($store.game.selectedItem, 'items').effect">
                                    <div class="stat-tag">
                                        <span class="stat-label" x-text="$store.game.t('ui_' + key)"></span>
                                        <span class="stat-plus">+</span>
                                        <span class="stat-value" x-text="val"></span>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Actions -->
                        <div class="item-action-footer" x-show="$store.game.content.get($store.game.selectedItem, 'items').consumable">
                            <button class="game-btn primary-btn use-action-btn" @click="$store.game.consumeItem($store.game.selectedItem)">
                                <span x-text="$store.game.t('ui_use')"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
            
            <template x-if="!$store.game.selectedItem || !$store.game.content.get($store.game.selectedItem, 'items')">
                <div class="vault-placeholder-box">
                    <div class="vault-icon-ghost">🐉</div>
                    <p x-text="$store.game.t('ui_placeholder_desc')"></p>
                </div>
            </template>
        </div>
    </div>
  </div>
</div>
