<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="img/Game_icon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My-earned-Wings · Dev Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap"
    />
    <script type="module" src="src/devtools/devtools.ts"></script>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --panel-light: #334155;
        --border: #475569;
        --text: #e2e8f0;
        --text-dim: #94a3b8;
        --accent: #2dd4bf;
        --accent-dim: #14b8a6;
        --gold: #fbbf24;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        display: grid;
        grid-template-columns: 320px 1fr;
        grid-template-rows: 48px 1fr;
        grid-template-areas:
          "header header"
          "sidebar main";
      }

      header.dev-header {
        grid-area: header;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
      }
      header.dev-header h1 {
        font-family: 'Cinzel', serif;
        font-size: 16px;
        margin: 0;
        color: var(--accent);
        letter-spacing: 1px;
      }
      header.dev-header .badge {
        background: var(--accent);
        color: #000;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      header.dev-header .meta {
        margin-left: auto;
        color: var(--text-dim);
        font-size: 12px;
      }

      aside.dev-sidebar {
        grid-area: sidebar;
        background: var(--panel);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 12px 8px;
      }
      .category {
        font-family: 'Cinzel', serif;
        font-size: 11px;
        color: var(--gold);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 8px 12px 4px;
      }
      .item-row {
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text-dim);
      }
      .item-row:hover { background: var(--panel-light); color: var(--text); }
      .item-row.active { background: var(--accent-dim); color: #000; }
      .item-row .id {
        font-family: 'Inter', monospace;
        font-size: 10px;
        color: var(--text-dim);
        opacity: 0.7;
      }
      .item-row.active .id { color: #000; opacity: 0.7; }

      main.dev-main {
        grid-area: main;
        overflow-y: auto;
        padding: 24px 32px;
      }
      .empty-state {
        color: var(--text-dim);
        font-style: italic;
        margin-top: 80px;
        text-align: center;
      }
      .detail-header {
        margin-bottom: 16px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
      }
      .detail-header h2 {
        font-family: 'Cinzel', serif;
        margin: 0 0 4px;
        color: var(--accent);
        font-size: 22px;
      }
      .detail-header .id {
        color: var(--text-dim);
        font-family: monospace;
        font-size: 12px;
      }
      pre.yaml {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 16px;
        overflow-x: auto;
        font-family: 'Inter', monospace;
        font-size: 12px;
        line-height: 1.5;
        color: var(--text);
        white-space: pre-wrap;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .stat {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 12px;
      }
      .stat .num {
        font-family: 'Cinzel', serif;
        font-size: 28px;
        color: var(--accent);
      }
      .stat .label {
        color: var(--text-dim);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      input.search {
        width: 100%;
        padding: 6px 8px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-size: 13px;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <header class="dev-header">
      <h1>My-earned-Wings</h1>
      <span class="badge">DEV TOOLS</span>
      <span class="meta" id="meta">loading…</span>
    </header>

    <aside class="dev-sidebar" id="sidebar">
      <input class="search" type="text" id="search" placeholder="Filter…" />
      <div id="list"></div>
    </aside>

    <main class="dev-main" id="main">
      <div class="empty-state">Wähle eine Aktion links aus.</div>
    </main>
  </body>
</html>
