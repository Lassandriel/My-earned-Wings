<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(15, 23, 42, 0.95);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      border-radius: 12px;
    }
    .logo {
      width: 300px;
      height: auto;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    .loader {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      position: absolute;
      animation: loading 1.5s infinite ease-in-out;
    }
    .text {
      margin-top: 15px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.9; }
    }
    @keyframes loading {
      0% { left: -40%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <img src="public/img/logo_wings.png" class="logo" alt="My Earned Wings Logo">
  <div class="loader">
    <div class="loader-bar"></div>
  </div>
  <div class="text">Lädt...</div>
</body>
</html>
